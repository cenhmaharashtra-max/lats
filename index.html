                    <button class="btn btn-danger btn-sm" onclick="deleteVillage(${v.id})">Delete</button>
                  </div>
                </td>
              </tr>`).join('')}</tbody>
            </table></div>`
        }
      </div>
    </div>`}
  `;

  document.getElementById('vil-proj-sel').addEventListener('change', function () {
    villageSelectedProject = this.value ? parseInt(this.value) : null;
    renderVillages();
  });
}

function showVillageModal(id) {
  const v = id ? DB.villages.find(x => x.id === id) : null;
  const projectName = DB.projects.find(p => p.id === villageSelectedProject)?.name || '';
  openModal(v ? 'Edit Village' : 'Add Village', `
    <div class="alert alert-info" style="margin-bottom:16px">📁 Project: <strong>${projectName}</strong></div>
    <div class="field"><label class="required">Village Name</label><input id="vf-name" value="${v?.name || ''}" placeholder="Enter village name"></div>
    <div class="field"><label class="required">Taluka</label><input id="vf-taluka" value="${v?.taluka || ''}" placeholder="Enter taluka name"></div>
  `, [
    { label: 'Cancel', cls: 'btn-secondary', action: closeModal },
    { label: v ? 'Update' : 'Add Village', cls: 'btn-primary', action: () => saveVillage(id) }
  ]);
}

function saveVillage(id) {
  const name = document.getElementById('vf-name').value.trim();
  const taluka = document.getElementById('vf-taluka').value.trim();
  if (!name || !taluka) { showToast('All fields are required.', 'error'); return; }
  if (id) {
    const v = DB.villages.find(x => x.id === id);
    v.name = name; v.taluka = taluka;
    showToast('Village updated.', 'success');
  } else {
    if (!villageSelectedProject) { showToast('Please select a project first.', 'error'); return; }
    DB.villages.push({ id: newId(), name, taluka, projectId: villageSelectedProject });
    showToast('Village added.', 'success');
  }
  saveDB(); closeModal(); renderVillages();
}

function deleteVillage(id) {
  const v = DB.villages.find(function(x){ return x.id === id; });
  confirmModal('Delete village <strong>"' + (v ? v.name : id) + '"</strong>?', function() {
    DB.villages = DB.villages.filter(x => x.id !== id);
    saveDB(); showToast('Village deleted.', 'info'); renderVillages();
  });
}

// ═══════════════════════════════════════════════════════
// LA PROCESS  —  5 STAGES: 3a → 3A → JM → 3D → 3G
//
//  3a (lowercase) = CALA appointment notification for the village
//  3A (UPPERCASE) = Gut-number wise area notification (Section 3A)
//  JM             = Joint Measurement of guts
//  3D             = Declaration / Award with beneficiary names
//  3G             = Compensation payment per beneficiary
// ═══════════════════════════════════════════════════════
let laState = { projectId: null, villageId: null, tab: 'lower3a', srNo: 1 };

function renderLAProcess(params) {
  const myProjects = currentUser.role === 'admin'
    ? DB.projects
    : getMyProjects();

  if (params?.projectId) laState.projectId = params.projectId;

  const projVillages = laState.projectId
    ? DB.villages.filter(v => v.projectId === laState.projectId)
    : [];

  document.getElementById('page-content').innerHTML = `
    <div class="panel mb-4">
      <div class="panel-body">
        <div class="flex gap-3 items-center flex-wrap">
          <div class="field" style="margin:0;min-width:260px">
            <label style="display:block;margin-bottom:6px;font-size:12px;color:var(--text-dim);font-weight:500;">SELECT PROJECT</label>
            <select id="la-project-sel">
              <option value="">— Select Project —</option>
              ${myProjects.map(p => `<option value="${p.id}" ${laState.projectId==p.id?'selected':''}>${p.name}</option>`).join('')}
            </select>
          </div>
          ${laState.projectId ? `
          <div class="field" style="margin:0;min-width:260px">
            <label style="display:block;margin-bottom:6px;font-size:12px;color:var(--text-dim);font-weight:500;">SELECT VILLAGE</label>
            <select id="la-village-sel">
              <option value="">— Select Village —</option>
              ${projVillages.map(v => `<option value="${v.id}" ${laState.villageId==v.id?'selected':''}>${v.name} (${v.taluka})</option>`).join('')}
            </select>
          </div>
          ${projVillages.length === 0 ? `
            <div style="margin-top:20px">
              <div class="alert alert-warning" style="margin:0">⚠ No villages for this project. Add villages via <strong>Village Master</strong>.</div>
            </div>` : ''}
          ${laState.villageId && currentUser.role === 'admin' ? `
            <div style="margin-top:20px">
              <button class="btn btn-danger btn-sm" id="delAllVilBtn">🗑 Delete All LA Data for This Village</button>
            </div>` : ''}
          ` : ''}
        </div>
      </div>
    </div>
    <div id="la-content"></div>
  `;

  document.getElementById('la-project-sel').addEventListener('change', function() {
    laState.projectId = this.value ? parseInt(this.value) : null;
    laState.villageId = null;
    laState.tab = 'lower3a';
    laState.srNo = 1;
    delete laState._newSrName;
    renderLAProcess();
  });

  if (document.getElementById('la-village-sel')) {
    document.getElementById('la-village-sel').addEventListener('change', function() {
      laState.villageId = this.value ? parseInt(this.value) : null;
      laState.tab = 'lower3a';
      laState.srNo = 1;
      delete laState._newSrName;
      renderLATabs();
    });
  }

  if (document.getElementById('delAllVilBtn')) {
    document.getElementById('delAllVilBtn').addEventListener('click', function() {
      const vName = DB.villages.find(v => v.id === laState.villageId)?.name || 'this village';
      confirmModal('Delete <strong>ALL</strong> LA process data (3a, 3A, JM, 3D, 3G) for <strong>"' + vName + '"</strong>?<br>This cannot be undone.', function() {
        deleteVillageProcess(laState.villageId, laState.projectId);
        laState.tab = 'lower3a';
        showToast('All LA data for ' + vName + ' deleted.', 'info');
        renderLATabs();
      });
    });
  }

  if (laState.projectId && laState.villageId) renderLATabs();
}

function laTabClick(tabKey, prereqDone, prereqLabel) {
  if (!prereqDone) {
    showToast('⚠ Complete ' + prereqLabel + ' First', 'error');
    return;
  }
  laState.tab = tabKey;
  renderLATabs();
}

function getSrLabel(srNo, srName) {
  return srNo === 1 ? 'Sr.1 (Main)' : ('Sr.' + srNo + ' (' + (srName||'Add') + ')');
}

function addNewSr() {
  // Find max sr_no for this village's upper3A entries
  const existing3A = DB.process3a.filter(x => x.villageId === laState.villageId && x.projectId === laState.projectId && x.type === 'upper3A');
  const maxSr = existing3A.reduce((m, x) => Math.max(m, x.srNo||1), 1);
  const newSr = maxSr + 1;
  // Ask for name
  const srName = prompt('Enter name for Sr.' + newSr + ' (e.g. "Add Nandurbar", "Add extra area"):');
  if (!srName || !srName.trim()) return;
  laState.srNo = newSr;
  laState._newSrName = srName.trim();
  laState.tab = 'upper3A';
  renderLATabs();
}

function renderLATabs() {
  const v = DB.villages.find(x => x.id === laState.villageId);
  if (!v) return;

  // All Sr entries for this village (based on upper3A records)
  const all3AForVil = DB.process3a.filter(x => x.villageId === laState.villageId && x.projectId === laState.projectId && x.type === 'upper3A');
  const srList = [{ srNo: 1, srName: 'Main' }];
  all3AForVil.forEach(x => {
    if (x.srNo > 1 && !srList.find(s => s.srNo === x.srNo)) {
      srList.push({ srNo: x.srNo, srName: x.srName || 'Add' });
    }
  });
  // Also check if we're on a new unsaved sr
  if (laState.srNo > 1 && !srList.find(s => s.srNo === laState.srNo)) {
    srList.push({ srNo: laState.srNo, srName: laState._newSrName || 'Add' });
  }
  srList.sort((a,b) => a.srNo - b.srNo);

  const sr = laState.srNo || 1;

  // Stage completion flags — filtered by srNo
  const hasLower3a = sr === 1
    ? DB.process3a.some(x => x.villageId === laState.villageId && x.projectId === laState.projectId && x.type === 'lower3a')
    : true; // 3a is only for Sr.1; for Sr.2+ it's already done
  const _rec3A     = DB.process3a.find(x => x.villageId === laState.villageId && x.projectId === laState.projectId && x.type === 'upper3A' && (x.srNo||1) === sr);
  const hasUpper3A = _rec3A && _rec3A.notifDate && DB.process3aGuts.some(g => g.process3aId === _rec3A.id);
  const _recJM     = DB.processJM.find(x => x.villageId === laState.villageId && x.projectId === laState.projectId && (x.srNo||1) === sr);
  const hasJM      = !!_recJM;
  const _rec3D     = DB.process3D.find(x => x.villageId === laState.villageId && x.projectId === laState.projectId && (x.srNo||1) === sr);
  const has3D      = !!_rec3D;
  const has3G      = DB.process3G.some(x => x.villageId === laState.villageId && x.projectId === laState.projectId && (x.srNo||1) === sr);

  // Steps — hide 3a tab for Sr.2+
  const steps = sr === 1
    ? [
        { key: 'lower3a', label: '3a Notification', done: hasLower3a, num: 1 },
        { key: 'upper3A', label: '3A Details',       done: hasUpper3A, num: 2 },
        { key: 'jm',      label: 'JM Process',       done: hasJM,      num: 3 },
        { key: '3d',      label: '3D Declaration',   done: has3D,      num: 4 },
        { key: '3g',      label: '3G Compensation',  done: has3G,      num: 5 },
      ]
    : [
        { key: 'upper3A', label: '3A Details',       done: hasUpper3A, num: 1 },
        { key: 'jm',      label: 'JM Process',       done: hasJM,      num: 2 },
        { key: '3d',      label: '3D Declaration',   done: has3D,      num: 3 },
        { key: '3g',      label: '3G Compensation',  done: has3G,      num: 4 },
      ];

  const locks = sr === 1
    ? {
        lower3a: { allowed: true,         prereq: '' },
        upper3A: { allowed: hasLower3a,   prereq: '3a Notification' },
        jm:      { allowed: hasUpper3A,   prereq: '3A (with notif date & guts)' },
        '3d':    { allowed: hasJM,        prereq: 'JM Process' },
        '3g':    { allowed: has3D,        prereq: '3D Declaration' },
      }
    : {
        upper3A: { allowed: true,         prereq: '' },
        jm:      { allowed: hasUpper3A,   prereq: '3A (with notif date & guts)' },
        '3d':    { allowed: hasJM,        prereq: 'JM Process' },
        '3g':    { allowed: has3D,        prereq: '3D Declaration' },
      };

  document.getElementById('la-content').innerHTML = `
    <div class="process-steps">
      ${steps.map((s, i) => `
        <div class="process-step">
          <div class="step-item">
            <div class="step-circle ${s.done ? 'done' : laState.tab === s.key ? 'active' : ''}">${s.done ? '✓' : s.num}</div>
            <div class="step-label ${laState.tab === s.key ? 'active' : ''}">${s.label}</div>
          </div>
          ${i < steps.length - 1 ? `<div class="step-connector ${s.done ? 'done' : ''}"></div>` : ''}
        </div>
      `).join('')}
    </div>

    <div class="tabs" id="la-tabs">
      ${steps.map(s => {
        const lock = locks[s.key];
        const isActive = laState.tab === s.key;
        const locked = !lock.allowed;
        return `<div class="tab ${isActive ? 'active' : ''} ${locked ? 'tab-locked' : ''}"
          style="${locked ? 'opacity:0.45;cursor:not-allowed;position:relative;' : 'cursor:pointer;'}"
          data-tab="${s.key}" data-allowed="${lock.allowed}" data-prereq="${lock.prereq}"
          title="${locked ? '⚠ Complete ' + lock.prereq + ' First' : ''}">
          ${locked ? '🔒 ' : ''}${s.label}
        </div>`;
      }).join('')}
    </div>

    <div id="la-tab-content"></div>

    <!-- Sr. Entries Summary Table -->
    <div class="panel" style="margin-top:28px">
      <div class="panel-header" style="padding:14px 20px">
        <h3 style="font-size:14px">All Entries for this Village</h3>
        <button class="btn btn-primary btn-sm" onclick="addNewSr()">+ Add New Entry</button>
      </div>
      <div class="panel-body" style="padding:0">
        <table style="width:100%;border-collapse:collapse">
          <thead>
            <tr style="background:var(--surface)">
              <th style="padding:10px 16px;text-align:left;font-size:12px;color:var(--text-dim);font-weight:600;text-transform:uppercase">Sr.</th>
              <th style="padding:10px 16px;text-align:left;font-size:12px;color:var(--text-dim);font-weight:600;text-transform:uppercase">Name</th>
              <th style="padding:10px 16px;text-align:left;font-size:12px;color:var(--text-dim);font-weight:600;text-transform:uppercase">3A Date</th>
              <th style="padding:10px 16px;text-align:left;font-size:12px;color:var(--text-dim);font-weight:600;text-transform:uppercase">3A Area (Ha)</th>
              <th style="padding:10px 16px;text-align:left;font-size:12px;color:var(--text-dim);font-weight:600;text-transform:uppercase">JM Date</th>
              <th style="padding:10px 16px;text-align:left;font-size:12px;color:var(--text-dim);font-weight:600;text-transform:uppercase">JM Area (Ha)</th>
              <th style="padding:10px 16px;text-align:left;font-size:12px;color:var(--text-dim);font-weight:600;text-transform:uppercase">3D Date</th>
              <th style="padding:10px 16px;text-align:left;font-size:12px;color:var(--text-dim);font-weight:600;text-transform:uppercase">3G Date</th>
              <th style="padding:10px 16px;text-align:left;font-size:12px;color:var(--text-dim);font-weight:600;text-transform:uppercase">Action</th>
            </tr>
          </thead>
          <tbody id="sr-summary-tbody"></tbody>
        </table>
      </div>
    </div>
  `;

  // Populate Sr. summary table via DOM (avoid template literal escaping issues)
  var tbody = document.getElementById('sr-summary-tbody');
  if (tbody) {
    tbody.innerHTML = '';
    srList.forEach(function(s) {
      var rec3A  = DB.process3a.find(function(x){ return x.villageId===laState.villageId && x.projectId===laState.projectId && x.type==='upper3A' && (x.srNo||1)===s.srNo; });
      var area3A = rec3A ? DB.process3aGuts.filter(function(g){ return g.process3aId===rec3A.id; }).reduce(function(sum,g){ return sum+(parseFloat(g.area)||0); },0).toFixed(4) : '—';
      var recJM  = DB.processJM.find(function(x){ return x.villageId===laState.villageId && x.projectId===laState.projectId && (x.srNo||1)===s.srNo; });
      var areaJM = recJM ? DB.processJMGuts.filter(function(g){ return g.processJMId===recJM.id; }).reduce(function(sum,g){ return sum+(parseFloat(g.modArea)||0); },0).toFixed(4) : '—';
      var rec3D  = DB.process3D.find(function(x){ return x.villageId===laState.villageId && x.projectId===laState.projectId && (x.srNo||1)===s.srNo; });
      var rec3G  = DB.process3G.find(function(x){ return x.villageId===laState.villageId && x.projectId===laState.projectId && (x.srNo||1)===s.srNo; });
      var isActive = s.srNo === sr;

      var tr = document.createElement('tr');
      tr.setAttribute('data-sr-row', s.srNo);
      tr.style.cssText = 'border-top:1px solid var(--border);cursor:pointer;background:' + (isActive ? 'rgba(232,160,32,0.07)' : 'transparent');

      var cells = [
        '<strong style="color:' + (isActive ? 'var(--accent)' : 'var(--text)') + '">Sr.' + s.srNo + '</strong>',
        s.srName,
        rec3A ? rec3A.notifDate||'—' : '—',
        area3A,
        recJM ? recJM.jmDate||'—' : '—',
        areaJM,
        rec3D ? rec3D.notifDate||'—' : '—',
        rec3G ? rec3G.notifDate||'—' : '—',
        '<button class="btn btn-sm ' + (isActive ? 'btn-primary' : 'btn-secondary') + '" data-sr="' + s.srNo + '" style="font-size:12px">' + (isActive ? '✓ Editing' : '✎ Open') + '</button>'
      ];
      cells.forEach(function(html) {
        var td = document.createElement('td');
        td.style.cssText = 'padding:11px 16px;font-size:13px;font-family:' + (html.includes('—') || html.match(/\d{4}-\d{2}/) ? 'monospace' : 'inherit');
        td.innerHTML = html;
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
  }

  // Sr. row/button clicks
  document.querySelectorAll('[data-sr],[data-sr-row]').forEach(function(el) {
    el.addEventListener('click', function() {
      const srNo = parseInt(this.getAttribute('data-sr') || this.getAttribute('data-sr-row'));
      if (!srNo) return;
      laState.srNo = srNo;
      delete laState._newSrName;
      laState.tab = laState.srNo === 1 ? 'lower3a' : 'upper3A';
      renderLATabs();
    });
  });

  // Stage tab clicks
  document.querySelectorAll('#la-tabs .tab').forEach(function(tabEl) {
    tabEl.addEventListener('click', function() {
      const allowed = this.getAttribute('data-allowed') === 'true';
      const prereq  = this.getAttribute('data-prereq');
      const tabKey  = this.getAttribute('data-tab');
      if (!allowed) { showToast('⚠ Complete ' + prereq + ' First', 'error'); return; }
      laState.tab = tabKey;
      renderLATabs();
    });
  });

  // Render active tab content
  if      (laState.tab === 'lower3a') renderTab_lower3a();
  else if (laState.tab === 'upper3A') renderTab_upper3A(hasLower3a);
  else if (laState.tab === 'jm')      renderTab_JM(hasUpper3A);
  else if (laState.tab === '3d')      renderTab_3D(hasJM);
  else if (laState.tab === '3g')      renderTab_3G(has3D);
}

// ─────────────────────────────────────────────────────
// STAGE 1: 3a (lowercase) — CALA Appointment Notification
// ─────────────────────────────────────────────────────

// Helper: get project length for a given projectId
function getProjectLength(projectId) {
  const p = DB.projects.find(x => x.id === projectId);
  return parseFloat(p?.length)||0;
}
function calcAvailable(inputId, resultId, projectId) {
  const l = getProjectLength(projectId);
  const la = parseFloat(document.getElementById(inputId)?.value)||0;
  const el = document.getElementById(resultId);
  if (el) el.value = l > 0 ? (l - la).toFixed(4) : '';
}
function renderTab_lower3a() {
  const existing = DB.process3a.find(x =>
    x.villageId === laState.villageId && x.projectId === laState.projectId && x.type === 'lower3a');
  const isAdmin = currentUser.role === 'admin';
  // For add village: pre-fill from main village 3a if not yet saved
  const isAddlVil = !!(DB.villages.find(v=>v.id===laState.villageId)?.isAddl);
  let prefill3a = null;
  if (isAddlVil && !existing) {
    // Find main village (same project, same base name without Add)
    const thisVil = DB.villages.find(v=>v.id===laState.villageId);
    const mainVil = DB.villages.find(v=>v.projectId===laState.projectId && !v.isAddl &&
      thisVil?.name.startsWith(v.name.replace(/ Add \(.*\)$/,'')));
    if (mainVil) {
      prefill3a = DB.process3a.find(x=>x.villageId===mainVil.id && x.projectId===laState.projectId && x.type==='lower3a');
    }
  }
  const src3a = existing || prefill3a;
  document.getElementById('la-tab-content').innerHTML = `
    <div class="panel">
      <div class="panel-header">
        <h3>Stage 1: 3a — CALA Appointment Notification</h3>
        <div class="flex gap-2 items-center">
          <span class="badge ${existing ? 'badge-complete' : (prefill3a ? 'badge-3a' : 'badge-pending')}">${existing ? '✓ Saved' : (prefill3a ? '⚡ Pre-filled' : 'Pending')}</span>
          ${isAdmin && existing ? `<button class="btn btn-danger btn-sm" id="del_low3a_btn">🗑 Delete</button>` : ''}
        </div>
      </div>
      <div class="panel-body">
        <div class="alert alert-info" style="margin-bottom:18px">
          ℹ <strong>3a</strong> is the initial notification appointing the Competent Authority for Land Acquisition (CALA) for this village.
        </div>
        <div class="form-grid cols-2">
          <div class="field"><label class="required">3a Notification Date</label>
            <input type="date" id="f_low3a_date" value="${src3a?.notifDate||''}"></div>
          <div class="field"><label class="required">CALA Post / Designation</label>
            <input id="f_low3a_post" value="${src3a?.calaPost||''}" placeholder="e.g. Special Land Acquisition Officer"></div>
          <div class="field"><label class="required">CALA Name</label>
            <input id="f_low3a_name" value="${src3a?.calaName||''}" placeholder="Full name of officer"></div>
          <div class="field"><label>CALA Mobile Number</label>
            <input id="f_low3a_mobile" value="${src3a?.calaMobile||''}" placeholder="10-digit number"></div>
        </div>
        <div class="mt-4">
          <button class="btn btn-primary" id="save_low3a_btn">💾 Save 3a Details</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('save_low3a_btn').addEventListener('click', function() {
    const date   = document.getElementById('f_low3a_date').value;
    const post   = document.getElementById('f_low3a_post').value.trim();
    const name   = document.getElementById('f_low3a_name').value.trim();
    const mobile = document.getElementById('f_low3a_mobile').value.trim();
    if (!date || !post || !name) { showToast('Date, CALA Post and Name are required.', 'error'); return; }
    if (existing) {
      existing.notifDate = date; existing.calaPost = post;
      existing.calaName = name; existing.calaMobile = mobile;
    } else {
      DB.process3a.push({ id: newId(), projectId: laState.projectId, villageId: laState.villageId,
        type: 'lower3a', notifDate: date, calaPost: post, calaName: name, calaMobile: mobile });
    }
    saveDB(); showToast('3a Notification saved! Now enter 3A Details.', 'success'); renderLATabs();
  });
  if (isAdmin && existing && document.getElementById('del_low3a_btn')) {
    document.getElementById('del_low3a_btn').addEventListener('click', function() {
      confirmModal('Delete <strong>3a entry</strong>? This will also delete all downstream entries (3A, JM, 3D, 3G) for this village.', function() {
        deleteVillageProcess(laState.villageId, laState.projectId);
        showToast('3a entry and all downstream data deleted.', 'info'); renderLATabs();
      });
    });
  }
}

// Helper: delete all LA process data for a village+project from a given stage onwards
function deleteFromStage(stage, vid, pid) {
  if (stage <= 1) { // delete 3a lower
    DB.process3a = DB.process3a.filter(x => !(x.villageId===vid && x.projectId===pid && x.type==='lower3a'));
  }
  const delSr = laState.srNo||1;
  if (stage <= 2 && delSr === 1) { // delete 3A lower (only for sr1)
  }
  if (stage <= 2) { // delete 3A upper + guts for this srNo
    const recs = DB.process3a.filter(x => x.villageId===vid && x.projectId===pid && x.type==='upper3A' && (x.srNo||1)===delSr);
    recs.forEach(r => { DB.process3aGuts = DB.process3aGuts.filter(g => g.process3aId !== r.id); });
    DB.process3a = DB.process3a.filter(x => !(x.villageId===vid && x.projectId===pid && x.type==='upper3A' && (x.srNo||1)===delSr));
  }
  if (stage <= 3) { // delete JM + guts for this srNo
    const recs = DB.processJM.filter(x => x.villageId===vid && x.projectId===pid && (x.srNo||1)===delSr);
    recs.forEach(r => { DB.processJMGuts = DB.processJMGuts.filter(g => g.processJMId !== r.id); });
    DB.processJM = DB.processJM.filter(x => !(x.villageId===vid && x.projectId===pid && (x.srNo||1)===delSr));
  }
  if (stage <= 4) { // delete 3D + guts for this srNo
    const recs = DB.process3D.filter(x => x.villageId===vid && x.projectId===pid && (x.srNo||1)===delSr);
    recs.forEach(r => { DB.process3DGuts = DB.process3DGuts.filter(g => g.process3DId !== r.id); });
    DB.process3D = DB.process3D.filter(x => !(x.villageId===vid && x.projectId===pid && (x.srNo||1)===delSr));
  }
  if (stage <= 5) { // delete 3G + guts for this srNo
    const recs = DB.process3G.filter(x => x.villageId===vid && x.projectId===pid && (x.srNo||1)===delSr);
    recs.forEach(r => { DB.process3GGuts = DB.process3GGuts.filter(g => g.process3GId !== r.id); });
    DB.process3G = DB.process3G.filter(x => !(x.villageId===vid && x.projectId===pid && (x.srNo||1)===delSr));
  }
  saveDB();
}

  </tr>`;

function collectGutRows(prefix) {
  const results = [];
  let i = 0;
  while (true) {
    const numEl  = document.getElementById(prefix + '_num_' + i);
    const areaEl = document.getElementById(prefix + '_area_' + i);
    const typeEl = document.getElementById(prefix + '_type_' + i);
    if (!numEl && i > 50) break;
    if (numEl && numEl.value.trim()) {
      results.push({
        num: numEl.value.trim(),
        area: areaEl ? areaEl.value : '',
        landType: typeEl ? typeEl.value : 'Private Land'
      });
    }
    i++;
  }
  return results;
}

// Highlight JM row if modArea > 3A area
function highlightJMRow(input, area3a) {
  const row = input.closest('tr');
  if (!row) return;
  const statusCell = row.querySelector('td:last-child') || row.cells[row.cells.length-1];
  const modVal = parseFloat(input.value) || 0;
  const isAddl = area3a > 0 && modVal > area3a;
  input.style.borderColor = isAddl ? '#f59e0b' : '';
  input.style.background   = isAddl ? 'rgba(245,158,11,0.08)' : '';
  // Update status cell (5th td, index 4)
  const cells = row.querySelectorAll('td');
  if (cells[4]) {
    cells[4].innerHTML = isAddl
      ? '<span style="color:#f59e0b;font-weight:600;font-size:11px">⚠ Additional Area</span>'
      : '<span style="color:#888;font-size:11px">Normal</span>';
  }
}

  document.getElementById('la-tab-content').innerHTML = `
    <div class="panel">
      <div class="panel-header">
        <h3>Stage 4: 3D — Declaration / Award</h3>
        <div class="flex gap-2 items-center">
          <span class="badge ${existing ? 'badge-complete' : 'badge-pending'}">${existing ? '✓ Saved' : 'Pending'}</span>

          <div></div>
          <div class="field">

            <input type="number" id="f3d_lalen" value="${existing?.laLength3d||''}" placeholder="0.00" oninput="calcAvailable('f3d_lalen','f3d_lavail',${laState.projectId})">
          </div>
          <div class="field">
            <label>Project Length Available after 3D (km) <span style="font-size:10px;color:#4ade80">(auto)</span></label>
            <input type="number" id="f3d_lavail" value="${existing?.laLength3d&&DB.projects.find(p=>p.id===laState.projectId)?.length?(parseFloat(DB.projects.find(p=>p.id===laState.projectId).length)-parseFloat(existing.laLength3d)).toFixed(4):''}" placeholder="Auto-calculated" style="background:rgba(74,222,128,0.08);border-color:rgba(74,222,128,0.4)" readonly>
          </div>
        </div>
        <div class="divider"></div>
        <h4 class="mb-4">Gut-wise Beneficiary Details</h4>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Gut Number</th><th>JM Area (Ha)</th><th>Land Type</th><th>Beneficiary Name</th></tr></thead>
            <tbody>
              ${gutSource.map((g, i) => {
                const dg = d3Guts.find(d => d.gutNumber === g.gutNumber);
                // For add village: area from g.area (3A guts); for main: g.modArea (JM guts)
                const gutArea = g.modArea;
                const g3A = guts3A ? guts3A.find(x => x.gutNumber === g.gutNumber) : null;
                const isGovt = g3A && g3A.landType === 'Government Land';
                return `<tr>
                  <td class="mono">${g.gutNumber}</td>
                  <td class="mono">${gutArea}</td>
                  <td><span class="badge" style="${isGovt ? 'background:rgba(148,163,184,0.15);color:#94a3b8' : 'background:rgba(34,197,94,0.15);color:#4ade80'}">${isGovt ? '🏛 Govt' : '🏠 Private'}</span></td>
                  <td><input class="inlineInput" id="d3_ben_${i}" data-gut="${g.gutNumber}" data-area="${gutArea}" data-landtype="${isGovt ? 'Government Land' : 'Private Land'}"
                    value="${dg?.beneficiary||''}" placeholder="${isGovt ? 'Govt. land — no beneficiary needed' : 'Enter beneficiary name'}" style="min-width:220px${isGovt ? ';opacity:0.5' : ''}"></td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
        <div style="text-align:right;font-size:13px;color:var(--text-dim);margin-top:6px;padding-right:4px">
          Total Area: <strong style="color:var(--text)">${gutSource.reduce((s,g)=>s+(parseFloat(g.modArea)||0),0).toFixed(4)} Ha</strong>
        </div>
        <div class="mt-4">
          <button class="btn btn-primary" id="save3D_btn">💾 Save 3D Details</button>
        </div>
      </div>
    </div>
  `;

  document.getElementById('save3D_btn').addEventListener('click', function() {
    const date = document.getElementById('f3d_date').value;

    const guts = gutSource.map((g, i) => {
      const el = document.getElementById('d3_ben_' + i);
      const lt = el ? el.getAttribute('data-landtype') : 'Private Land';
      const gutArea = g.modArea;
      return { gutNumber: g.gutNumber, area: gutArea, beneficiary: el ? el.value : '', landType: lt || 'Private Land' };
    });
    if (existing) {
      existing.notifDate = date; existing.laLength3d = laLength3d; existing.srNo = laState.srNo||1;
      DB.process3DGuts = DB.process3DGuts.filter(g => g.process3DId !== existing.id);

          <p style="color:var(--text-dim)">All guts in this village are <strong>Government Land</strong>.<br>
          No compensation is required as this is a Government to Government transfer.<br>

        ` : `
        <div class="form-grid cols-2" style="max-width:700px">

          </div>
          <div class="field">
            <label>Project Length Available after 3G (km) <span style="font-size:10px;color:#4ade80">(auto)</span></label>
            <input type="number" id="f3g_lavail" value="${existing?.laLength3g&&DB.projects.find(p=>p.id===laState.projectId)?.length?(parseFloat(DB.projects.find(p=>p.id===laState.projectId).length)-parseFloat(existing.laLength3g)).toFixed(4):''}" placeholder="Auto-calculated" style="background:rgba(74,222,128,0.08);border-color:rgba(74,222,128,0.4)" readonly>

        </div>
        <div class="divider"></div>
        <h4 class="mb-4">Compensation per Gut / Beneficiary <span style="font-size:12px;color:var(--text-dim);font-weight:400">(Private Land only)</span></h4>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Gut Number</th><th>Area (Ha)</th><th>Land Type</th><th>Beneficiary</th><th>Compensation (₹)</th></tr></thead>

              ${privateGuts.map((g, i) => {

                return `<tr>
                  <td class="mono">${g.gutNumber}</td>
                  <td class="mono">${g.area}</td>
                  <td><span class="badge b3a" style="background:rgba(34,197,94,0.15);color:#4ade80">🏠 Private</span></td>
                  <td>${g.beneficiary || '—'}</td>
                  <td><input type="number" class="inlineInput" id="g3_comp_${i}"

        guts.forEach(g => DB.process3GGuts.push({ id: newId(), process3GId: existing.id, ...g }));
      } else {
        const id = newId();
        DB.process3G.push({ id, projectId: laState.projectId, villageId: laState.villageId, notifDate: date, laLength3g });
        guts.forEach(g => DB.process3GGuts.push({ id: newId(), process3GId: id, ...g }));

      saveDB(); showToast('3G Compensation saved! Process complete ✓', 'success'); renderLATabs();

  if (isAdmin3G && existing && document.getElementById('del_3g_btn')) {

      confirmModal('Delete <strong>3G compensation entry</strong> for this village?', function() {

function renderReportContent() {
  var sel = document.getElementById('rpt-project');
  var projectId = sel ? sel.value : '';
  var pid = projectId ? parseInt(projectId) : null;
  var projects = pid ? DB.projects.filter(function(p){ return p.id === pid; }) : getMyProjects();

  if (!projects.length) {
    document.getElementById('report-content').innerHTML = '<div class="empty-state"><div class="icon">📋</div><h3>No Data Available</h3><p>Create projects and enter LA process data to generate reports.</p></div>';
    return;
  }

  var CSS = `<style>
  .rpt { font-family: Arial, sans-serif; font-size: 11px; color: #111; }
  .rpt-block { margin-bottom: 36px; border: 1.5px solid #4a7ab5; border-radius: 4px; overflow: hidden; page-break-inside: avoid; }
  .rpt-header { background: #2a5298; color: #fff; padding: 8px 14px; font-size: 13px; font-weight: 700; letter-spacing: 0.3px; }
  .rpt-outer { display: flex; }
  /* LEFT: project info */
  .rpt-left-panel { min-width: 160px; max-width: 170px; background: #f0f4f0; border-right: 2px solid #4a7ab5; padding: 10px 10px; font-size: 10px; line-height: 1.9; }
  .rpt-left-panel .proj-name { font-weight: 700; font-size: 11px; color: #1a3a5c; margin-bottom: 4px; }
  .rpt-status-box { background: #e8f0fb; border: 1px solid #4a7ab5; border-radius: 3px; padding: 5px 8px; text-align: center; margin-top: 8px; font-size: 10px; font-weight: 700; color: #2a5298; }
  /* RIGHT: main content */
  .rpt-right { flex: 1; overflow-x: auto; }
  /* Summary grid — top row */
  .rpt-summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr; border-bottom: 2px solid #4a7ab5; background: #dce6f7; }
  .rpt-sg-cell { padding: 6px 10px; border-right: 1px solid #b0c4de; }
  .rpt-sg-cell:last-child { border-right: none; }
  .rpt-sg-label { font-size: 9px; font-weight: 700; text-transform: uppercase; color: #2a5298; }
  .rpt-sg-val { font-size: 13px; font-weight: 700; color: #111; }
  .rpt-sg-sub { font-size: 9px; color: #555; margin-top: 1px; }
  /* Stage table */
  .rpt-tbl { width: 100%; border-collapse: collapse; }
  .rpt-tbl th { background: #2a5298; color: #fff; padding: 6px 8px; text-align: center; font-size: 10px; border: 1px solid #3a6ab8; white-space: nowrap; }
  .rpt-tbl td { padding: 5px 8px; text-align: center; font-size: 11px; border: 1px solid #ccc; vertical-align: middle; white-space: nowrap; }
  .rpt-stage-lbl { background: #2a5298 !important; color: #fff !important; font-weight: 700; font-size: 13px; text-align: center !important; width: 42px; }
  .rpt-row-lbl { background: #dce6f7; color: #2a5298; font-size: 9px; font-weight: 600; text-align: left !important; padding-left: 8px !important; white-space: nowrap; }
  .rpt-date-row td { background: #f5f8ff; font-size: 10px; color: #444; }
  .rpt-total-cell { background: #fffbea; font-weight: 700; color: #1a3a5c; }
  .rpt-village-row td { background: #e8f0fb; font-weight: 600; color: #2a5298; font-size: 10px; }
  .rpt-3g-done { background: #e8f5ec; color: #1a6b3a; font-weight: 700; }
  .rpt-3g-pending { background: #fff8e1; color: #b45309; font-style: italic; }
  .rpt-na { color: #bbb; }
  @media print {
    .sidebar, #topbar, .panel.mb-4 { display: none !important; }
    body { background: white; }
    .rpt { font-size: 10px; }
  }
  </style>`;

  var html = CSS + '<div class="rpt">';

  projects.forEach(function(p) {
    var pVils = DB.villages.filter(function(v){ return v.projectId === p.id; });

    // ── All records per stage ──
    var all3ARecs = DB.process3a.filter(function(x){ return x.projectId===p.id && x.type==='upper3A'; });
    var allJMRecs = DB.processJM.filter(function(x){ return x.projectId===p.id; });
    var all3DRecs = DB.process3D.filter(function(x){ return x.projectId===p.id; });
    var all3GRecs = DB.process3G.filter(function(x){ return x.projectId===p.id; });
    var first3a   = DB.process3a.find(function(x){ return x.projectId===p.id && x.type==='lower3a'; });
    // All 3a records grouped by CALA officer
    var all3aRecs = DB.process3a.filter(function(x){ return x.projectId===p.id && x.type==='lower3a'; });
    var calaGroups = {};
    all3aRecs.forEach(function(r) {
      var key = (r.calaPost||'—') + '||' + (r.calaName||'—');
      if (!calaGroups[key]) calaGroups[key] = { calaPost: r.calaPost||'—', calaName: r.calaName||'—', dates: {}, vilCount: 0 };
      calaGroups[key].vilCount++;
      if (r.notifDate) calaGroups[key].dates[r.notifDate] = (calaGroups[key].dates[r.notifDate]||0) + 1;
    });
    var calaKeys = Object.keys(calaGroups);

    // ── Sum totals ──
    function sumGuts(recs, gutsDb, key, areaKey) {
      var total = 0, count = 0;
      recs.forEach(function(r){
        var g = gutsDb.filter(function(g){ return g[key]===r.id; });
        g.forEach(function(x){ total += parseFloat(x[areaKey])||0; count++; });
      });
      return { area: total, guts: count };
    }
    var s3A = sumGuts(all3ARecs, DB.process3aGuts, 'process3aId', 'area');
    var sJM = sumGuts(allJMRecs, DB.processJMGuts, 'processJMId', 'modArea');
    var s3D = sumGuts(all3DRecs, DB.process3DGuts, 'process3DId', 'area');
    var s3Gcomp = 0;
    all3GRecs.forEach(function(r){ DB.process3GGuts.filter(function(g){ return g.process3GId===r.id; }).forEach(function(g){ s3Gcomp += parseFloat(g.compensation)||0; }); });

    var totalLA = parseFloat(p.laRequired)||0;
    var pctNow  = totalLA ? ((sJM.area/totalLA)*100).toFixed(2) : '—';
    var pct3D   = totalLA ? ((s3D.area/totalLA)*100).toFixed(2) : '—';

    // ── Villages completed per stage ──
    var vil3ACount = pVils.filter(function(v){ var r=DB.process3a.find(function(x){ return x.projectId===p.id&&x.villageId===v.id&&x.type==='upper3A'; }); return r && DB.process3aGuts.some(function(g){ return g.process3aId===r.id; }); }).length;
    var vilJMCount = pVils.filter(function(v){ return DB.processJM.some(function(x){ return x.projectId===p.id&&x.villageId===v.id; }); }).length;
    var vil3DCount = pVils.filter(function(v){ return DB.process3D.some(function(x){ return x.projectId===p.id&&x.villageId===v.id; }); }).length;
    var vil3GCount = pVils.filter(function(v){ return DB.process3G.some(function(x){ return x.projectId===p.id&&x.villageId===v.id; }); }).length;
    var vil3aCount = pVils.filter(function(v){ return DB.process3a.some(function(x){ return x.projectId===p.id&&x.villageId===v.id&&x.type==='lower3a'; }); }).length;

    // ── Dates per stage — with area and village count per date ──
    function datesWithArea(recs, dateField, gutsDb, gutKey, areaKey) {
      var byDate = {};
      recs.forEach(function(r) {
        var dt = r[dateField]; if (!dt) return;
        if (!byDate[dt]) byDate[dt] = { vils: 0, area: 0 };
        byDate[dt].vils++;
        var guts = gutsDb.filter(function(g){ return g[gutKey] === r.id; });
        guts.forEach(function(g){ byDate[dt].area += parseFloat(g[areaKey])||0; });
      });
      var parts = Object.keys(byDate).sort().map(function(dt){
        var d = byDate[dt];
        return fmtDate(dt)+' ('+d.area.toFixed(4)+' Ha)('+d.vils+' Village)';
      });
      return parts.length ? parts.join(', ') : '<span class="rpt-na">—</span>';
    }
    var dates3A = datesWithArea(all3ARecs, 'notifDate', DB.process3aGuts, 'process3aId', 'area');
    var datesJM = datesWithArea(allJMRecs, 'jmDate',    DB.processJMGuts, 'processJMId', 'modArea');
    var dates3D = datesWithArea(all3DRecs, 'notifDate', DB.process3DGuts, 'process3DId', 'area');
    var dates3G = datesWithArea(all3GRecs, 'notifDate', DB.process3GGuts, 'process3GId', 'compensation');

    // ── Build clubbed stage rows ──
    // Format: Stage | Area Ha (vilCount) | dates comma-separated
    function clubRow(label, bgColor, area, guts, vilCount, dates) {
      var areaStr = area > 0
        ? '<strong>'+area.toFixed(4)+'</strong> Ha &nbsp;<span style="color:#555;font-size:10px">('+vilCount+' vil)</span>'
        : '<span class="rpt-na">Not entered</span>';
      return '<tr>'
        + '<td class="rpt-stage-lbl" style="background:'+bgColor+'!important;width:48px">'+label+'</td>'
        + '<td style="text-align:left;padding:7px 12px;white-space:nowrap">'+areaStr+'</td>'
        + '<td style="text-align:left;padding:7px 12px;font-size:10px;color:#444;word-break:break-word">'+dates+'</td>'
        + '</tr>';
    }

    // ── 3a row — one sub-row per CALA officer ──
    var row3a = calaKeys.length === 0
      ? '<tr><td class="rpt-stage-lbl" style="background:#2d6a8f!important;width:48px">3a</td><td colspan="2" class="rpt-na" style="padding:8px 12px">Not entered</td></tr>'
      : calaKeys.map(function(key, idx) {
          var g = calaGroups[key];
          // dates inline: "date1, date2(n), ..."
          var datesStr = Object.keys(g.dates).sort().map(function(d){
            return fmtDate(d)+' ('+g.dates[d]+' Village)';
          }).join(', ');
          return '<tr>'
            + (idx===0 ? '<td class="rpt-stage-lbl" style="background:#2d6a8f!important;width:48px" rowspan="'+calaKeys.length+'">3a</td>' : '')
            + '<td style="text-align:left;padding:7px 12px;'+(idx>0?'border-top:1px solid #ddd':'')+'">'
            + '<span style="font-weight:600;color:#1a3a5c">'+g.calaPost+'</span><br>'
            + '<span style="font-size:10px;color:#333">'+g.calaName+'</span>&nbsp;'
            + '<span style="font-size:10px;color:#888">('+g.vilCount+' vil)</span>'
            + '</td>'
            + '<td style="text-align:left;padding:7px 12px;font-size:10px;color:#444;word-break:break-word;'+(idx>0?'border-top:1px solid #ddd':'')+'">'
            + datesStr
            + '</td>'
            + '</tr>';
        }).join('');

    // ── 3G row (show compensation) ──
    var row3G = '<tr>'
      + '<td class="rpt-stage-lbl" style="background:#1a6b3a!important">3G</td>'
      + '<td style="text-align:left;padding:8px 12px">'
      + (s3Gcomp > 0
        ? '<strong>₹'+s3Gcomp.toLocaleString('en-IN')+'</strong> &nbsp; <span style="color:#555">('+vil3GCount+' vil)</span>'
        : '<span class="rpt-3g-pending">Pending</span>')
      + '</td>'
      + '<td style="text-align:left;padding:8px 12px;font-size:10px;color:#444;line-height:1.8">'+dates3G+'</td>'
      + '</tr>';

    html += '<div class="rpt-block">'
      + '<div class="rpt-header">'+p.name+'</div>'
      + '<div class="rpt-outer">'

      // LEFT panel
      + '<div class="rpt-left-panel">'
      + '<div class="proj-name">'+p.name+'</div>'
      + 'L = '+(p.length||'—')+' Km<br>'
      + 'Cost = ₹'+(p.tpc||'—')+' Cr<br>'
      + 'Civil Cost = ₹'+(p.civilCost||'—')+' Cr<br>'
      + 'LA Cost = ₹'+(p.laCost||'—')+' Cr<br>'
      + (p.approvalDate ? 'Approved: '+fmtDate(p.approvalDate)+'<br>' : '')
      + '<div class="rpt-status-box">Technical Bids Opened</div>'
      + '</div>'

      // RIGHT
      + '<div class="rpt-right">'

      // Summary grid
      + '<div class="rpt-summary-grid">'
      + '<div class="rpt-sg-cell"><div class="rpt-sg-label">Total LA Req (Ha)</div><div class="rpt-sg-val">'+(p.laRequired||'—')+'</div></div>'
      + '<div class="rpt-sg-cell"><div class="rpt-sg-label">3D/3G Completed (Ha)</div><div class="rpt-sg-val">'+s3D.area.toFixed(4)+'</div></div>'
      + '<div class="rpt-sg-cell"><div class="rpt-sg-label">Project Length (Km)</div><div class="rpt-sg-val">'+(p.length||'—')+'</div></div>'
      + '<div class="rpt-sg-cell"><div class="rpt-sg-label">L-affected Now (Km)</div><div class="rpt-sg-val">'+(p.laLength||'—')+'</div><div class="rpt-sg-sub">after JM</div></div>'
      + '<div class="rpt-sg-cell"><div class="rpt-sg-label">Land Avail Now (%)</div><div class="rpt-sg-val">'+pctNow+'%</div><div class="rpt-sg-sub">JM vs LA Req</div></div>'
      + '<div class="rpt-sg-cell"><div class="rpt-sg-label">3D Completed (%)</div><div class="rpt-sg-val">'+pct3D+'%</div><div class="rpt-sg-sub">'+s3D.area.toFixed(4)+' Ha</div></div>'
      + '</div>'

      // Stage table — 3 columns only: Stage | Area/Info | Date(s)
      + '<table class="rpt-tbl">'
      + '<thead><tr>'
      + '<th style="width:48px">Stage</th>'
      + '<th style="text-align:left;padding-left:12px">Area / Info</th>'
      + '<th style="text-align:left;padding-left:12px;width:200px">Date(s)</th>'
      + '</tr></thead>'
      + '<tbody>'
      + row3a
      + clubRow('3A',  '#3a6ab8', s3A.area, s3A.guts, vil3ACount, dates3A)
      + clubRow('JMS', '#5a3d8a', sJM.area, sJM.guts, vilJMCount, datesJM)
      + clubRow('3D',  '#8a5a00', s3D.area, s3D.guts, vil3DCount, dates3D)
      + row3G
      + '</tbody></table>'

      + '</div>'  // rpt-right
      + '</div>'  // rpt-outer
      + '</div>'; // rpt-block
  });

  html += '</div>';
  document.getElementById('report-content').innerHTML = html;
}

function openCombinedEntry(projectId, stage) {
  var p = DB.projects.find(function(x){ return x.id === projectId; });

  var title = 'Combined Entry — ' + (stage === '3a' ? '3a CALA Notification' : stage === '3A' ? '3A Gut-wise Area' : '3D Declaration') + ' | ' + p.name;

  var body = '';

  if (stage === '3a') {
    body = `
      <div class="alert alert-info" style="margin-bottom:14px">ℹ One 3a notification typically covers all villages for a project. Fill the common details below and select which villages to apply it to.</div>

        <div class="field"><label class="required">3a Notification Date</label><input type="date" id="cb3a-date"></div>
        <div class="field"><label class="required">CALA Post / Designation</label><input id="cb3a-post" placeholder="e.g. Special Land Acquisition Officer"></div>

      </div>
      <div class="divider"></div>
      <h4 style="margin-bottom:10px">Apply to Villages:</h4>
      ${villages.map(function(v){
        var existing = DB.process3a.find(function(x){ return x.villageId===v.id && x.projectId===projectId && x.type==='lower3a'; });
        return '<label style="display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;background:var(--card)">'
          + '<input type="checkbox" class="cb3a-vil" data-vid="'+v.id+'" '+(existing?'':'checked')+' style="width:16px;height:16px;accent-color:var(--accent)">'
          + '<span><strong>'+v.name+'</strong> — '+v.taluka+'</span>'
          + (existing ? ' <span style="margin-left:auto;font-size:11px;color:#4ade80">✅ Already saved ('+fmtDate(existing.notifDate)+')</span>' : '')
          + '</label>';
      }).join('')}`;

  } else if (stage === '3A') {
    body = `
      <div class="alert alert-info" style="margin-bottom:14px">ℹ Enter gut numbers and area for each village. Each village can have different guts. <strong>3a must be saved first</strong> for a village to be editable.</div>
      ${villages.map(function(v){
        var has3a = DB.process3a.some(function(x){ return x.villageId===v.id && x.projectId===projectId && x.type==='lower3a'; });
        var existing = DB.process3a.find(function(x){ return x.villageId===v.id && x.projectId===projectId && x.type==='upper3A'; });
        var existGuts = existing ? DB.process3aGuts.filter(function(g){ return g.process3aId===existing.id; }) : [];
        if (!has3a) return '<div style="padding:10px 14px;border:1px solid var(--border);border-radius:8px;margin-bottom:10px;opacity:0.5"><strong>'+v.name+'</strong> — 3a not saved yet, skipped</div>';
        var gutsHtml = existGuts.length
          ? existGuts.map(function(g,i){ return gutRow3A_combined(v.id, i, g); }).join('')
          : gutRow3A_combined(v.id, 0, {});
        return '<div style="border:1px solid var(--border);border-radius:8px;margin-bottom:14px;overflow:hidden">'
          + '<div style="background:var(--card);padding:8px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)">'
          + '<strong>'+v.name+' ('+v.taluka+')</strong>'
          + (existing ? '<span style="font-size:11px;color:#4ade80">✅ Saved: '+fmtDate(existing.notifDate)+'</span>' : '')
          + '</div>'
          + '<div style="padding:12px">'
          + '<div class="field" style="max-width:220px;margin-bottom:10px"><label class="required">3A Notification Date</label><input type="date" id="cb3A-date-'+v.id+'" value="'+(existing?existing.notifDate:'')+'"></div>'
          + '<table style="width:100%;border-collapse:collapse"><thead><tr><th style="padding:5px 8px;background:var(--surface);text-align:left;font-size:11px">#</th><th style="padding:5px 8px;background:var(--surface);font-size:11px">Gut No.</th><th style="padding:5px 8px;background:var(--surface);font-size:11px">Area (Ha)</th><th style="padding:5px 8px;background:var(--surface);font-size:11px">Land Type</th><th></th></tr></thead>'
          + '<tbody id="cb3A-body-'+v.id+'">' + gutsHtml + '</tbody></table>'
          + '<button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="addCombinedGutRow('+v.id+')">+ Add Gut</button>'
          + '</div></div>';
      }).join('')}`;

  } else if (stage === '3D') {
    body = `
      <div class="alert alert-info" style="margin-bottom:14px">ℹ Enter beneficiary names for each village. JM must be saved for guts to appear.</div>
      ${villages.map(function(v){
        var hasJM = DB.processJM.some(function(x){ return x.villageId===v.id && x.projectId===projectId; });
        var existing3D = DB.process3D.find(function(x){ return x.villageId===v.id && x.projectId===projectId; });
        var jmRec = DB.processJM.find(function(x){ return x.villageId===v.id && x.projectId===projectId; });
        var jmGuts = jmRec ? DB.processJMGuts.filter(function(g){ return g.processJMId===jmRec.id; }) : [];
        var d3Guts = existing3D ? DB.process3DGuts.filter(function(g){ return g.process3DId===existing3D.id; }) : [];
        var rec3A = DB.process3a.find(function(x){ return x.villageId===v.id && x.projectId===projectId && x.type==='upper3A'; });
        var guts3A = rec3A ? DB.process3aGuts.filter(function(g){ return g.process3aId===rec3A.id; }) : [];
        if (!hasJM) return '<div style="padding:10px 14px;border:1px solid var(--border);border-radius:8px;margin-bottom:10px;opacity:0.5"><strong>'+v.name+'</strong> — JM not saved yet, skipped</div>';
        return '<div style="border:1px solid var(--border);border-radius:8px;margin-bottom:14px;overflow:hidden">'
          + '<div style="background:var(--card);padding:8px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)">'
          + '<strong>'+v.name+' ('+v.taluka+')</strong>'
          + (existing3D ? '<span style="font-size:11px;color:#4ade80">✅ Saved: '+fmtDate(existing3D.notifDate)+'</span>' : '')
          + '</div>'
          + '<div style="padding:12px">'
          + '<div class="field" style="max-width:220px;margin-bottom:10px"><label class="required">3D Notification Date</label><input type="date" id="cb3D-date-'+v.id+'" value="'+(existing3D?existing3D.notifDate:'')+'"></div>'
          + '<table style="width:100%;border-collapse:collapse"><thead><tr>'
          + '<th style="padding:5px 8px;background:var(--surface);font-size:11px">Gut No.</th>'
          + '<th style="padding:5px 8px;background:var(--surface);font-size:11px">JM Area (Ha)</th>'
          + '<th style="padding:5px 8px;background:var(--surface);font-size:11px">Land Type</th>'
          + '<th style="padding:5px 8px;background:var(--surface);font-size:11px">Beneficiary Name</th>'
          + '</tr></thead><tbody>'
          + jmGuts.map(function(g){
              var dg = d3Guts.find(function(x){ return x.gutNumber===g.gutNumber; });
              var g3A = guts3A.find(function(x){ return x.gutNumber===g.gutNumber; });
              var isGovt = g3A && g3A.landType==='Government Land';
              return '<tr>'
                + '<td class="mono" style="padding:5px 8px;border:1px solid var(--border)">'+g.gutNumber+'</td>'
                + '<td class="mono" style="padding:5px 8px;border:1px solid var(--border)">'+g.modArea+'</td>'
                + '<td style="padding:5px 8px;border:1px solid var(--border)"><span style="font-size:10px;'+(isGovt?'color:#94a3b8':'color:#4ade80')+'">'+(isGovt?'🏛 Govt':'🏠 Private')+'</span></td>'
                + '<td style="padding:5px 8px;border:1px solid var(--border)"><input class="inlineInput" id="cb3D-ben-'+v.id+'-'+g.gutNumber+'" data-gut="'+g.gutNumber+'" data-area="'+g.modArea+'" data-landtype="'+(isGovt?'Government Land':'Private Land')+'" value="'+(dg?dg.beneficiary:'')+'" placeholder="'+(isGovt?'Govt land':'Enter beneficiary')+'" style="min-width:180px'+(isGovt?';opacity:0.5':'')+'"'+(isGovt?' disabled':'')+'/></td>'
                + '</tr>';
            }).join('')
          + '</tbody></table></div></div>';
      }).join('')}`;
  }

  openModal(title, body, [
    { label: 'Cancel', cls: 'btn-secondary', action: closeModal },
    { label: '💾 Save All', cls: 'btn-primary', action: function(){ saveCombinedEntry(projectId, stage, villages); } }
  ]);
  document.querySelector('.modal').classList.add('wide');
  // init gut counters for 3A
  if (stage === '3A') {
    window._cbGutCount = window._cbGutCount || {};
    villages.forEach(function(v){
      var existing = DB.process3a.find(function(x){ return x.villageId===v.id && x.projectId===projectId && x.type==='upper3A'; });
      var existGuts = existing ? DB.process3aGuts.filter(function(g){ return g.process3aId===existing.id; }) : [];
      window._cbGutCount[v.id] = Math.max(existGuts.length, 1);
    });
  }
}

function gutRow3A_combined(vid, i, g) {
  var isGovt = g.landType === 'Government Land';
  return '<tr id="cbrow-'+vid+'-'+i+'">'
    + '<td class="mono" style="padding:4px 6px;border:1px solid var(--border)">'+(i+1)+'</td>'
    + '<td style="padding:4px 6px;border:1px solid var(--border)"><input class="inlineInput" id="cbg-num-'+vid+'-'+i+'" value="'+(g.gutNumber||'')+'" placeholder="Gut No." style="width:90px"></td>'
    + '<td style="padding:4px 6px;border:1px solid var(--border)"><input type="number" class="inlineInput" id="cbg-area-'+vid+'-'+i+'" value="'+(g.area||'')+'" placeholder="0.00" style="width:80px"></td>'
    + '<td style="padding:4px 6px;border:1px solid var(--border)"><select class="inlineInput" id="cbg-type-'+vid+'-'+i+'" style="min-width:140px">'
    + '<option value="Private Land" '+((!isGovt)?'selected':'')+'>🏠 Private Land</option>'
    + '<option value="Government Land" '+(isGovt?'selected':'')+'>🏛 Government Land</option>'
    + '</select></td>'
    + '<td style="padding:4px 6px"><button class="btn btn-danger btn-sm" onclick="document.getElementById(\'cbrow-'+vid+'-'+i+'\').remove()">✕</button></td>'
    + '</tr>';
}

function addCombinedGutRow(vid) {
  if (!window._cbGutCount) window._cbGutCount = {};
  var i = window._cbGutCount[vid] || 0;
  window._cbGutCount[vid] = i + 1;
  var tbody = document.getElementById('cb3A-body-' + vid);
  if (tbody) tbody.insertAdjacentHTML('beforeend', gutRow3A_combined(vid, i, {}));
}

function saveCombinedEntry(projectId, stage, villages) {
  var saved = 0, skipped = 0;

  if (stage === '3a') {
    var date   = document.getElementById('cb3a-date')?.value;
    var post   = document.getElementById('cb3a-post')?.value.trim();
    var name   = document.getElementById('cb3a-name')?.value.trim();
    var mobile = document.getElementById('cb3a-mobile')?.value.trim();
    if (!date || !post || !name) { showToast('Date, CALA Post and Name are required.', 'error'); return; }
    document.querySelectorAll('.cb3a-vil').forEach(function(cb) {
      if (!cb.checked) return;
      var vid = parseInt(cb.getAttribute('data-vid'));
      var existing = DB.process3a.find(function(x){ return x.villageId===vid && x.projectId===projectId && x.type==='lower3a'; });
      if (existing) {
        existing.notifDate=date; existing.calaPost=post; existing.calaName=name; existing.calaMobile=mobile;
      } else {
        DB.process3a.push({ id:newId(), projectId:projectId, villageId:vid, type:'lower3a', notifDate:date, calaPost:post, calaName:name, calaMobile:mobile });
      }
      saved++;
    });

  } else if (stage === '3A') {
    villages.forEach(function(v) {
      var dateEl = document.getElementById('cb3A-date-' + v.id);
      if (!dateEl) return;
      var date = dateEl.value;
      if (!date) { skipped++; return; }
      // collect guts
      var guts = [];
      var count = window._cbGutCount ? (window._cbGutCount[v.id]||0) : 0;
      for (var i = 0; i < count + 5; i++) {
        var numEl = document.getElementById('cbg-num-'+v.id+'-'+i);
        if (!numEl) continue;
        if (numEl.value.trim()) {
          guts.push({
            num: numEl.value.trim(),
            area: (document.getElementById('cbg-area-'+v.id+'-'+i)||{}).value || '',
            landType: (document.getElementById('cbg-type-'+v.id+'-'+i)||{}).value || 'Private Land'
          });
        }
      }
      if (!guts.length) { skipped++; return; }
      var existing = DB.process3a.find(function(x){ return x.villageId===v.id && x.projectId===projectId && x.type==='upper3A'; });
      if (existing) {
        existing.notifDate = date;
        DB.process3aGuts = DB.process3aGuts.filter(function(g){ return g.process3aId !== existing.id; });
        guts.forEach(function(g){ DB.process3aGuts.push({ id:newId(), process3aId:existing.id, gutNumber:g.num, area:g.area, landType:g.landType }); });
      } else {
        var id = newId();
        DB.process3a.push({ id:id, projectId:projectId, villageId:v.id, type:'upper3A', notifDate:date });
        guts.forEach(function(g){ DB.process3aGuts.push({ id:newId(), process3aId:id, gutNumber:g.num, area:g.area, landType:g.landType }); });
      }
      saved++;
    });

  } else if (stage === '3D') {
    villages.forEach(function(v) {
      var dateEl = document.getElementById('cb3D-date-' + v.id);
      if (!dateEl) return;
      var date = dateEl.value;
      if (!date) { skipped++; return; }
      var jmRec = DB.processJM.find(function(x){ return x.villageId===v.id && x.projectId===projectId; });
      if (!jmRec) { skipped++; return; }
      var jmGuts = DB.processJMGuts.filter(function(g){ return g.processJMId===jmRec.id; });
      var gutData = jmGuts.map(function(g){
        var el = document.getElementById('cb3D-ben-'+v.id+'-'+g.gutNumber);
        return { gutNumber:g.gutNumber, area:g.modArea, beneficiary: el ? el.value : '', landType: el ? el.getAttribute('data-landtype') : 'Private Land' };
      });
      var existing = DB.process3D.find(function(x){ return x.villageId===v.id && x.projectId===projectId; });
      if (existing) {
        existing.notifDate = date;
        DB.process3DGuts = DB.process3DGuts.filter(function(g){ return g.process3DId !== existing.id; });
        gutData.forEach(function(g){ DB.process3DGuts.push({ id:newId(), process3DId:existing.id, gutNumber:g.gutNumber, area:g.area, beneficiary:g.beneficiary, landType:g.landType }); });
      } else {
        var id = newId();
        DB.process3D.push({ id:id, projectId:projectId, villageId:v.id, notifDate:date });
        gutData.forEach(function(g){ DB.process3DGuts.push({ id:newId(), process3DId:id, gutNumber:g.gutNumber, area:g.area, beneficiary:g.beneficiary, landType:g.landType }); });
      }
      saved++;
    });
  }

  saveDB();
  closeModal();
  var msg = '✅ Saved '+saved+' village(s)' + (skipped ? ', skipped '+skipped+' (missing data).' : '.');
  showToast(msg, 'success');
  renderDashboard();
}

function exportCSV() {
  const rows = [['Project','TAFS','Village','Taluka','Gut No','3a Notif Date','3A Area (Ha)','JM Area (Ha)','Beneficiary','Compensation (Rs)']];
  getMyProjects().forEach(function(p) {
    var pVils = DB.villages.filter(function(v){ return v.projectId === p.id; });
    pVils.forEach(function(vil) {
      var rec3A = DB.process3a.find(function(x){ return x.projectId===p.id && x.villageId===vil.id && x.type==='upper3A'; });
      var rec3a = DB.process3a.find(function(x){ return x.projectId===p.id && x.villageId===vil.id && x.type==='lower3a'; });
      var guts  = rec3A ? DB.process3aGuts.filter(function(g){ return g.process3aId===rec3A.id; }) : [];
      var vJM   = DB.processJM.find(function(x){ return x.projectId===p.id && x.villageId===vil.id; });
      var v3D   = DB.process3D.find(function(x){ return x.projectId===p.id && x.villageId===vil.id; });
      var v3G   = DB.process3G.find(function(x){ return x.projectId===p.id && x.villageId===vil.id; });
      if (!guts.length) {
        rows.push([p.name, p.tafsNo||'', vil.name, vil.taluka, '—', rec3a?fmtDate(rec3a.notifDate):'', '', '', '', '']);
      } else {
        guts.forEach(function(g) {
          var jg = vJM ? DB.processJMGuts.find(function(j){ return j.processJMId===vJM.id && j.gutNumber===g.gutNumber; }) : null;
          var dg = v3D ? DB.process3DGuts.find(function(d){ return d.process3DId===v3D.id && d.gutNumber===g.gutNumber; }) : null;
          var gg = v3G ? DB.process3GGuts.find(function(x){ return x.process3GId===v3G.id && x.gutNumber===g.gutNumber; }) : null;
          rows.push([p.name, p.tafsNo||'', vil.name, vil.taluka, g.gutNumber, rec3a?fmtDate(rec3a.notifDate):'', g.area||'', jg?jg.modArea:'', dg?dg.beneficiary:'', gg?gg.compensation:'']);
        });
      }
    });
  });
  var csv = rows.map(function(r){ return r.map(function(x){ return '"'+(x+'').replace(/"/g,'""')+'"'; }).join(','); }).join('\n');

  // Use data URI instead of createObjectURL (works in sandboxed iframes)
  var dataUri = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  var a = document.createElement('a');
  a.href = dataUri;
  a.download = 'LA_Report_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  showToast('CSV exported! Check your downloads.', 'success');
}

function openModal(title, body, buttons) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  const footer = document.getElementById('modal-footer');
  footer.innerHTML = '';
  buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'btn ' + b.cls;
    btn.textContent = b.label;
    btn.addEventListener('click', b.action);
    footer.appendChild(btn);
  });
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-box').classList.remove('wide');
}

// Custom confirm dialog — replaces browser confirm() which is blocked in iframes
function confirmModal(message, onConfirm) {
  openModal('Confirm Action',
    `<div style="font-size:15px;line-height:1.6;color:var(--text)">${message}</div>`,
    [
      { label: 'Cancel',  cls: 'btn-secondary', action: function() { closeModal(); } },
      { label: 'Confirm Delete', cls: 'btn-danger',    action: function() { closeModal(); onConfirm(); } }
    ]
  );
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  const icons = { success: '✅', error: '❌', info: 'ℹ' };
  t.innerHTML = `<span>${icons[type]||'ℹ'}</span> ${msg}`;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

  { id:'projects',       label:'Projects',          icon:'📁', actions:['view','edit','delete'] },

function getUserPerm(userId, moduleId) {
  // Admin always has full access
  if (currentUser.role === 'admin') return { can_view:true, can_edit:true, can_delete:true };
  const uid = userId || currentUser.id;
  const p = (DB.userPermissions||[]).find(x => x.user_id === uid && x.module === moduleId);
  // Default: view=true, edit=true, delete=false if no explicit record
  return p || { can_view:true, can_edit:true, can_delete:false };
}

function canView(moduleId)   { return getUserPerm(currentUser.id, moduleId).can_view; }
function canEdit(moduleId)   { return getUserPerm(currentUser.id, moduleId).can_edit; }
function canDelete(moduleId) { return getUserPerm(currentUser.id, moduleId).can_delete; }

    <div style="max-width:900px">
      <div class="panel">
        <div class="panel-header"><h3>⚙️ User Permission Settings</h3></div>
        <div class="panel-body">
          <div class="field" style="max-width:360px;margin-bottom:0">
            <label style="font-weight:600">Select User</label>
            <select id="settings-user-sel" style="width:100%;background:#1e293b;border:1px solid #475569;border-radius:6px;padding:8px 12px;color:#f1f5f9;font-size:14px;color-scheme:dark">
              <option value="">— Select a user —</option>

            </select>

        </div>
      </div>

    const sel = document.getElementById('settings-user-sel');

async function loadPermPanel(userId) {
  const panel = document.getElementById('perm-panel');
  panel.innerHTML = '<div style="color:var(--text-dim);padding:12px">Loading permissions...</div>';

  // Fetch permissions for this user
  let perms = [];
  try { perms = await api('GET','/api/permissions/'+userId); } catch(e) {}

  // Build permMap: moduleId → {can_view, can_edit, can_delete}
  settingsState.permMap = {};
  MODULES.forEach(m => {
    const p = perms.find(x=>x.module===m.id);
    settingsState.permMap[m.id] = {
      can_view:   p ? p.can_view   : true,
      can_edit:   p ? p.can_edit   : true,
      can_delete: p ? p.can_delete : false,
    };
  });

  const user = (DB.users||[]).find(u=>u.id===userId);

  panel.innerHTML = `
    <div class="panel">
      <div class="panel-header">
        <h3>Permissions for <span style="color:var(--accent)">${user?.username||'User'}</span></h3>
        <button class="btn btn-primary btn-sm" id="save-perms-btn">💾 Save Permissions</button>
      </div>
      <div class="panel-body" style="padding:0">
        <table style="width:100%;border-collapse:collapse">
          <thead>
            <tr style="background:var(--surface)">
              <th style="padding:12px 18px;text-align:left;font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px">Module</th>
              <th style="padding:12px 18px;text-align:center;font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;width:120px">👁 View</th>
              <th style="padding:12px 18px;text-align:center;font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;width:120px">✏️ Edit</th>
              <th style="padding:12px 18px;text-align:center;font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;width:120px">🗑 Delete</th>
            </tr>
          </thead>
          <tbody id="perm-tbody"></tbody>
        </table>
      </div>
      <div style="padding:12px 18px;border-top:1px solid var(--border);font-size:12px;color:var(--text-dim)">
        💡 Disabling <strong>View</strong> will hide the module from the user's sidebar entirely.
      </div>
    </div>`;

  renderPermRows();

  document.getElementById('save-perms-btn').addEventListener('click', () => savePermissions(userId));
}

function renderPermRows() {
  const tbody = document.getElementById('perm-tbody');
  if (!tbody) return;
  tbody.innerHTML = '';
  MODULES.forEach(m => {
    const p = settingsState.permMap[m.id];
    const tr = document.createElement('tr');
    tr.style.cssText = 'border-top:1px solid var(--border)';
    const hasEdit   = m.actions.includes('edit');
    const hasDelete = m.actions.includes('delete');

    tr.innerHTML = `
      <td style="padding:14px 18px">
        <span style="font-size:16px;margin-right:8px">${m.icon}</span>
        <span style="font-weight:600;color:var(--text)">${m.label}</span>
      </td>
      <td style="padding:14px 18px;text-align:center">
        ${makeToggle('perm-view-'+m.id, p.can_view, m.id, 'view')}
      </td>
      <td style="padding:14px 18px;text-align:center">
        ${hasEdit ? makeToggle('perm-edit-'+m.id, p.can_edit, m.id, 'edit') : '<span style="color:var(--text-dim);font-size:12px">—</span>'}
      </td>
      <td style="padding:14px 18px;text-align:center">
        ${hasDelete ? makeToggle('perm-del-'+m.id, p.can_delete, m.id, 'delete') : '<span style="color:var(--text-dim);font-size:12px">—</span>'}
      </td>`;
    tbody.appendChild(tr);
  });

  // Attach toggle events
  MODULES.forEach(m => {
    ['view','edit','delete'].forEach(action => {
      const el = document.getElementById('perm-'+action+'-'+m.id);
      if (el) el.addEventListener('change', function() {
        if (action==='view')   { settingsState.permMap[m.id].can_view   = this.checked; }
        if (action==='edit')   { settingsState.permMap[m.id].can_edit   = this.checked; }
        if (action==='delete') { settingsState.permMap[m.id].can_delete = this.checked; }
        // If view turned off, also turn off edit and delete
        if (action==='view' && !this.checked) {
          settingsState.permMap[m.id].can_edit   = false;
          settingsState.permMap[m.id].can_delete = false;
          const eEl = document.getElementById('perm-edit-'+m.id);
          const dEl = document.getElementById('perm-del-'+m.id);
          if (eEl) eEl.checked = false;
          if (dEl) dEl.checked = false;
        }
        // If edit or delete turned on, also turn on view
        if ((action==='edit'||action==='delete') && this.checked) {
          settingsState.permMap[m.id].can_view = true;
          const vEl = document.getElementById('perm-view-'+m.id);
          if (vEl) vEl.checked = true;
        }
        updateToggleStyle('perm-view-'+m.id,   settingsState.permMap[m.id].can_view);
        updateToggleStyle('perm-edit-'+m.id,   settingsState.permMap[m.id].can_edit);
        updateToggleStyle('perm-del-'+m.id,    settingsState.permMap[m.id].can_delete);
      });
    });
  });
}

function makeToggle(id, checked, moduleId, action) {
  const color = checked ? '#4ade80' : '#475569';
  const label = checked ? 'Allowed' : 'Restricted';
  return `<label style="display:inline-flex;align-items:center;gap:8px;cursor:pointer">
    <div style="position:relative;display:inline-block;width:44px;height:24px">
      <input type="checkbox" id="${id}" ${checked?'checked':''} style="opacity:0;width:0;height:0;position:absolute">
      <div id="trk-${id}" style="position:absolute;top:0;left:0;right:0;bottom:0;border-radius:12px;background:${color};transition:background 0.2s;cursor:pointer">
        <div style="position:absolute;top:3px;${checked?'right:3px':'left:3px'};width:18px;height:18px;border-radius:50%;background:#fff;transition:all 0.2s"></div>
      </div>
    </div>
    <span id="lbl-${id}" style="font-size:12px;color:${color};font-weight:600;min-width:60px">${label}</span>
  </label>`;
}

function updateToggleStyle(id, checked) {
  const trk = document.getElementById('trk-'+id);
  const lbl = document.getElementById('lbl-'+id);
  if (!trk || !lbl) return;
  const color = checked ? '#4ade80' : '#475569';
  trk.style.background = color;
  trk.querySelector('div').style.cssText = 'position:absolute;top:3px;'+(checked?'right:3px':'left:3px')+';width:18px;height:18px;border-radius:50%;background:#fff;transition:all 0.2s';
  lbl.style.color = color;
  lbl.textContent = checked ? 'Allowed' : 'Restricted';
}

async function savePermissions(userId) {
  const permissions = MODULES.map(m => ({
    module:     m.id,
    can_view:   settingsState.permMap[m.id].can_view,
    can_edit:   settingsState.permMap[m.id].can_edit,
    can_delete: settingsState.permMap[m.id].can_delete,
  }));
  try {
    const saved = await api('POST','/api/permissions/'+userId, { permissions });
    // Update local DB
    DB.userPermissions = (DB.userPermissions||[]).filter(p=>p.user_id!==userId);
    saved.forEach(p => DB.userPermissions.push(p));
    showToast('Permissions saved successfully!','success');
  } catch(e) { showToast('Error saving: '+e.message,'error'); }
}

// ── Chainage coverage helpers ──
function getChainageGaps(nhFrom, nhTo, stretches) {
  // Returns array of {from, to} gaps not yet covered
  const sorted = [...stretches].sort((a,b) => parseFloat(a.chainage_from)-parseFloat(b.chainage_from));
  const gaps = [];
  let cursor = parseFloat(nhFrom);
  const end  = parseFloat(nhTo);
  for (const s of sorted) {
    const sf = parseFloat(s.chainage_from);
    const st = parseFloat(s.chainage_to);
    if (sf > cursor + 0.001) gaps.push({ from: cursor, to: sf });
    if (st > cursor) cursor = st;
  }
  if (cursor < end - 0.001) gaps.push({ from: cursor, to: end });
  return gaps;
}

function getNextChainageFrom(nhFrom, stretches) {
  if (!stretches.length) return parseFloat(nhFrom);
  const sorted = [...stretches].sort((a,b) => parseFloat(a.chainage_from)-parseFloat(b.chainage_from));
  let cursor = parseFloat(nhFrom);
  for (const s of sorted) {
    const sf = parseFloat(s.chainage_from);
    const st = parseFloat(s.chainage_to);
    if (sf > cursor + 0.001) return cursor; // gap found
    if (st > cursor) cursor = st;
  }
  return cursor; // after last stretch
}

              length:r.length||null, sort_order:i
