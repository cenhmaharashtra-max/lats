/* ── helpers ── */
function effectiveLosses(user, sitoutMap){
  return (user.losses||0) + (sitoutMap ? (sitoutMap[user.id]||0) : 0) * 0.5;
}

function sortUsers(users,sitoutMap={}) {
  return [...users].sort((a,b)=>{
    const la=effectiveLosses(a,sitoutMap);
    const lb=effectiveLosses(b,sitoutMap);
    if(la!==lb) return la-lb;
    const wa=a.wins||0,wb=b.wins||0;
    if(wa!==wb) return wb-wa;
    return a.name.localeCompare(b.name);
  });
}

/* ── qualifier tab ── */
function QualifierTab({ users, seasonId, qualData, onSaveQual, isAdmin, sitoutMap }){
  const sorted=sortUsers(users, sitoutMap||{});
  const top4=sorted.slice(0,4);
  const has4=top4.length>=4;
  const [q,setQ]=useState(qualData||{});
  const [saving,setSaving]=useState(false);
  useEffect(()=>{ setQ(qualData||{}); },[qualData]);

  const save=async(newQ)=>{ setSaving(true); await onSaveQual(newQ); setSaving(false); };
  const pick=(key,val)=>{
    let newQ={...q,[key]:val};
    if(key==="q1Winner"||key==="elWinner"){delete newQ.q2Winner;delete newQ.finalWinner;}
    if(key==="q2Winner") delete newQ.finalWinner;
    setQ(newQ); save(newQ);
  };
  const reset=()=>{ const n={}; setQ(n); save(n); };

  const medalColors=["#f59e0b","#94a3b8","#cd7f32","#3b82f6"];
  const medalLabels=["1st","2nd","3rd","4th"];
  const p=i=>top4[i]||null;
  const q1T1=p(0),q1T2=p(1),elT1=p(2),elT2=p(3);
  const q1W=q.q1Winner?users.find(u=>u.id===q.q1Winner):null;
  const q1L=q.q1Winner?(q.q1Winner===q1T1?.id?q1T2:q1T1):null;
  const elW=q.elWinner?users.find(u=>u.id===q.elWinner):null;
  const elL=q.elWinner?(q.elWinner===elT1?.id?elT2:elT1):null;
  const q2W=q.q2Winner?users.find(u=>u.id===q.q2Winner):null;
  const q2L=q.q2Winner?(q.q2Winner===q1L?.id?elW:q1L):null;
  const finW=q.finalWinner?users.find(u=>u.id===q.finalWinner):null;

  const MatchCard=({title,team1,team2,winnerKey,color,badge,locked})=>{
    const winner=q[winnerKey]?users.find(u=>u.id===q[winnerKey]):null;
    const canPlay=team1&&team2;
    const canInteract=isAdmin&&!locked;
    return (
      <div style={{background:C.surface,borderRadius:14,border:`2px solid ${color}`,padding:14,marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{background:color,color:color==="#f59e0b"?"#000":"#fff",borderRadius:6,padding:"2px 10px",fontSize:12,fontWeight:700}}>{badge}</span>
            <span style={{fontFamily:"Rajdhani,sans-serif",fontSize:15,fontWeight:700,color:C.text}}>{title}</span>
          </div>
          {winner&&isAdmin&&!locked&&<button onClick={()=>pick(winnerKey,null)} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,cursor:"pointer",fontSize:11,padding:"3px 8px",borderRadius:4}}>Reset</button>}
        </div>
        {!canPlay?(
          <div style={{color:C.muted,fontSize:13,textAlign:"center",padding:"8px 0"}}>Waiting for previous round…</div>
        ):(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {[team1,team2].map((t,i)=>{
              if(!t) return <div key={i}/>;
              const isW=winner?.id===t.id, isL=winner&&!isW;
              return (
                <button key={t.id}
                  onClick={()=>canInteract&&!winner&&pick(winnerKey,t.id)}
                  style={{background:isW?"#1a3a1a":isL?"#181818":C.card,
                    border:`2px solid ${isW?C.green:isL?"#2a2a2a":C.border}`,
                    borderRadius:10,padding:"12px 8px",
                    cursor:canInteract&&!winner?"pointer":"default",
                    textAlign:"center",opacity:isL?0.4:1,transition:"all .15s"}}>
                  <div style={{fontSize:14,fontWeight:600,color:isW?C.green:C.text,marginBottom:4,wordBreak:"break-word"}}>{t.name}</div>
                  <div style={{fontSize:11,color:C.muted}}>
                    <span style={{color:C.green}}>W{t.wins||0}</span> <span style={{color:C.accent2}}>L{t.losses||0}</span>
                  </div>
                  {isW&&<div style={{marginTop:5,fontSize:11,color:C.green,fontWeight:600}}>✓ WINNER</div>}
                  {isL&&<div style={{marginTop:5,fontSize:11,color:C.muted}}>eliminated</div>}
                  {!winner&&canInteract&&<div style={{marginTop:5,fontSize:10,color:C.muted}}>tap to select</div>}
                  {!winner&&!isAdmin&&<div style={{marginTop:5,fontSize:10,color:C.muted}}>pending</div>}
                </button>
              );
            })}
          </div>
        )}
      </div>
    );
  };

  return (
    <div style={{padding:16}}>
      <div style={{fontFamily:"Rajdhani,sans-serif",fontSize:15,fontWeight:700,color:C.accent,marginBottom:10}}>Top 4 Standings</div>
      {!has4&&<div style={{color:C.muted,fontSize:13,marginBottom:16,background:C.surface,borderRadius:10,padding:"10px 14px",border:`1px solid ${C.border}`}}>Need at least 4 players. Currently {sorted.length} player{sorted.length!==1?"s":""}.</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:16}}>
        {[0,1,2,3].map(i=>(
          <div key={i} style={{background:C.surface,borderRadius:10,padding:"10px 8px",border:`1px solid ${C.border}`,borderTop:`3px solid ${medalColors[i]}`,opacity:top4[i]?1:0.35}}>
            <div style={{fontSize:10,fontWeight:700,color:medalColors[i],marginBottom:3}}>{medalLabels[i]}</div>
            <div style={{fontSize:12,fontWeight:600,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{top4[i]?.name||"—"}</div>
            <div style={{fontSize:10,color:C.muted,marginTop:2}}><span style={{color:C.green}}>W{top4[i]?.wins||0}</span> <span style={{color:C.accent2}}>L{top4[i]?.losses||0}</span></div>
          </div>
        ))}
      </div>
      <div style={{background:"#1a1f0f",border:"1px solid #2a3a1a",borderRadius:10,padding:"10px 14px",marginBottom:16,fontSize:12,color:C.muted,lineHeight:1.6}}>
        <span style={{color:C.accent,fontWeight:600}}>IPL Rules: </span>Q1 winner → Final directly · Q1 loser vs EL winner = Q2 · EL loser = OUT · Q2 winner → Final · Q2 loser = OUT
      </div>
      {has4&&(
        <>
          {saving&&<div style={{textAlign:"center",color:C.muted,fontSize:12,marginBottom:8}}>Saving…</div>}
          {!isAdmin&&<div style={{background:"#1e2a3a",border:`1px solid ${C.blue}`,borderRadius:8,padding:"8px 14px",fontSize:12,color:C.blue,marginBottom:12}}>👁 View only — only admin can select winners</div>}
          <div style={{fontFamily:"Rajdhani,sans-serif",fontSize:12,fontWeight:700,color:C.muted,letterSpacing:2,marginBottom:8}}>ROUND 1</div>
          <MatchCard title="Qualifier 1" badge="Q1" color={C.green} team1={q1T1} team2={q1T2} winnerKey="q1Winner"/>
          <MatchCard title="Eliminator" badge="EL" color={C.accent2} team1={elT1} team2={elT2} winnerKey="elWinner"/>
          <div style={{fontFamily:"Rajdhani,sans-serif",fontSize:12,fontWeight:700,color:C.muted,letterSpacing:2,marginBottom:8,marginTop:4}}>ROUND 2</div>
          <MatchCard title="Qualifier 2" badge="Q2" color={C.blue} team1={q1L} team2={elW} winnerKey="q2Winner" locked={!q1W||!elW}/>
          <div style={{fontFamily:"Rajdhani,sans-serif",fontSize:12,fontWeight:700,color:C.muted,letterSpacing:2,marginBottom:8,marginTop:4}}>FINAL</div>
          <MatchCard title="Final" badge="F" color={C.accent} team1={q1W} team2={q2W} winnerKey="finalWinner" locked={!q2W}/>
          {finW&&(
            <div style={{background:"linear-gradient(135deg,#1f1a08,#2a2010)",border:`2px solid ${C.accent}`,borderRadius:16,padding:20,textAlign:"center",marginTop:8}}>
              <div style={{fontSize:32,marginBottom:6}}>🏆</div>
              <div style={{fontFamily:"Rajdhani,sans-serif",fontSize:22,fontWeight:700,color:C.accent,letterSpacing:2}}>CHAMPION</div>
              <div style={{fontSize:20,fontWeight:600,color:C.text,marginTop:6}}>{finW.name}</div>
              <div style={{fontSize:12,color:C.muted,marginTop:4}}>W{finW.wins||0} · L{finW.losses||0}</div>
            </div>
          )}
          {(elL||q2L)&&(
            <div style={{marginTop:14}}>
              <div style={{fontFamily:"Rajdhani,sans-serif",fontSize:12,fontWeight:700,color:C.muted,letterSpacing:2,marginBottom:8}}>ELIMINATED</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {elL&&<div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 14px",fontSize:13,color:C.muted}}>{elL.name} <span style={{color:C.accent2}}>— After EL</span></div>}
                {q2L&&<div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 14px",fontSize:13,color:C.muted}}>{q2L.name} <span style={{color:C.accent2}}>— After Q2</span></div>}
              </div>
            </div>
          )}
          {isAdmin&&<button onClick={reset} style={{marginTop:14,background:"transparent",color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 16px",fontSize:13,cursor:"pointer",width:"100%"}}>🔄 Reset Bracket</button>}
        </>
      )}
    </div>
  );
}

  const [showCS,setShowCS]=useState(false);
  const [showRules,setShowRules]=useState(false);
  const [cName,setCName]=useState("");
  const [sName,setSName]=useState("");
  const [newUN,setNewUN]=useState("");
  const [sUsers,setSUsers]=useState([]);
  const [delConf,setDelConf]=useState(null);
  const [rules,setRules]=useState("");
  const [showPlayers,setShowPlayers]=useState(false);
  const [newPlayerName,setNewPlayerName]=useState("");
  const [editingPlayer,setEditingPlayer]=useState(null);

  const [frozenContests,setFrozenContests]=useState([]);

  const isAdmin=role==="admin";

  const contest=displayContests.find(c=>c.id===selContest);
  const season=contest?.seasons?.find(s=>s.id===selSeason);

  const fetchAll=useCallback(async()=>{
    setLoading(true);
    const [{data:cR},{data:sR},{data:pR},{data:mR},{data:eR},{data:qR},{data:soR},{data:rR}]=await Promise.all([
      sb.from("contests").select("*").order("created_at"),
      sb.from("seasons").select("*").order("created_at"),
      sb.from("players").select("*"),
      sb.from("milestone_table").select("*"),
      sb.from("closest_escape").select("*").order("sort_order"),
      sb.from("qualifier_data").select("*"),
      sb.from("sitout_table").select("*"),
      sb.from("rulebook").select("*").limit(1),
    ]);
    if(rR&&rR.length>0) setRules(rR[0].content||"");
    const built=(cR||[]).map(c=>({
      ...c,
      seasons:(sR||[]).filter(s=>s.contest_id===c.id).map(s=>({
        ...s,
        users:(pR||[]).filter(p=>p.season_id===s.id),
        qualData:(qR||[]).find(q=>q.season_id===s.id)?.data||{},
        stats:{
          milestoneTable:(mR||[]).filter(m=>m.season_id===s.id),
          closestEscape:(eR||[]).filter(e=>e.season_id===s.id),
          sitoutTable:(soR||[]).filter(o=>o.season_id===s.id),
        }
      }))
    }));
    setContests(built);
    setLoading(false);
  },[]);

  const [refreshing,setRefreshing]=useState(false);
  const [lastRefresh,setLastRefresh]=useState(null);

  const refresh=useCallback(async()=>{
    setRefreshing(true);
    await fetchAll();
    setLastRefresh(new Date());
    setRefreshing(false);
  },[fetchAll]);

  // freeze display data whenever contests updates (from fetchAll)
  // but only apply to frozenContests — display reads from frozenContests
  useEffect(()=>{
    if(contests.length>0||lastRefresh) setFrozenContests(contests);
  },[lastRefresh]);

  // initial load
  useEffect(()=>{ if(role){ fetchAll().then(()=>setLastRefresh(new Date())); } },[role]);

  // auto-refresh every 5 minutes
  useEffect(()=>{
    if(!role) return;
    const t=setInterval(()=>{ fetchAll().then(()=>setLastRefresh(new Date())); },5*60*1000);
    return ()=>clearInterval(t);
  },[role,fetchAll]);

  /* contest CRUD */
  const createContest=async()=>{
    if(!cName.trim()) return; setSaving(true);
    const{data}=await sb.from("contests").insert({name:cName.trim()}).select().single();
    if(data){setSelContest(data.id);setSelSeason(null);}
    setCName(""); setShowCC(false); await fetchAll(); setSaving(false);
  };
  const deleteContest=async(id)=>{
    await sb.from("contests").delete().eq("id",id);
    if(selContest===id){setSelContest(null);setSelSeason(null);}
    await fetchAll();
  };

  /* season CRUD */
  const createSeason=async()=>{
    if(!sName.trim()||!selContest) return; setSaving(true);
    const{data:s}=await sb.from("seasons").insert({contest_id:selContest,name:sName.trim()}).select().single();
    if(s&&sUsers.length>0){
      const{data:players}=await sb.from("players").insert(sUsers.map(u=>({season_id:s.id,name:u,wins:0,losses:0}))).select();
      if(players?.length){
        await sb.from("milestone_table").insert(players.map(p=>({season_id:s.id,player_id:p.id,times:0})));
        await sb.from("sitout_table").insert(players.map(p=>({season_id:s.id,player_id:p.id,sitouts:0,last10:0})));
      }
    }
    if(s) setSelSeason(s.id);
    setSName(""); setSUsers([]); setShowCS(false); await fetchAll(); setSaving(false);
  };
  const deleteSeason=async(sid)=>{
    await sb.from("seasons").delete().eq("id",sid);
    if(selSeason===sid) setSelSeason(null);
    await fetchAll();
  };

  /* points */
  /* player management */
  const addPlayer=async(name)=>{
    if(!name.trim()||!selSeason) return; setSaving(true);
    const{data:p}=await sb.from("players").insert({season_id:selSeason,name:name.trim(),wins:0,losses:0}).select().single();
    if(p){
      await sb.from("milestone_table").insert({season_id:selSeason,player_id:p.id,times:0});
      await sb.from("sitout_table").insert({season_id:selSeason,player_id:p.id,sitouts:0,last10:0});
    }
    await fetchAll(); setSaving(false);
  };
  const editPlayer=async(id,name)=>{
    if(!name.trim()) return; setSaving(true);
    await sb.from("players").update({name:name.trim()}).eq("id",id);
    await fetchAll(); setSaving(false);
  };
  const deletePlayer=async(id)=>{
    await sb.from("players").delete().eq("id",id);
    await fetchAll();
  };

  const updateWL=async(pid,field,val)=>{
    const v=Math.max(0,val);
    // optimistic update — update in-memory without re-sorting display
    const patch=(list)=>list.map(c=>({...c,seasons:c.seasons.map(s=>({...s,users:s.users.map(u=>u.id===pid?{...u,[field]:v}:u)}))}));
    setContests(patch);
    setFrozenContests(patch);
    await sb.from("players").update({[field]:v}).eq("id",pid);
  };

  /* milestone */
  const updateMilestone=async(id,val)=>{
    const v=Math.max(0,val);
    const patch=(list)=>list.map(c=>({...c,seasons:c.seasons.map(s=>({...s,stats:{...s.stats,milestoneTable:s.stats.milestoneTable.map(m=>m.id===id?{...m,times:v}:m)}}))}));
    setContests(patch);
    setFrozenContests(patch);
    await sb.from("milestone_table").update({times:v}).eq("id",id);
  };

  /* sitout — upsert: create row if not yet in DB */
  const updateSitout=async(id,field,val,playerId)=>{
    const v=Math.max(0,val);
    if(id){
      // optimistic update
      const patch=(list)=>list.map(c=>({...c,seasons:c.seasons.map(s=>({...s,stats:{...s.stats,sitoutTable:s.stats.sitoutTable.map(o=>o.id===id?{...o,[field]:v}:o)}}))}));
      setContests(patch);
      setFrozenContests(patch);
      await sb.from("sitout_table").update({[field]:v}).eq("id",id);
    } else {
      const otherField=field==="sitouts"?"last10":"sitouts";
      const{data:newRow}=await sb.from("sitout_table").insert({season_id:selSeason,player_id:playerId,[field]:v,[otherField]:0}).select().single();
      if(newRow){
        const patch=(list)=>list.map(c=>({...c,seasons:c.seasons.map(s=>({...s,stats:{...s.stats,sitoutTable:[...s.stats.sitoutTable,newRow]}}))}));
        setContests(patch);
        setFrozenContests(patch);
      }
    }
  };

  /* closest escape */
  const addCERow=async()=>{
    await sb.from("closest_escape").insert({season_id:selSeason,entry:"",sort_order:(season?.stats?.closestEscape||[]).length});
    await fetchAll();
  };
  const updateCE=async(ceId,val)=>{
    await sb.from("closest_escape").update({entry:val}).eq("id",ceId);
    setContests(prev=>prev.map(c=>c.id!==selContest?c:{...c,seasons:c.seasons.map(s=>s.id!==selSeason?s:{...s,stats:{...s.stats,closestEscape:s.stats.closestEscape.map(e=>e.id===ceId?{...e,entry:val}:e)}})}));
  };
  const deleteCERow=async(ceId)=>{
    await sb.from("closest_escape").delete().eq("id",ceId);
    await fetchAll();
  };

  /* qualifier */
  const saveQualData=async(data)=>{
    const ex=await sb.from("qualifier_data").select("id").eq("season_id",selSeason).single();
    if(ex.data) await sb.from("qualifier_data").update({data}).eq("season_id",selSeason);
    else await sb.from("qualifier_data").insert({season_id:selSeason,data});
    await fetchAll();
  };

  /* rulebook */
  const saveRules=async(text)=>{
    const ex=await sb.from("rulebook").select("id").limit(1).single();
    if(ex.data) await sb.from("rulebook").update({content:text}).eq("id",ex.data.id);
    else await sb.from("rulebook").insert({content:text});
    setRules(text); setShowRules(false); await fetchAll();
  };

  if(!role) return <LoginPage onLogin={r=>setRole(r)}/>;

  /* derived sorted lists */
  // sitout map: player_id -> sitouts count
  const sitoutMap=season?(season.stats?.sitoutTable||[]).reduce((acc,r)=>{acc[r.player_id]=r.sitouts||0;return acc;},{}):{};
  const sortedUsers=season?sortUsers(season.users,sitoutMap):[];

  // milestone: descending by times
  const sortedMilestone=season?[...(season.stats?.milestoneTable||[])].sort((a,b)=>(b.times||0)-(a.times||0)):[];

  // sitout: merge with users, descending by sitouts
  const getSitoutRows=()=>{
    if(!season) return [];
    const soMap=Object.fromEntries((season.stats?.sitoutTable||[]).map(r=>[r.player_id,r]));
    return [...season.users].map(u=>soMap[u.id]||{player_id:u.id,sitouts:0,last10:0,id:null}).sort((a,b)=>(b.sitouts||0)-(a.sitouts||0));
  };
  const sitoutRows=getSitoutRows();

  /* styles */
  const iS={background:C.bg,border:`1px solid ${C.border}`,color:C.text,padding:"12px 14px",borderRadius:8,fontSize:16,fontFamily:"Inter,sans-serif",width:"100%",outline:"none",boxSizing:"border-box"};
  const thS={textAlign:"left",padding:"10px 12px",fontSize:11,color:C.muted,fontWeight:500,textTransform:"uppercase",letterSpacing:".05em",borderBottom:`1px solid ${C.border}`};
  const tdS={padding:"10px 12px",fontSize:14,borderBottom:`1px solid ${C.border}`};
  const mo={position:"fixed",inset:0,background:"rgba(0,0,0,.85)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100};
  const md={background:C.card,border:`1px solid ${C.border}`,borderRadius:"16px 16px 0 0",padding:24,width:"100%",maxWidth:500};
  const tabs=["points","stats","sitouts","qualifier"];

  return (
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"Inter,sans-serif"}}>

      {/* Header */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50}}>
        <div style={{fontFamily:"Rajdhani,sans-serif",fontSize:26,fontWeight:700,color:C.accent,letterSpacing:4}}>ACTL</div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            {saving&&<span style={{fontSize:11,color:C.muted}}>Saving…</span>}
            {lastRefresh&&!saving&&(
              <span style={{fontSize:10,color:C.muted,display:"flex",alignItems:"center",gap:3}}>
                {lastRefresh.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}
              </span>
            )}
            <button onClick={refresh} disabled={refreshing} style={{background:refreshing?"#1e293b":C.surface,color:refreshing?C.muted:C.green,border:`1px solid ${refreshing?C.border:C.green}`,borderRadius:8,padding:"6px 12px",fontSize:13,cursor:refreshing?"default":"pointer",display:"flex",alignItems:"center",gap:4}}>
              <span style={{display:"inline-block",animation:refreshing?"spin 0.8s linear infinite":"none",fontSize:14}}>⟳</span>
              {refreshing?"Refreshing…":"Refresh"}
            </button>
          </div>
          <button onClick={()=>setShowRules(true)} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,borderRadius:8,padding:"6px 12px",fontSize:13,cursor:"pointer"}}>📖 Rules</button>
          <span style={{display:"inline-block",padding:"3px 10px",borderRadius:12,fontSize:11,fontWeight:600,background:isAdmin?"#451a0366":"#1e3a5f66",color:isAdmin?C.accent:C.blue}}>{isAdmin?"👑 Admin":"👤 User"}</span>
          <button style={{background:"transparent",color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 12px",fontSize:13,cursor:"pointer"}} onClick={()=>{setRole(null);setSelContest(null);setSelSeason(null);}}>Logout</button>
        </div>
      </div>

      <div style={{maxWidth:700,margin:"0 auto",padding:16}}>
        {loading?<Spinner/>:(
          <>
            {/* Contests */}
            <div style={{marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <div style={{fontSize:11,color:C.muted,fontWeight:500,textTransform:"uppercase",letterSpacing:1}}>Contests</div>
                {isAdmin&&<button style={{background:C.accent,color:"#000",border:"none",borderRadius:8,padding:"8px 16px",fontSize:14,fontWeight:600,cursor:"pointer"}} onClick={()=>setShowCC(true)}>+ Create Contest</button>}
              </div>
              <div style={{display:"flex",gap:10,overflowX:"auto",paddingBottom:6}}>
                {displayContests.length===0&&<div style={{color:C.muted,fontSize:14,padding:"14px 0"}}>No contests yet.{isAdmin?" Create one!":""}</div>}
                {displayContests.map(c=>(
                  <div key={c.id} onClick={()=>{setSelContest(c.id);setSelSeason(null);}} style={{minWidth:160,background:selContest===c.id?"#1c2416":C.card,border:`1px solid ${selContest===c.id?C.accent:C.border}`,borderRadius:12,padding:"14px 16px",cursor:"pointer",flexShrink:0}}>
                    <div style={{fontSize:15,fontWeight:600,marginBottom:4}}>{c.name}</div>
                    <div style={{fontSize:12,color:C.muted}}>{c.seasons?.length||0} season{c.seasons?.length!==1?"s":""}</div>
                    {isAdmin&&<button onClick={e=>{e.stopPropagation();setDelConf({type:"contest",id:c.id,name:c.name});}} style={{marginTop:10,background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:12,padding:0}}>🗑 Delete</button>}
                  </div>
                ))}
              </div>
            </div>

            {/* Seasons */}
            {contest&&(
              <div style={{marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                  <div>
                    <div style={{fontFamily:"Rajdhani,sans-serif",fontSize:20,fontWeight:700}}>{contest.name}</div>
                    <div style={{fontSize:12,color:C.muted}}>Select a season</div>
                  </div>
                  {isAdmin&&<button style={{background:C.blue,color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:14,cursor:"pointer",fontWeight:600}} onClick={()=>setShowCS(true)}>+ New Season</button>}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10}}>
                  {contest.seasons?.length===0&&<div style={{color:C.muted,fontSize:14}}>No seasons yet.{isAdmin?" Create one!":""}</div>}
                  {contest.seasons?.map(s=>(
                    <div key={s.id} onClick={()=>setSelSeason(s.id)} style={{background:C.card,border:`1px solid ${selSeason===s.id?C.accent:C.border}`,borderRadius:12,padding:"14px 16px",cursor:"pointer"}}>
                      <div style={{fontSize:15,fontWeight:600}}>{s.name}</div>
                      <div style={{fontSize:12,color:C.muted,marginTop:4}}>{s.users?.length||0} players</div>
                      {isAdmin&&<button onClick={e=>{e.stopPropagation();setDelConf({type:"season",id:s.id,name:s.name});}} style={{marginTop:10,background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:12,padding:0}}>🗑 Delete</button>}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Season Detail */}
            {season&&(
              <div style={{background:C.card,borderRadius:16,border:`1px solid ${C.border}`,overflow:"hidden"}}>
                <div style={{padding:"14px 16px",borderBottom:`1px solid ${C.border}`,background:C.surface}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div>
                      <div style={{fontFamily:"Rajdhani,sans-serif",fontSize:18,fontWeight:700,color:C.accent}}>{season.name}</div>
                      <div style={{fontSize:12,color:C.muted,marginTop:2}}>Season · {contest?.name} · {season.users?.length||0} players</div>
                    </div>
                    {isAdmin&&<button onClick={()=>setShowPlayers(true)} style={{background:C.blue,color:"#fff",border:"none",borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:600,cursor:"pointer",flexShrink:0}}>👥 Players</button>}
                  </div>
                </div>
                {/* Tabs */}
                <div style={{padding:"10px 12px",display:"flex",gap:6,borderBottom:`1px solid ${C.border}`,overflowX:"auto"}}>
                  {tabs.map(t=>(
                    <button key={t} onClick={()=>setActiveTab(t)} style={{padding:"10px 14px",borderRadius:8,fontSize:13,fontWeight:500,cursor:"pointer",border:"none",background:activeTab===t?C.accent:"transparent",color:activeTab===t?"#000":C.muted,whiteSpace:"nowrap"}}>
                      {t==="points"?"Points Table":t==="stats"?"Stats":t==="sitouts"?"Sit Outs":"Qualifier"}
                    </button>
                  ))}
                </div>

                {/* ── POINTS TABLE ── */}
                {activeTab==="points"&&(
                  <div style={{paddingBottom:8}}>
                    <table style={{width:"100%",borderCollapse:"collapse"}}>
                      <thead><tr>
                        <th style={thS}>#</th>
                        <th style={thS}>Player</th>
                        <th style={{...thS,color:C.accent2}}>Losses</th>
                        <th style={{...thS,color:C.green}}>Wins</th>
                      </tr></thead>
                      <tbody>
                        {sortedUsers.map((u,i)=>(
                          <tr key={u.id}>
                            <td style={{...tdS,color:C.muted,width:28}}>{i+1}</td>
                            <td style={{...tdS,fontWeight:500}}>{u.name}</td>
                            <td style={tdS}>
                              {isAdmin ? (
                                <div style={{display:"flex",alignItems:"center",gap:4}}>
                                  <Stepper value={u.losses||0} onChange={v=>updateWL(u.id,"losses",v)}/>
                                  {(sitoutMap[u.id]||0)>0 && (
                                    <span style={{fontSize:11,color:C.accent,marginLeft:4}}>+{((sitoutMap[u.id]||0)*0.5).toFixed(1)}so</span>
                                  )}
                                </div>
                              ) : (
                                <div style={{display:"flex",alignItems:"center",gap:6}}>
                                  <span style={{color:C.accent2,fontWeight:700,fontSize:15}}>
                                    {(()=>{const eff=effectiveLosses(u,sitoutMap);return eff%1===0?eff:eff.toFixed(1);})()}
                                  </span>
                                  {(sitoutMap[u.id]||0)>0 && (
                                    <span style={{fontSize:10,color:C.muted}}>(+{((sitoutMap[u.id]||0)*0.5).toFixed(1)}so)</span>
                                  )}
                                </div>
                              )}
                            </td>
                            <td style={tdS}>
                              {isAdmin
                                ?<Stepper value={u.wins||0} onChange={v=>updateWL(u.id,"wins",v)}/>
                                :<span style={{color:C.green,fontWeight:600}}>{u.wins||0}</span>}
                            </td>
                          </tr>
                        ))}
                        {sortedUsers.length===0&&<tr><td colSpan={6} style={{...tdS,color:C.muted,textAlign:"center",padding:20}}>No players.</td></tr>}
                      </tbody>
                    </table>
                  </div>
                )}

                {/* ── STATS ── */}
                {activeTab==="stats"&&(
                  <div style={{padding:16}}>
                    <div style={{marginBottom:24}}>
                      <div style={{fontFamily:"Rajdhani,sans-serif",fontSize:15,fontWeight:700,color:C.accent,marginBottom:10}}>Players to Score More Than 1000 Points</div>
                      <div style={{background:C.surface,borderRadius:12,overflow:"hidden",border:`1px solid ${C.border}`}}>
                        <table style={{width:"100%",borderCollapse:"collapse"}}>
                          <thead><tr><th style={thS}>Player</th><th style={thS}>Times ↓</th></tr></thead>
                          <tbody>
                            {sortedMilestone.map(row=>(
                              <tr key={row.id}>
                                <td style={{...tdS,fontWeight:500}}>{season.users.find(u=>u.id===row.player_id)?.name||"—"}</td>
                                <td style={tdS}>
                                  {isAdmin
                                    ?<Stepper value={row.times||0} onChange={v=>updateMilestone(row.id,v)}/>
                                    :<span style={{fontWeight:600,color:C.blue}}>{row.times||0}</span>}
                                </td>
                              </tr>
                            ))}
                            {sortedMilestone.length===0&&<tr><td colSpan={2} style={{...tdS,color:C.muted,textAlign:"center"}}>No players yet.</td></tr>}
                          </tbody>
                        </table>
                      </div>
                    </div>
                    <div>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                        <div style={{fontFamily:"Rajdhani,sans-serif",fontSize:15,fontWeight:700,color:C.accent}}>Closest Escape</div>
                        {isAdmin&&<button style={{background:"transparent",color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,fontSize:13,padding:"6px 14px",cursor:"pointer"}} onClick={addCERow}>+ Add Row</button>}
                      </div>
                      <div style={{background:C.surface,borderRadius:12,overflow:"hidden",border:`1px solid ${C.border}`}}>
                        <table style={{width:"100%",borderCollapse:"collapse"}}>
                          <thead><tr><th style={thS}>Entry</th>{isAdmin&&<th style={{...thS,width:44}}></th>}</tr></thead>
                          <tbody>
                            {(season.stats?.closestEscape||[]).map(row=>(
                              <tr key={row.id}>
                                <td style={tdS}>{isAdmin?<input style={{...iS,padding:"6px 10px",fontSize:15}} defaultValue={row.entry} onBlur={e=>updateCE(row.id,e.target.value)} placeholder="Enter entry..."/>:row.entry||"—"}</td>
                                {isAdmin&&<td style={tdS}><button onClick={()=>setDelConf({type:"ce",id:row.id,name:row.entry||"this entry"})} style={{background:"none",border:"none",color:C.accent2,cursor:"pointer",fontSize:20,padding:"4px 8px"}}>✕</button></td>}
                              </tr>
                            ))}
                            {(season.stats?.closestEscape||[]).length===0&&<tr><td colSpan={isAdmin?2:1} style={{...tdS,color:C.muted,textAlign:"center"}}>No entries.{isAdmin?" Click + Add Row.":""}</td></tr>}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                )}

                {/* ── SIT OUTS ── */}
                {activeTab==="sitouts"&&(
                  <div style={{paddingBottom:8}}>
                    <table style={{width:"100%",borderCollapse:"collapse"}}>
                      <thead><tr>
                        <th style={thS}>Player</th>
                        <th style={thS}>Sit Outs ↓</th>
                        <th style={thS}>Last 10</th>
                      </tr></thead>
                      <tbody>
                        {sitoutRows.map(row=>{
                          const player=season.users.find(u=>u.id===row.player_id);
                          if(!player) return null;
                          return (
                            <tr key={row.player_id}>
                              <td style={{...tdS,fontWeight:500}}>{player.name}</td>
                              <td style={tdS}>
                                {isAdmin
                                  ?<Stepper value={row.sitouts||0} onChange={v=>updateSitout(row.id,"sitouts",v,row.player_id)}/>
                                  :<span style={{fontWeight:600,color:C.accent}}>{row.sitouts||0}</span>}
                              </td>
                              <td style={tdS}>
                                {isAdmin
                                  ?<Stepper value={row.last10||0} onChange={v=>updateSitout(row.id,"last10",v,row.player_id)}/>
                                  :<span style={{fontWeight:600,color:C.blue}}>{row.last10||0}</span>}
                              </td>
                            </tr>
                          );
                        })}
                        {sitoutRows.length===0&&<tr><td colSpan={3} style={{...tdS,color:C.muted,textAlign:"center",padding:20}}>No players.</td></tr>}
                      </tbody>
                    </table>
                  </div>
                )}

                {/* ── QUALIFIER ── */}
                {activeTab==="qualifier"&&(
                  <QualifierTab
                    users={season.users}
                    seasonId={selSeason}
                    qualData={season.qualData}
                    onSaveQual={saveQualData}
                    isAdmin={isAdmin}
                    sitoutMap={sitoutMap}
                  />
                )}
              </div>
            )}
          </>
        )}
      </div>

      {/* Rulebook Modal */}
      {showRules&&<RulebookModal rules={rules} isAdmin={isAdmin} onClose={()=>setShowRules(false)} onSave={saveRules}/>}

      {/* Create Contest */}
      {showCC&&(
        <div onClick={()=>setShowCC(false)} style={mo}>
          <div onClick={e=>e.stopPropagation()} style={md}>
            <div style={{width:40,height:4,background:C.border,borderRadius:4,margin:"0 auto 20px"}}/>
            <div style={{fontSize:16,fontWeight:600,marginBottom:16}}>Create Contest</div>
            <label style={{fontSize:13,color:C.muted,display:"block",marginBottom:6}}>Contest Name</label>
            <input style={iS} value={cName} onChange={e=>setCName(e.target.value)} placeholder="e.g. IPL 2025 Office League" onKeyDown={e=>e.key==="Enter"&&createContest()} autoFocus/>
            <div style={{display:"flex",gap:10,marginTop:20}}>
              <button style={{flex:1,background:C.accent,color:"#000",border:"none",borderRadius:8,padding:"12px",fontWeight:600,cursor:"pointer",fontSize:15}} onClick={createContest}>Create</button>
              <button style={{background:"transparent",color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:"12px",cursor:"pointer",fontSize:15}} onClick={()=>{setShowCC(false);setCName("");}}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* Create Season */}
      {showCS&&(
        <div onClick={()=>setShowCS(false)} style={mo}>
          <div onClick={e=>e.stopPropagation()} style={{...md,maxHeight:"85vh",overflowY:"auto"}}>
            <div style={{width:40,height:4,background:C.border,borderRadius:4,margin:"0 auto 20px"}}/>
            <div style={{fontSize:16,fontWeight:600,marginBottom:16}}>Create Season</div>
            <label style={{fontSize:13,color:C.muted,display:"block",marginBottom:6}}>Season Name</label>
            <input style={{...iS,marginBottom:18}} value={sName} onChange={e=>setSName(e.target.value)} placeholder="e.g. Season 1" autoFocus/>
            <label style={{fontSize:13,color:C.muted,display:"block",marginBottom:8}}>Players</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10,minHeight:36}}>
              {sUsers.map((u,i)=>(<span key={i} style={{display:"inline-flex",alignItems:"center",background:"#1e293b",color:C.muted,fontSize:13,padding:"6px 12px",borderRadius:20,gap:6}}>{u}<span style={{cursor:"pointer",color:C.accent2,fontSize:16}} onClick={()=>setSUsers(p=>p.filter((_,j)=>j!==i))}>✕</span></span>))}
            </div>
            <div style={{display:"flex",gap:8}}>
              <input style={iS} value={newUN} onChange={e=>setNewUN(e.target.value)} placeholder="Player name" onKeyDown={e=>{if(e.key==="Enter"&&newUN.trim()){setSUsers(p=>[...p,newUN.trim()]);setNewUN("");}}}/>
              <button style={{background:C.blue,color:"#fff",border:"none",borderRadius:8,padding:"12px 18px",cursor:"pointer",fontWeight:600,fontSize:18}} onClick={()=>{if(newUN.trim()){setSUsers(p=>[...p,newUN.trim()]);setNewUN("");}}}>+</button>
            </div>
            <div style={{display:"flex",gap:10,marginTop:20}}>
              <button style={{flex:1,background:C.accent,color:"#000",border:"none",borderRadius:8,padding:"12px",fontWeight:600,cursor:"pointer",opacity:!sName.trim()?0.5:1,fontSize:15}} onClick={createSeason} disabled={!sName.trim()}>Save Season</button>
              <button style={{background:"transparent",color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:"12px",cursor:"pointer",fontSize:15}} onClick={()=>{setShowCS(false);setSName("");setSUsers([]);setNewUN("");}}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* Manage Players Modal */}
      {showPlayers&&season&&(
        <div onClick={()=>{setShowPlayers(false);setNewPlayerName("");setEditingPlayer(null);}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:150}}>
          <div onClick={e=>e.stopPropagation()} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"16px 16px 0 0",padding:24,width:"100%",maxWidth:500,maxHeight:"85vh",display:"flex",flexDirection:"column"}}>
            <div style={{width:40,height:4,background:C.border,borderRadius:4,margin:"0 auto 16px"}}/>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexShrink:0}}>
              <div style={{fontFamily:"Rajdhani,sans-serif",fontSize:18,fontWeight:700,color:C.accent}}>👥 Manage Players</div>
              <button onClick={()=>{setShowPlayers(false);setNewPlayerName("");setEditingPlayer(null);}} style={{background:"none",border:"none",color:C.muted,fontSize:22,cursor:"pointer"}}>✕</button>
            </div>
            {/* Add new player */}
            <div style={{display:"flex",gap:8,marginBottom:16,flexShrink:0}}>
              <input
                style={{background:C.bg,border:`1px solid ${C.border}`,color:C.text,padding:"10px 14px",borderRadius:8,fontSize:16,flex:1,outline:"none",boxSizing:"border-box"}}
                value={newPlayerName} onChange={e=>setNewPlayerName(e.target.value)}
                placeholder="New player name"
                onKeyDown={e=>{if(e.key==="Enter"&&newPlayerName.trim()){addPlayer(newPlayerName);setNewPlayerName("");}}}
              />
              <button style={{background:C.green,color:"#000",border:"none",borderRadius:8,padding:"10px 18px",fontWeight:700,fontSize:18,cursor:"pointer",flexShrink:0}}
                onClick={()=>{if(newPlayerName.trim()){addPlayer(newPlayerName);setNewPlayerName("");}}}
              >+</button>
            </div>
            {/* Player list */}
            <div style={{overflowY:"auto",flex:1}}>
              {season.users.length===0&&<div style={{color:C.muted,fontSize:14,textAlign:"center",padding:20}}>No players yet.</div>}
              {season.users.map(u=>(
                <div key={u.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
                  {editingPlayer?.id===u.id ? (
                    <>
                      <input
                        style={{background:C.bg,border:`1px solid ${C.accent}`,color:C.text,padding:"8px 12px",borderRadius:8,fontSize:15,flex:1,outline:"none",boxSizing:"border-box"}}
                        value={editingPlayer.name}
                        onChange={e=>setEditingPlayer(p=>({...p,name:e.target.value}))}
                        onKeyDown={e=>{if(e.key==="Enter"){editPlayer(u.id,editingPlayer.name);setEditingPlayer(null);}if(e.key==="Escape")setEditingPlayer(null);}}
                        autoFocus
                      />
                      <button onClick={()=>{editPlayer(u.id,editingPlayer.name);setEditingPlayer(null);}} style={{background:C.green,color:"#000",border:"none",borderRadius:8,padding:"8px 14px",fontWeight:600,cursor:"pointer",fontSize:14,flexShrink:0}}>Save</button>
                      <button onClick={()=>setEditingPlayer(null)} style={{background:"transparent",color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px",cursor:"pointer",fontSize:14,flexShrink:0}}>Cancel</button>
                    </>
                  ) : (
                    <>
                      <div style={{flex:1}}>
                        <div style={{fontSize:15,fontWeight:500,color:C.text}}>{u.name}</div>
                        <div style={{fontSize:11,color:C.muted,marginTop:2}}><span style={{color:C.green}}>W{u.wins||0}</span> · <span style={{color:C.accent2}}>L{u.losses||0}</span></div>
                      </div>
                      <button onClick={()=>setEditingPlayer({id:u.id,name:u.name})} style={{background:"transparent",color:C.blue,border:`1px solid ${C.blue}`,borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:13,flexShrink:0}}>✏️ Edit</button>
                      <button onClick={()=>setDelConf({type:"player",id:u.id,name:u.name})} style={{background:"transparent",color:C.accent2,border:`1px solid ${C.accent2}`,borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:13,flexShrink:0}}>🗑</button>
                    </>
                  )}
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* Delete with password */}
      {delConf&&(
        <DeleteConfirm item={delConf} onCancel={()=>setDelConf(null)} onConfirm={async()=>{
          if(delConf.type==="contest") await deleteContest(delConf.id);
          else if(delConf.type==="season") await deleteSeason(delConf.id);
          else if(delConf.type==="ce") await deleteCERow(delConf.id);
          else if(delConf.type==="player") await deletePlayer(delConf.id);
          setDelConf(null);
        }}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
