<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Land Acquisition Tracking System</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0a1628;
  --navy-mid: #112240;
  --navy-light: #1a3a5c;
  --accent: #e8a020;
  --accent-light: #f5c842;
  --green: #22c55e;
  --red: #ef4444;
  --blue: #3b82f6;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --border: rgba(255,255,255,0.08);
  --card: rgba(255,255,255,0.04);
  --card-hover: rgba(255,255,255,0.07);
  --input-bg: rgba(255,255,255,0.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--navy);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
}

/* LOGIN */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #0a1628 0%, #0d2144 50%, #0a1628 100%);
  position: relative;
  overflow: hidden;
}
#login-screen::before {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(232,160,32,0.08) 0%, transparent 70%);
  top: -100px; right: -100px;
}
.login-card {
  background: var(--navy-mid);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 48px;
  width: 400px;
  box-shadow: 0 25px 80px rgba(0,0,0,0.5);
  position: relative;
  z-index: 1;
}
.login-logo {
  text-align: center;
  margin-bottom: 32px;
}
.login-logo .emblem {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  border-radius: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 16px;
  box-shadow: 0 8px 24px rgba(232,160,32,0.3);
}
.login-logo h1 { font-size: 22px; font-weight: 700; color: var(--text); }
.login-logo p { color: var(--text-dim); font-size: 12px; margin-top: 4px; letter-spacing: 2px; text-transform: uppercase; }
.login-card .field { margin-bottom: 20px; }
.login-card label { display: block; font-size: 12px; font-weight: 500; color: var(--text-dim); margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
.login-card input, .login-card select {
  width: 100%;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
  appearance: none;
  -webkit-appearance: none;
  cursor: pointer;
}
.login-card input:focus, .login-card select:focus { border-color: var(--accent); }
.login-card select option { background: #1e293b; color: #f1f5f9; }
.btn-login {
  width: 100%;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  color: var(--navy);
  border: none;
  border-radius: 8px;
  padding: 14px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: opacity 0.2s, transform 0.1s;
}
.btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
.login-error { color: var(--red); font-size: 13px; margin-top: 12px; text-align: center; }

/* APP SHELL */
#app { display: none; min-height: 100vh; }
.sidebar {
  width: 240px;
  background: var(--navy-mid);
  border-right: 1px solid var(--border);
  position: fixed;
  top: 0; left: 0; bottom: 0;
  overflow-y: auto;
  z-index: 100;
}
.sidebar-header {
  padding: 20px;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 12px;
}
.sidebar-logo .icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.sidebar-logo .text h2 { font-size: 13px; font-weight: 700; line-height: 1.2; }
.sidebar-logo .text p { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
.sidebar-user {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.user-avatar {
  width: 32px; height: 32px;
  background: var(--navy-light);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  font-weight: 600;
  color: var(--accent);
  flex-shrink: 0;
}
.user-info .name { font-size: 13px; font-weight: 600; }
.user-info .role { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
.sidebar-nav { padding: 12px 0; }
.nav-section-label {
  padding: 8px 20px 4px;
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-weight: 600;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  cursor: pointer;
  color: var(--text-dim);
  transition: all 0.15s;
  font-size: 13.5px;
  font-weight: 500;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: var(--card); color: var(--text); }
.nav-item.active { background: rgba(232,160,32,0.1); color: var(--accent); border-left-color: var(--accent); }
.nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
.nav-logout {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  margin-top: auto;
}
.btn-logout {
  width: 100%;
  background: rgba(239,68,68,0.1);
  border: 1px solid var(--red);
  border-radius: 8px;
  padding: 10px;
  color: var(--red);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-logout:hover { background: var(--red); color: #fff; }

.main-content {
  margin-left: 240px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.topbar {
  background: var(--navy-mid);
  border-bottom: 1px solid var(--border);
  padding: 16px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar h1 { font-size: 18px; font-weight: 600; }
.topbar .breadcrumb { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.page-content { padding: 28px; flex: 1; }

/* CARDS & PANELS */
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
.stats-grid-top { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.stats-grid-bottom { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px 22px;
  transition: background 0.15s;
}
.stat-card:hover { background: var(--card-hover); }
.stat-card .label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 10px; font-weight: 700; }
.stat-card .value { font-size: 26px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
.stat-card .sub { font-size: 14px; color: var(--text-dim); margin-top: 8px; }
.stat-card.accent .value { color: var(--accent); }
.stat-card.green .value { color: var(--green); }
.stat-card.blue .value { color: var(--blue); }
.stat-card.purple .value { color: #a78bfa; }
.stat-card.orange .value { color: #fb923c; }
.stat-card.teal .value { color: #2dd4bf; }

.panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 24px;
  overflow: hidden;
}
.panel-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.panel-header h3 { font-size: 15px; font-weight: 600; }
.panel-body { padding: 20px; }

/* TABLES */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left;
  padding: 10px 14px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.02);
}
td {
  padding: 12px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 13.5px;
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--card-hover); }
.mono { font-family: 'IBM Plex Mono', monospace; font-size: 13px; }

/* BADGES */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
}
.badge-pending { background: rgba(148,163,184,0.15); color: var(--text-dim); }
.badge-3a { background: rgba(59,130,246,0.15); color: #60a5fa; }
.badge-jm { background: rgba(168,85,247,0.15); color: #c084fc; }
.badge-3d { background: rgba(34,197,94,0.15); color: #4ade80; }
.badge-3g { background: rgba(232,160,32,0.15); color: var(--accent-light); }
.badge-complete { background: rgba(34,197,94,0.2); color: var(--green); }
.badge-admin { background: rgba(232,160,32,0.2); color: var(--accent); }
.badge-user { background: rgba(59,130,246,0.15); color: #60a5fa; }

/* BUTTONS */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 7px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
}
.btn-primary { background: var(--accent); color: var(--navy); }
.btn-primary:hover { background: var(--accent-light); }
.btn-secondary { background: var(--input-bg); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--card-hover); border-color: rgba(255,255,255,0.15); }
.btn-danger { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
.btn-danger:hover { background: rgba(239,68,68,0.25); }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-icon { padding: 6px; border-radius: 6px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text-dim); cursor: pointer; transition: all 0.15s; }
.btn-icon:hover { color: var(--text); background: var(--card-hover); }

/* FORMS */
.form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
.form-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-dim); margin-bottom: 6px; letter-spacing: 0.5px; }
.field input, .field select, .field textarea {
  width: 100%;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 10px 14px;
  color: var(--text);
  font-family: inherit;
  font-size: 13.5px;
  outline: none;
  transition: border-color 0.2s;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field select option { background: var(--navy-mid); }
.field .hint { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
.required::after { content: ' *'; color: var(--accent); }

/* MODALS */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--navy-mid);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  width: 90%;
  max-width: 600px;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 25px 80px rgba(0,0,0,0.5);
  animation: slideUp 0.2s ease;
}
.modal.wide { max-width: 800px; }
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.modal-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-header h3 { font-size: 16px; font-weight: 600; }
.modal-body { padding: 24px; }
.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 10px;
}

/* CUSTOM SEARCHABLE DROPDOWN */
.modal select {
  background: #0f172a;
  color: #f1f5f9;
  border: 1px solid #475569;
  border-radius: 5px;
  padding: 5px 8px;
  font-size: 12px;
  color-scheme: dark;
}
.modal select option {
  background: #0f172a;
  color: #f1f5f9;
}

/* PROCESS STEPPER */
.process-steps {
  display: flex;
  align-items: center;
  gap: 0;
  margin-bottom: 24px;
  overflow-x: auto;
}
.process-step {
  display: flex;
  align-items: center;
  flex-shrink: 0;
}
.step-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 0 12px;
}
.step-circle {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  font-weight: 700;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--text-dim);
  transition: all 0.2s;
}
.step-circle.done { background: var(--green); border-color: var(--green); color: #fff; }
.step-circle.active { background: var(--accent); border-color: var(--accent); color: var(--navy); }
.step-label { font-size: 11px; color: var(--text-dim); font-weight: 500; white-space: nowrap; }
.step-label.active { color: var(--accent); }
.step-connector { width: 40px; height: 2px; background: var(--border); flex-shrink: 0; }
.step-connector.done { background: var(--green); }

/* TABS */
.tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.tab {
  padding: 10px 18px;
  font-size: 13.5px;
  font-weight: 500;
  color: var(--text-dim);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ALERTS */
.alert {
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.alert-info { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2); color: #93c5fd; }
.alert-warning { background: rgba(232,160,32,0.1); border: 1px solid rgba(232,160,32,0.2); color: var(--accent-light); }
.alert-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: #86efac; }

/* SEARCH */
.search-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
  min-width: 220px;
}
.search-bar input {
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  flex: 1;
}
.search-bar span { color: var(--text-dim); font-size: 14px; }

/* PROGRESS BAR */
.progress-bar {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  transition: width 0.3s;
}

/* SECTION VIEWS */
.section-view { display: none; }
.section-view.active { display: block; }

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-dim);
}
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state h3 { font-size: 16px; color: var(--text); margin-bottom: 8px; }
.empty-state p { font-size: 13px; }

/* RESPONSIVE */
@media (max-width: 768px) {
  .sidebar {
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    position: fixed;
    z-index: 1000;
    height: 100%;
  }
  .sidebar.open { transform: translateX(0); }
  .main-content { margin-left: 0; }
  .form-grid.cols-2, .form-grid.cols-3 { grid-template-columns: 1fr; }
  .hamburger { display: flex !important; }
  /* sidebar-overlay controlled by JS only */
}
.hamburger {
  display: none;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  background: var(--accent);
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
  color: white;
  margin-right: 10px;
}
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 999;
  pointer-events: none;
}
.sidebar-overlay.visible {
  display: block;
  pointer-events: auto;
}
.chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  background: var(--input-bg);
  color: var(--text-dim);
  margin: 2px;
}
.divider { height: 1px; background: var(--border); margin: 20px 0; }
.text-muted { color: var(--text-dim); }
.text-accent { color: var(--accent); }
.text-green { color: var(--green); }
.text-red { color: var(--red); }
.flex { display: flex; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.flex-wrap { flex-wrap: wrap; }
.mt-2 { margin-top: 8px; }
.mt-4 { margin-top: 16px; }
.mb-4 { margin-bottom: 16px; }
.w-full { width: 100%; }
.toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: var(--navy-mid);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 20px;
  font-size: 13.5px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  z-index: 999;
  display: flex;
  align-items: center;
  gap: 10px;
  transform: translateY(80px);
  opacity: 0;
  transition: all 0.3s;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-left: 4px solid var(--green); }
.toast.error { border-left: 4px solid var(--red); }
.toast.info { border-left: 4px solid var(--blue); }
</style>

</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="emblem">🏛</div>
      <h1>Land Acquisition Tracking System</h1>
      <p>CHIEF ENGINEER, NATIONAL HIGHWAY (PWD)</p>
    </div>
    <div class="field">
      <label>Username</label>
      <select id="login-user" style="width:100%"><option value="">— Select Username —</option></select>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="Enter password">
    </div>
    <button class="btn-login" id="loginBtn">Sign In</button>
    <div class="login-error" id="login-error"></div>

  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="icon">🏛</div>
        <div class="text">
          <h2 style="font-size:11px;line-height:1.3;letter-spacing:0.5px">LAND ACQUISITION<br>TRACKING SYSTEM</h2>
        </div>
      </div>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="sb-avatar">A</div>
      <div class="user-info">
        <div class="name" id="sb-name">Admin</div>
        <div class="role" id="sb-role">Admin</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="nav-logout">
      <button class="btn-logout" onclick="doLogout()">⬅ Sign Out</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <div class="main-content">

// ── Supabase REST helper ──
async function sbFetch(path, opts={}) {
  const headers = {
    'Content-Type': 'application/json',
    'apikey': SUPABASE_ANON,
    'Authorization': 'Bearer ' + SUPABASE_ANON,
    ...(opts.headers||{})
  };
  const res = await fetch(SUPABASE_URL + path, {
    method: opts.method||'GET',
    headers,
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (!res.ok) {
    const e = await res.json().catch(()=>({}));
    throw new Error(e.message || e.error || res.statusText);
  }
  if (res.status === 204 || res.headers.get('content-length')==='0') return null;
  return res.json();
}

async function sbRpc(fn, params={}) {
  return sbFetch('/rest/v1/rpc/'+fn, { method:'POST', body: params });
}

// ── api() wrapper — maps old /api/ calls to Supabase ──
async function api(method, url, body) {
  return apiRoute(method, url, body);
}

async function apiRoute(method, url, body) {
  const u = url.replace(/^\/api/, '');

  // ── AUTH ──
  if (u === '/auth/login') return authLogin(body);
  if (u === '/auth/logout') return authLogout();
  if (u === '/auth/usernames') return authUsernames();
  if (u === '/auth/users' && method === 'GET') return authGetUsers();
  if (u === '/auth/users' && method === 'POST') return authCreateUser(body);
  if (u.match(/^\/auth\/users\/(\d+)$/) && method === 'PUT') return authUpdateUser(u.match(/(\d+)$/)[1], body);
  if (u.match(/^\/auth\/users\/(\d+)$/) && method === 'DELETE') return authDeleteUser(u.match(/(\d+)$/)[1]);

  // ── SYNC / SAVE ──
  if (u === '/sync') return syncAll();
  if (u === '/save') return saveAll(body);

  // ── PERMISSIONS ──
  if (u.match(/^\/permissions\/(\d+)$/) && method === 'GET') return getPermissions(u.match(/(\d+)$/)[1]);
  if (u.match(/^\/permissions\/(\d+)$/) && method === 'POST') return savePermissions2(u.match(/(\d+)$/)[1], body);

  // ── PROJECT TYPES ──
  if (u === '/nh/project-types' && method === 'GET') return sbFetch('/rest/v1/lats_project_types?order=name');
  if (u === '/nh/project-types' && method === 'POST') return sbFetch('/rest/v1/lats_project_types', {method:'POST', body, prefer:'return=representation', headers:{'Prefer':'return=representation'}});
  if (u.match(/^\/nh\/project-types\/(\d+)$/) && method === 'PUT') { const id=u.match(/(\d+)$/)[1]; const r=await sbFetch('/rest/v1/lats_project_types?id=eq.'+id, {method:'PATCH', body, headers:{'Prefer':'return=representation'}}); return r[0]; }
  if (u.match(/^\/nh\/project-types\/(\d+)$/) && method === 'DELETE') { const id=u.match(/(\d+)$/)[1]; await sbFetch('/rest/v1/lats_project_types?id=eq.'+id, {method:'DELETE'}); return {ok:true}; }

  // ── NH ──
  if (u === '/nh' && method === 'GET') return sbFetch('/rest/v1/lats_nh?order=id');
  if (u === '/nh' && method === 'POST') { const r=await sbFetch('/rest/v1/lats_nh', {method:'POST', body:nhBody(body), headers:{'Prefer':'return=representation'}}); return r[0]; }
  if (u.match(/^\/nh\/(\d+)$/) && method === 'PUT') { const id=u.match(/(\d+)$/)[1]; const r=await sbFetch('/rest/v1/lats_nh?id=eq.'+id, {method:'PATCH', body:nhBody(body), headers:{'Prefer':'return=representation'}}); return r[0]; }
  if (u.match(/^\/nh\/(\d+)$/) && method === 'DELETE') { const id=u.match(/(\d+)$/)[1]; await sbFetch('/rest/v1/lats_nh?id=eq.'+id, {method:'DELETE'}); return {ok:true}; }

  // ── STRETCHES ──
  if (u.match(/^\/nh\/(\d+)\/stretches$/) && method === 'GET') { const nhId=u.match(/(\d+)/)[1]; return sbFetch('/rest/v1/lats_nh_stretches?nh_id=eq.'+nhId+'&order=chainage_from'); }
  if (u.match(/^\/nh\/(\d+)\/stretches$/) && method === 'POST') { const nhId=u.match(/(\d+)/)[1]; const r=await sbFetch('/rest/v1/lats_nh_stretches', {method:'POST', body:{...stretchBody(body), nh_id:parseInt(nhId)}, headers:{'Prefer':'return=representation'}}); return r[0]; }
  if (u.match(/^\/nh\/stretches\/(\d+)$/) && method === 'PUT') { const id=u.match(/(\d+)$/)[1]; const r=await sbFetch('/rest/v1/lats_nh_stretches?id=eq.'+id, {method:'PATCH', body:stretchBody(body), headers:{'Prefer':'return=representation'}}); return r[0]; }
  if (u.match(/^\/nh\/stretches\/(\d+)$/) && method === 'DELETE') { const id=u.match(/(\d+)$/)[1]; await sbFetch('/rest/v1/lats_nh_stretches?id=eq.'+id, {method:'DELETE'}); return {ok:true}; }

  // ── TALUKA ROWS ──
  if (u.match(/^\/nh\/stretches\/(\d+)\/talukas$/) && method === 'POST') { const sid=u.match(/(\d+)/)[1]; return saveTalukaRows(sid, body.rows||[]); }

  // ── CONTRACTS ──
  if (u === '/nh/contracts/all' && method === 'GET') return sbFetch('/rest/v1/lats_contracts?order=id');
  if (u === '/nh/contracts' && method === 'POST') { const r=await sbFetch('/rest/v1/lats_contracts', {method:'POST', body:contractBody(body), headers:{'Prefer':'return=representation'}}); return r[0]; }
  if (u.match(/^\/nh\/contracts\/(\d+)$/) && method === 'PUT') { const id=u.match(/(\d+)$/)[1]; const r=await sbFetch('/rest/v1/lats_contracts?id=eq.'+id, {method:'PATCH', body:contractBody(body), headers:{'Prefer':'return=representation'}}); return r[0]; }
  if (u.match(/^\/nh\/contracts\/(\d+)$/) && method === 'DELETE') { const id=u.match(/(\d+)$/)[1]; await sbFetch('/rest/v1/lats_contracts?id=eq.'+id, {method:'DELETE'}); return {ok:true}; }

  throw new Error('Unknown API route: '+method+' '+url);
}

// ── Body helpers ──
function nhNull(v) { return (v !== undefined && v !== null && v !== '') ? v : null; }
function nhBody(b) { return { nh_number:b.nh_number, description:nhNull(b.description), chainage_from:nhNull(b.chainage_from), chainage_to:nhNull(b.chainage_to), length:nhNull(b.length), state:nhNull(b.state), place_from:nhNull(b.place_from), place_to:nhNull(b.place_to) }; }
function stretchBody(b) { return { name:nhNull(b.name), place_from:nhNull(b.place_from), place_to:nhNull(b.place_to), chainage_from:nhNull(b.chainage_from), chainage_to:nhNull(b.chainage_to), length:nhNull(b.length), description:nhNull(b.description), district:nhNull(b.district), taluka:nhNull(b.taluka), division:nhNull(b.division), project_id:b.project_id?parseInt(b.project_id):null }; }

// ── Auth functions ──
async function authUsernames() {
  const rows = await sbFetch('/rest/v1/lats_users?select=username,role&order=username');
  return rows;
}

async function authLogin({username, password}) {
  const result = await sbRpc('lats_login', {p_username: username, p_password: password});
  const bcrypt_check = Array.isArray(result) ? result[0] : result;
  if (!bcrypt_check || !bcrypt_check.id) throw new Error('Invalid credentials');
  const user = { id: bcrypt_check.id, username: bcrypt_check.username, name: bcrypt_check.name, role: bcrypt_check.role, division: bcrypt_check.division };
  window._currentSessionUser = user;
  sessionStorage.setItem('lats_user', JSON.stringify(user));
  return user;
}

function authLogout() {
  window._currentSessionUser = null;
  sessionStorage.removeItem('lats_user');
  return {ok:true};
}

async function authGetUsers() {
  return sbFetch('/rest/v1/lats_users?select=id,username,name,role,division,parent_id&order=id');
}

async function authCreateUser({username, password, name, role, parent_id}) {
  const raw = await sbRpc('lats_create_user', {
    p_username: username,
    p_password: password,
    p_name: name||username,
    p_role: role||'viewer',
    p_parent_id: parent_id ? parseInt(parent_id) : null
  });
  const r = Array.isArray(raw) ? raw[0] : raw;
  if (!r || r.error) throw new Error(r?.error || 'Failed to create user');
  return r;
}

async function authUpdateUser(id, {name, password, role, parent_id}) {
  if (password) {
    await sbRpc('lats_set_password', {p_user_id: parseInt(id), p_password: password});
  }
  const patch = {};
  if (name) patch.name = name;
  if (role) patch.role = role;
  if (parent_id !== undefined) patch.parent_id = parent_id;
  if (Object.keys(patch).length > 0) {
    await sbFetch('/rest/v1/lats_users?id=eq.'+id, {method:'PATCH', body:patch, headers:{'Prefer':'return=representation'}});
  }
  return {ok:true};
}

async function authDeleteUser(id) {
  await sbFetch('/rest/v1/lats_users?id=eq.'+id, {method:'DELETE'});
  return {ok:true};
}

// ── Save all (bulk upsert) ──
async function saveAll(d) {
  // Projects
  if (d.projects?.length) {
    const rows = d.projects.map(p=>({ id:p.id, name:p.name, tafs_no:p.tafsNo||null, tafs_date:p.tafsDate||null, length:p.length||null, tpc:p.tpc||null, civil_cost:p.civilCost||null, la_cost:p.laCost||null, total_land:p.totalLand||null, avail_land:p.availLand||null, la_required:p.laRequired||null, la_length:p.laLength||null, la_length_tafs:p.laLengthTafs||null, approval_date:p.approvalDate||null, assigned_users:p.assignedUsers||[] }));
    await sbFetch('/rest/v1/lats_projects', {method:'POST', body:rows, headers:{'Prefer':'resolution=merge-duplicates'}});
  }
  // Delete removed projects
  if (d.projects?.length) await sbFetch('/rest/v1/lats_projects?id=not.in.('+d.projects.map(p=>p.id).join(',')+')', {method:'DELETE'});
  else await sbFetch('/rest/v1/lats_projects', {method:'DELETE'});

  // Villages
  if (d.villages?.length) {
    const rows = d.villages.map(v=>({id:v.id,project_id:v.projectId,name:v.name,taluka:v.taluka||null,is_addl:v.isAddl||false}));
    await sbFetch('/rest/v1/lats_villages', {method:'POST', body:rows, headers:{'Prefer':'resolution=merge-duplicates'}});
  }
  if (d.villages?.length) await sbFetch('/rest/v1/lats_villages?id=not.in.('+d.villages.map(v=>v.id).join(',')+')', {method:'DELETE'});
  else await sbFetch('/rest/v1/lats_villages', {method:'DELETE'});

async function loadDB() {
  const data = await api('GET','/api/sync');
  mapSync(data);
}

async function saveDB() {
  await api('POST','/api/save', DB);
  await loadDB();
}

function newId() { return Math.floor(Math.random() * 900000000) + 100000000; }

function fmtDate(d) {
  if (!d) return '—';
  const p = String(d).split('-');
  return p.length===3 ? p[2]+'/'+p[1]+'/'+p[0] : d;
}

function isProjectAssigned(projectId, userId) {
  return DB.assignments.some(a=>a.pid===projectId && a.uid===userId);
}
function getMyProjects() {
  // If admin is viewing as a user, show that user's projects
  if (viewAsUser) return DB.projects.filter(p=>isProjectAssigned(p.id, viewAsUser.id));
  if (currentUser.role==='admin') return DB.projects;
  return DB.projects.filter(p=>isProjectAssigned(p.id, currentUser.id));
}

let currentUser = null;

async function populateLoginDropdown() {
  const sel = document.getElementById('login-user');
  const errEl = document.getElementById('login-error');
  if (!sel) return;
  try {
    errEl.textContent = 'Loading...';
    const users = await sbFetch('/rest/v1/lats_users?select=username,role&order=username');
    if (!users || !users.length) {
      errEl.textContent = 'No users found. Please run the SQL schema in Supabase first.';
      return;
    }
    errEl.textContent = '';
    sel.innerHTML = '<option value="">— Select Username —</option>';
    const admin = users.find(u => u.username === 'CENH');
    if (admin) {
      const o = document.createElement('option');
      o.value = admin.username;
      o.textContent = admin.username + ' (Admin)';
      sel.appendChild(o);
    }
    users.filter(u => u.role !== 'admin')
      .sort((a,b) => a.username.localeCompare(b.username))
      .forEach(u => {
        const o = document.createElement('option');
        o.value = u.username;
        o.textContent = u.username;
        sel.appendChild(o);
      });
  } catch(e) {
    errEl.textContent = 'Error: ' + e.message;
    console.error('Login dropdown error:', e);
  }
}
async function doLogin() {
  const username = (document.getElementById('login-user')?.value||'').trim();
  const password = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  if (!username) { errEl.textContent='Please enter your username.'; return; }
  if (!password) { errEl.textContent='Please enter your password.'; return; }
  errEl.textContent='Signing in…';
  try {
    currentUser = await api('POST','/api/auth/login',{username,password});
    errEl.textContent='';
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    await loadDB();
    initApp();
  } catch(e) {
    errEl.textContent='Invalid credentials. Please try again.';
    document.getElementById('login-pass').value='';
  }
}

async function doLogout() {
  window._currentSessionUser = null;
  sessionStorage.removeItem('lats_user');
  currentUser=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('login-pass').value='';
  document.getElementById('login-error').textContent='';
  populateLoginDropdown();
}

document.addEventListener('DOMContentLoaded', async function() {
  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('login-pass').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });

  // Check for existing session
  const saved = sessionStorage.getItem('lats_user');
  if (saved) {
    try {
      currentUser = JSON.parse(saved);
      window._currentSessionUser = currentUser;
      document.getElementById('login-screen').style.display='none';
      document.getElementById('app').style.display='flex';
      await loadDB();
      initApp();
      return;
    } catch(e) { sessionStorage.removeItem('lats_user'); }
  }
  populateLoginDropdown();
});

// Auto-refresh: re-fetch data from server every 30 seconds and re-render current page
let _autoRefreshTimer = null;
function startAutoRefresh() {
  if (_autoRefreshTimer) clearInterval(_autoRefreshTimer);
  _autoRefreshTimer = setInterval(async function() {
    // Only refresh if app is visible and user is logged in
    if (document.hidden || !currentUser) return;
    try {
      await loadDB();
      // Re-render current page silently (no toast)
      const page = currentPage;
      if (page === 'dashboard') renderDashboard();
      else if (page === 'projects') renderProjects();
      else if (page === 'villages') renderVillages();
      else if (page === 'users') renderUsers();
      else if (page === 'reports') renderReportContent();
      // la-process not auto-refreshed to avoid disrupting active data entry
    } catch(e) { /* silent fail */ }
  }, 30000); // every 30 seconds
}

                      <div style="font-size:11px;color:var(--text-dim)">${assignedProjects.length} project(s)</div>
                    </div>
                    ${isActive ? '<span style="margin-left:auto;font-size:11px;background:var(--accent);color:var(--navy);padding:2px 8px;border-radius:4px;font-weight:700">ACTIVE</span>' : ''}
                  </div>
                  <div style="font-size:11px;color:var(--text-dim)">
                    ${assignedProjects.length === 0
                      ? '<span style="color:#ef4444">No projects assigned</span>'
                      : assignedProjects.map(p => `<span class="chip">${p.name}</span>`).join('')}
                  </div>
                  <div style="margin-top:12px">
                    <button class="btn btn-primary btn-sm" style="width:100%" onclick="event.stopPropagation();setViewAs(${JSON.stringify({id:u.id,username:u.username,name:u.name,role:u.role}).replace(/"/g,'&quot;')})">
                      ${isActive ? '✓ Currently Viewing' : '👁 View as ' + u.username}
                    </button>
                  </div>
                </div>`;
              }).join('')}
            </div>`}
      </div>
    </div>
  `;
}

function renderVillageWiseTable(villages, projects, filterProjectId) {
  const filtered = filterProjectId === 'all' ? villages : villages.filter(v => String(v.projectId) === String(filterProjectId));
  if (filtered.length === 0) return `<div class="empty-state"><div class="icon">🏘</div><h3>No Villages</h3><p>No villages found for this project.</p></div>`;
  return `<div class="table-wrap"><table>
    <thead><tr><th>Village</th><th>Taluka</th><th>Project</th><th style="text-transform:none">3a</th><th style="text-transform:none">3A</th><th>JM</th><th>3D</th><th>3G</th><th>Status</th></tr></thead>
    <tbody>${filtered.map(v => {
      const proj = projects.find(p => p.id === v.projectId);
      const has3a = DB.process3a.some(x => x.villageId === v.id && x.projectId === v.projectId && x.type === 'lower3a');
      // Get all Sr entries
      const all3As = DB.process3a.filter(x => x.villageId === v.id && x.projectId === v.projectId && x.type === 'upper3A');
      const allJMs = DB.processJM.filter(x => x.villageId === v.id && x.projectId === v.projectId);
      const all3Ds = DB.process3D.filter(x => x.villageId === v.id && x.projectId === v.projectId);
      const all3Gs = DB.process3G.filter(x => x.villageId === v.id && x.projectId === v.projectId);
      const has3A = all3As.some(r => DB.process3aGuts.some(g => g.process3aId === r.id));
      const hasJM = allJMs.length > 0;
      const has3D = all3Ds.length > 0;
      const has3G = all3Gs.length > 0;
      const maxSr = Math.max(1, ...all3As.map(x=>x.srNo||1));
      const statusText = has3G ? '3G Done' : has3D ? '3D Done' : hasJM ? 'JM Done' : has3A ? '3A Done' : has3a ? '3a Done' : 'Pending';
      const statusColor = has3G ? 'badge-complete' : has3D ? 'badge-3d' : hasJM ? 'badge-jm' : has3A ? 'badge-3a' : has3a ? 'badge-user' : 'badge-pending';
      return `<tr>
        <td><strong>${v.name}</strong>${maxSr > 1 ? ` <span style="font-size:11px;color:#fb923c;font-weight:600">${maxSr} Sr.</span>` : ''}</td>
        <td>${v.taluka}</td>
        <td><span class="chip">${proj?.name || '—'}</span></td>
        <td style="text-align:center">${has3a ? '<span style="color:#4ade80">✅</span>' : '<span style="color:#888">—</span>'}</td>
        <td style="text-align:center">${has3A ? `<span style="color:#4ade80">✅</span><span style="font-size:10px;color:#a78bfa;margin-left:3px">${all3As.length > 1 ? '×'+all3As.length : ''}</span>` : '<span style="color:#888">—</span>'}</td>
        <td style="text-align:center">${hasJM ? `<span style="color:#4ade80">✅</span><span style="font-size:10px;color:#fb923c;margin-left:3px">${allJMs.length > 1 ? '×'+allJMs.length : ''}</span>` : '<span style="color:#888">—</span>'}</td>
        <td style="text-align:center">${has3D ? `<span style="color:#4ade80">✅</span><span style="font-size:10px;color:#22c55e;margin-left:3px">${all3Ds.length > 1 ? '×'+all3Ds.length : ''}</span>` : '<span style="color:#888">—</span>'}</td>
        <td style="text-align:center">${has3G ? `<span style="color:#4ade80">✅</span><span style="font-size:10px;color:#2dd4bf;margin-left:3px">${all3Gs.length > 1 ? '×'+all3Gs.length : ''}</span>` : '<span style="color:#888">—</span>'}</td>
        <td><span class="badge ${statusColor}">${statusText}</span></td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

function renderDashboard() {
  const myProjects = getMyProjects();
  const myProjectIds = myProjects.map(function(p){ return p.id; });

  // Only count records that belong to active projects the user can see
  const myVillages = DB.villages.filter(function(v){ return myProjectIds.indexOf(v.projectId) !== -1; });
  const myVillageIds = myVillages.map(function(v){ return v.id; });

  const all3aRecs = DB.process3a.filter(function(x){ return myProjectIds.indexOf(x.projectId) !== -1 && x.type === 'lower3a'; });
  const total3aVillages = all3aRecs.length;
  // Unique CALA notifications = unique notifDate+calaPost combinations
  const uniqueCALA = new Set(all3aRecs.map(function(x){ return (x.notifDate||'') + '||' + (x.calaPost||''); })).size;

  // 3A Ha total + village count
  const all3ARecs = DB.process3a.filter(function(x){ return myProjectIds.indexOf(x.projectId) !== -1 && x.type === 'upper3A'; });
  const total3A = all3ARecs.reduce(function(sum, r){ return sum + DB.process3aGuts.filter(function(g){ return g.process3aId === r.id; }).reduce(function(s,g){ return s + (parseFloat(g.area)||0); }, 0); }, 0);
  const count3A = all3ARecs.length;

  // JM Ha total + village count
  const allJMRecs = DB.processJM.filter(function(x){ return myProjectIds.indexOf(x.projectId) !== -1; });
  const totalJM = allJMRecs.reduce(function(sum, r){ return sum + DB.processJMGuts.filter(function(g){ return g.processJMId === r.id ; }).reduce(function(s,g){ return s + (parseFloat(g.modArea)||0); }, 0); }, 0);
  const countJM = allJMRecs.length;

  // Latest Area to be Acquired — village by village: JM area > 3A area > TAFS laRequired
  let latestArea = 0;
  myVillages.forEach(function(v) {
    // JM done for this village?
    const vjm = DB.processJM.find(function(x){ return x.villageId===v.id && x.projectId===v.projectId; });
    if (vjm) {
      const vjmArea = DB.processJMGuts.filter(function(g){ return g.processJMId===vjm.id; }).reduce(function(s,g){ return s+(parseFloat(g.modArea)||0); }, 0);
      latestArea += vjmArea;
      return;
    }
    // 3A done for this village?
    const v3A = DB.process3a.find(function(x){ return x.villageId===v.id && x.projectId===v.projectId && x.type==='upper3A'; });
    if (v3A) {
      const v3AArea = DB.process3aGuts.filter(function(g){ return g.process3aId===v3A.id; }).reduce(function(s,g){ return s+(parseFloat(g.area)||0); }, 0);
      latestArea += v3AArea;
      return;
    }
    // Fallback: TAFS laRequired of the project (proportional — just add project laRequired once per project)
    // Already handled below per project
  });
  // Add TAFS area for projects that have NO villages with any 3A or JM
  myProjects.forEach(function(p) {
    const pVils = myVillages.filter(function(v){ return v.projectId===p.id; });
    const hasAnyData = pVils.some(function(v){
      return DB.processJM.some(function(x){ return x.villageId===v.id && x.projectId===p.id; }) ||
             DB.process3a.some(function(x){ return x.villageId===v.id && x.projectId===p.id && x.type==='upper3A'; });
    });
    if (!hasAnyData) latestArea += parseFloat(p.laRequired)||0;
  });

  // 3D Ha total + village count
  const all3DRecs = DB.process3D.filter(function(x){ return myProjectIds.indexOf(x.projectId) !== -1; });
  const total3D = all3DRecs.reduce(function(sum, r){ return sum + DB.process3DGuts.filter(function(g){ return g.process3DId === r.id; }).reduce(function(s,g){ return s + (parseFloat(g.area)||0); }, 0); }, 0);
  const count3D = all3DRecs.length;

  // 3G Ha total + compensation + village count
  const all3GRecs = DB.process3G.filter(function(x){ return myProjectIds.indexOf(x.projectId) !== -1; });
  const total3G = all3GRecs.reduce(function(sum, r){ return sum + DB.process3DGuts.filter(function(g){ return g.process3DId === DB.process3D.find(function(d){ return d.villageId===r.villageId && d.projectId===r.projectId; })?.id; }).reduce(function(s,g){ return s + (parseFloat(g.area)||0); }, 0); }, 0);
  const totalComp3G = all3GRecs.reduce(function(sum, r){ return sum + DB.process3GGuts.filter(function(g){ return g.process3GId === r.id; }).reduce(function(s,g){ return s + (parseFloat(g.compensation)||0); }, 0); }, 0);
  const count3G = all3GRecs.length;

  // totalComp for backward compat
  const totalComp = totalComp3G;

  document.getElementById('page-content').innerHTML = `
    <!-- Row 1: Summary cards -->
    <div style="display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:16px;margin-bottom:16px">
      <div class="stat-card accent" style="display:flex;align-items:center;gap:20px;padding:20px 24px">
        <div style="font-size:48px;opacity:0.8">📁</div>
        <div>
          <div class="label">Total Projects</div>

        </div>

      </div>
      <div class="stat-card purple" style="padding:20px 24px">
        <div class="label">3A Notified Area</div>

        <div style="margin-top:4px;font-size:12px;color:inherit;opacity:0.7">of ${latestArea.toFixed(2)} Ha required &nbsp;·&nbsp; ${count3A} villages</div>
        <div style="margin-top:8px;height:5px;background:rgba(255,255,255,0.15);border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${latestArea>0?Math.min(100,(total3A/latestArea*100)).toFixed(1):0}%;background:currentColor;opacity:0.7;border-radius:3px"></div>

        <div style="margin-top:8px;height:5px;background:rgba(255,255,255,0.15);border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${latestArea>0?Math.min(100,(totalJM/latestArea*100)).toFixed(1):0}%;background:currentColor;opacity:0.7;border-radius:3px"></div>

        <div style="margin-top:4px;font-size:12px;color:inherit;opacity:0.7">of ${latestArea.toFixed(2)} Ha &nbsp;·&nbsp; ${count3D} villages</div>
        <div style="margin-top:8px;height:5px;background:rgba(255,255,255,0.15);border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${latestArea>0?Math.min(100,(total3D/latestArea*100)).toFixed(1):0}%;background:currentColor;opacity:0.7;border-radius:3px"></div>

        <div style="margin-top:6px;font-size:11px;color:inherit;opacity:0.6">Declaration of Acquisition</div>

        <div class="value" style="font-size:28px;margin-top:8px">${total3G.toFixed(2)} Ha</div>
        <div style="margin-top:4px;font-size:12px;color:inherit;opacity:0.7">of ${latestArea.toFixed(2)} Ha &nbsp;·&nbsp; ${count3G} villages</div>
        <div style="margin-top:8px;height:5px;background:rgba(255,255,255,0.15);border-radius:3px;overflow:hidden">

            const pVils = DB.villages.filter(v => v.projectId === p.id);
            let pLatestArea = 0;
            pVils.forEach(function(v) {
              const vjm = DB.processJM.find(x => x.villageId===v.id && x.projectId===p.id);

            if (pLatestArea === 0) pLatestArea = parseFloat(p.laRequired)||0;

            // 3A area for this project
            const p3ARecs = DB.process3a.filter(x=>x.projectId===p.id&&x.type==='upper3A');
            const p3AArea = p3ARecs.reduce((s,r)=>s+DB.process3aGuts.filter(g=>g.process3aId===r.id).reduce((ss,g)=>ss+(parseFloat(g.area)||0),0),0);
            const laReq = parseFloat(p.laRequired)||0;

            const pctArea = pLatestArea > 0 ? Math.min(100, Math.round((p3GHa / pLatestArea) * 100)) : 0;

            // Latest Available Length — project level, most advanced stage with length entered

            const projLen = parseFloat(p.length)||0;
            let pLatestAffected = null;
            // Check stages in reverse order: 3G → 3D → JM → 3A → TAFS
            const any3G = DB.process3G.find(x=>x.projectId===p.id&&x.laLength3g);

                <div style="font-size:13px;color:var(--text-dim);margin-top:4px">${pJMArea.toFixed(2)} / ${pLatestArea.toFixed(2)} Ha</div>
              </td>

                <div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px">${pct3D}%</div>

                <div style="font-size:13px;color:var(--text-dim);margin-top:4px">${p3DArea.toFixed(2)} / ${pLatestArea.toFixed(2)} Ha</div>

                <div class="progress-bar"><div class="progress-fill" style="width:${pctArea}%;background:linear-gradient(90deg,#2dd4bf,#5eead4)"></div></div>
                <div style="font-size:13px;color:var(--text-dim);margin-top:4px">${p3GHa.toFixed(2)} / ${pLatestArea.toFixed(2)} Ha</div>
              </td>
              <td style="min-width:130px;padding:8px">
                <div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px">${pctLen}%</div>
                <div class="progress-bar"><div class="progress-fill" style="width:${pctLen}%;background:linear-gradient(90deg,#3b82f6,#60a5fa)"></div></div>
                <div style="font-size:13px;color:var(--text-dim);margin-top:4px">${pLatestLen.toFixed(2)} / ${projLen} km</div>
              </td>
              <td>
                <div class="flex gap-2 flex-wrap">
                  <button class="btn btn-secondary btn-sm" onclick="navigate('la-process',{projectId:${p.id}})">Enter LA</button>

                </div>
              </td>
            </tr>`;
          }).join('')}</tbody>
        </table></div>`}
      </div>

          <select id="vws-project-filter" style="background:#1e293b;color:#f1f5f9;border:1.5px solid #475569;border-radius:6px;padding:5px 10px;font-size:13px;font-weight:500;cursor:pointer;outline:none">
            <option value="all" style="background:#1e293b;color:#f1f5f9">All Projects</option>

          </select>
        </div>

function renderProjects() {
  const role = currentUser.role;
  const isAdmin = role === 'admin';
  const isCircle = role === 'nh_circle';
  const isDivision = role === 'nh_division';

  // Filter projects by role
  let projects = DB.projects;
  if (isDivision) {
    projects = projects.filter(p => p.division === currentUser.name);
  } else if (isCircle) {
    // NH Circle sees projects from their divisions
    const myDivisions = (DB.users||[]).filter(u => u.role === 'nh_division' && u.parent_id === currentUser.id).map(u => u.name);
    projects = projects.filter(p => myDivisions.includes(p.division));
  }

  // Group by status
  const statusGroups = {};
  PROJECT_STAGES.forEach(s => { statusGroups[s.key] = []; });
  projects.forEach(p => {
    const key = p.status || 'draft';
    if (statusGroups[key]) statusGroups[key].push(p);
    else statusGroups['draft'].push(p);
  });

  // Build stage filter buttons
  const stageCounts = PROJECT_STAGES.map(s => ({...s, count: statusGroups[s.key]?.length||0}));

  document.getElementById('page-content').innerHTML = `
    <div class="panel">
      <div class="panel-header">
        <h3>Projects (${projects.length})</h3>
        ${(isAdmin || isDivision) ? '<button class="btn btn-primary" id="newProjBtn">+ Create Project</button>' : ''}
      </div>

      <div style="display:flex;gap:8px;padding:12px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap">

          style="padding:6px 14px;border-radius:20px;border:1px solid var(--accent);background:var(--accent);color:var(--navy);font-size:12px;font-weight:600;cursor:pointer">
          All (${projects.length})
        </button>
        ${stageCounts.filter(s=>s.count>0).map(s=>`
          <button class="stage-tab" data-stage="${s.key}" onclick="filterProjectStage('${s.key}',this)"
            style="padding:6px 14px;border-radius:20px;border:1px solid ${s.color};background:transparent;color:${s.color};font-size:12px;font-weight:600;cursor:pointer">
            ${s.icon} ${s.label} (${s.count})
          </button>
        `).join('')}
      </div>

      <div class="panel-body" style="padding:0">
        <div id="projects-list">
          ${projects.length === 0
            ? '<div class="empty-state" style="padding:40px"><div class="icon">📁</div><h3>No Projects Yet</h3><p>'+
              (isDivision?'Create your first project using the button above.':'No projects assigned to your divisions yet.')+'</p></div>'
            : '<table style="width:100%;border-collapse:collapse">' +

              '<th style="padding:10px 14px;font-size:11px;color:var(--text-dim);text-transform:uppercase">#</th>' +
              '<th style="padding:10px 14px;font-size:11px;color:var(--text-dim);text-transform:uppercase">Project Name</th>' +
              '<th style="padding:10px 14px;font-size:11px;color:var(--text-dim);text-transform:uppercase">NH</th>' +
              '<th style="padding:10px 14px;font-size:11px;color:var(--text-dim);text-transform:uppercase">Chainages</th>' +
              '<th style="padding:10px 14px;font-size:11px;color:var(--text-dim);text-transform:uppercase">Division</th>' +
              '<th style="padding:10px 14px;font-size:11px;color:var(--text-dim);text-transform:uppercase">Length</th>' +
              '<th style="padding:10px 14px;font-size:11px;color:var(--text-dim);text-transform:uppercase">TPC</th>' +
              '<th style="padding:10px 14px;font-size:11px;color:var(--text-dim);text-transform:uppercase">LA</th>' +
              '<th style="padding:10px 14px;font-size:11px;color:var(--text-dim);text-transform:uppercase">Status</th>' +
              '<th style="padding:10px 14px;font-size:11px;color:var(--text-dim);text-transform:uppercase">Actions</th>' +

  }

  projects.forEach((p, i) => {

    const nh = nhState.nhList.find(x=>x.id===p.nhId);
    const pChainages = (nhState.projectChainages||[]).filter(pc=>pc.project_id===p.id);
    const chainageStr = pChainages.length > 0
      ? pChainages.map(pc=>'Ch.'+pc.chainage_from+'→'+pc.chainage_to).join(', ')
      : '—';
    const laIcon = p.laRequired2 ? '🏗' : '';
    const forestIcon = p.forestRequired ? '🌳' : '';

    const tr = document.createElement('tr');
    tr.dataset.stage = p.status || 'draft';

      '<td style="padding:12px 14px;white-space:nowrap">'+
      '<button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();openProjectDetail(DB.projects.find(x=>x.id==='+p.id+'))">View</button>'+
      (canEditProject(p)?'<button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();showProjectModal('+p.id+')" style="margin-left:4px">✎</button>':'')+
      (isAdmin?'<button class="btn btn-danger btn-sm proj-del-btn" data-pid="'+p.id+'" onclick="event.stopPropagation()" style="margin-left:4px">🗑</button>':'')+
      '</td>';
    tbody.appendChild(tr);
  });

  // Delete buttons
  tbody.querySelectorAll('.proj-del-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const pid = parseInt(btn.dataset.pid);
      const p = DB.projects.find(x=>x.id===pid);
      confirmModal('Delete project <strong>'+p.name+'</strong>?', async () => {
        await sbFetch('/rest/v1/lats_projects?id=eq.'+pid, {method:'DELETE'});
        await loadDB();
        renderProjects();
        showToast('Project deleted','info');
      });
    });
  });
}

function filterProjectStage(stage, btn) {
  // Update active tab
  document.querySelectorAll('.stage-tab').forEach(b => {
    b.style.background = 'transparent';
    b.style.color = b.dataset.stage === stage ? 'var(--accent)' : b.style.color;
  });
  btn.style.background = 'var(--accent)';
  btn.style.color = 'var(--navy)';

  // Filter rows
  const rows = document.querySelectorAll('#proj-tbody tr');
  rows.forEach(row => {
    row.style.display = (stage === 'all' || row.dataset.stage === stage) ? '' : 'none';
  });
}


async function showAssignModal(projectId) {
  try { DB.users = await api('GET', '/api/auth/users'); } catch(e) {}
  const p = DB.projects.find(x => x.id === projectId);
  const assigned = (p.assignedUsers || []);
  const users = DB.users.filter(u => u.role !== 'admin');
  openModal(`Assign Users — ${p.name}`, `
    <p class="text-muted mb-4">Select users to assign to this project:</p>
    ${users.length === 0 ? '<div class="alert alert-info">No users created yet. Go to User Management to create users.</div>' :
    users.map(u => `
      <label style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;cursor:pointer;border:1px solid var(--border);margin-bottom:8px;background:var(--card)">
        <input type="checkbox" id="assign-${u.id}" ${assigned.includes(u.id)?'checked':''} style="width:16px;height:16px;accent-color:var(--accent)">
        <span><strong>${u.username}</strong></span>
      </label>
    `).join('')}
  `, [
    { label: 'Cancel', cls: 'btn-secondary', action: closeModal },
    { label: 'Save Assignments', cls: 'btn-primary', action: () => saveAssignments(projectId, users) }
  ]);
}

function saveAssignments(projectId, users) {
  if (!DB.assignments) DB.assignments = [];
  // Update assignments array
  DB.assignments = DB.assignments.filter(a => a.pid !== projectId);
  const assignedUids = [];
  users.forEach(u => {
    if (document.getElementById('assign-' + u.id)?.checked) {
      DB.assignments.push({ uid: u.id, pid: projectId });
      assignedUids.push(u.id);
    }
  });
  // Also update assignedUsers on the project (this is what gets saved to DB)
  const p = DB.projects.find(x => x.id === projectId);
  if (p) p.assignedUsers = assignedUids;
  saveDB(); closeModal(); showToast('Assignments saved.', 'success');
}

function showUserModal(id, forceRole) {
  const u = id ? DB.users.find(x => x.id === id) : null;
  const role = forceRole || u?.role || 'viewer';
  const isAdminUser = u?.username === 'CENH';
  const circles = DB.users.filter(x => x.role === 'nh_circle');
  const roleTitle = { 'admin':'Admin', 'nh_circle':'NH Circle', 'nh_division':'NH Division' };
  const title = isAdminUser ? 'Edit Admin Password' : (u ? 'Edit ' + (roleTitle[role]||'User') : 'Add ' + (roleTitle[role]||'User'));

  const circleSelect = role === 'nh_division' ? `
    <div class="field" style="grid-column:1/-1">
      <label class="required">Under NH Circle</label>
      <select id="uf-parent">
        <option value="">— Select NH Circle —</option>
        ${circles.map(c => '<option value="'+c.id+'"'+(u?.parent_id===c.id?' selected':'')+'>'+c.name+'</option>').join('')}
      </select>
    </div>` : '';

  openModal(title, `
    <div class="form-grid cols-2">
      ${!isAdminUser ? '<div class="field"><label class="required">Username</label><input id="uf-user" value="'+(u?.username||'')+'" placeholder="Enter username"></div>' : ''}
      ${!isAdminUser ? '<div class="field"><label class="required">Full Name</label><input id="uf-name" value="'+(u?.name||'')+'" placeholder="e.g. Nashik Circle"></div>' : ''}
      <div class="field" style="${isAdminUser?'grid-column:1/-1':''}">
        <label class="${u?'':'required'}">Password ${u?'(leave blank to keep)':''}</label>
        <input type="password" id="uf-pass" placeholder="Enter password">
      </div>
      <input type="hidden" id="uf-role" value="${role}">
      ${circleSelect}
    </div>
  `, [
    { label: 'Cancel', cls: 'btn-secondary', action: closeModal },
    { label: u ? 'Update' : 'Create', cls: 'btn-primary', action: () => saveUser(id, isAdminUser) }
  ]);
}

async function saveUser(id, isAdminUser) {
  const username = isAdminUser ? 'CENH' : document.getElementById('uf-user')?.value.trim();
  const fullname = isAdminUser ? 'Administrator' : document.getElementById('uf-name')?.value.trim();
  const password = document.getElementById('uf-pass').value;
  const role = document.getElementById('uf-role')?.value || 'viewer';
  const parentId = document.getElementById('uf-parent')?.value || null;

  if (!isAdminUser && !username) { showToast('Username is required.', 'error'); return; }
  if (!isAdminUser && !fullname) { showToast('Full name is required.', 'error'); return; }
  if (!id && !password) { showToast('Password is required.', 'error'); return; }
  if (role === 'nh_division' && !parentId) { showToast('Please select a NH Circle.', 'error'); return; }

  try {
    if (id) {
      await api('PUT', `/api/auth/users/${id}`, { name: fullname, password: password||undefined, role, parent_id: parentId ? parseInt(parentId) : null });
      showToast('Updated successfully.', 'success');
    } else {
      await api('POST', '/api/auth/users', { username, password, name: fullname, role, parent_id: parentId ? parseInt(parentId) : null });
      showToast('Created successfully.', 'success');
    }
    DB.users = await api('GET', '/api/auth/users');
    closeModal(); renderUsers(); populateLoginDropdown();
  } catch(e) { showToast(e.message, 'error'); }
}

async function deleteUser(id) {
  const u = DB.users.find(x => x.id === id);
  confirmModal('Delete user <strong>"' + (u ? u.username : id) + '"</strong>?', async function() {
    try {
      await api('DELETE', `/api/auth/users/${id}`);
      DB.projects.forEach(p => { if (p.assignedUsers) p.assignedUsers = p.assignedUsers.filter(uid => uid !== id); });
      await saveDB();
      DB.users = await api('GET', '/api/auth/users');
      showToast('User deleted.', 'info'); renderUsers(); populateLoginDropdown();
    } catch(e) { showToast(e.message, 'error'); }
  });
}

                  <div class="flex gap-2">
