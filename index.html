  document.querySelector('.modal').classList.add('wide');

  // Attach events to existing taluka rows
  _stretchTalukaRows.forEach((_,i) => attachTalukaRowEvents(i));

  // Auto-calc length
  ['nhf-from','nhf-to'].forEach(fid => {
    document.getElementById(fid)?.addEventListener('input', () => {
      const f = parseFloat(document.getElementById('nhf-from').value);
      const t = parseFloat(document.getElementById('nhf-to').value);
      if (!isNaN(f) && !isNaN(t) && t>f) {
        document.getElementById('nhf-len').value = (t-f).toFixed(3);
      }
      updateTalukaBalance();
    });
  });

  document.getElementById('add-taluka-row-btn')?.addEventListener('click', addTalukaRow);
  updateTalukaBalance();
}

// ── Taluka rows state for modal ──
let _stretchTalukaRows = [];

function makeTalukaSelect(id, placeholder, optionsList, selectedValue) {
  var sel = document.createElement('select');
  sel.id = id;
  sel.style.cssText = 'width:100%;background:#1e293b;border:1px solid #475569;border-radius:5px;padding:5px 8px;color:#f1f5f9;font-size:12px;color-scheme:dark';
  var blank = document.createElement('option');
  blank.value = ''; blank.textContent = placeholder;
  sel.appendChild(blank);
  optionsList.forEach(function(v) {
    var opt = document.createElement('option');
    opt.value = v; opt.textContent = v;
    if (v === selectedValue) opt.selected = true;
    sel.appendChild(opt);
  });
  return sel;
}

function buildTalukaRowHtml(idx, row) {
  return '<tr id="trow-'+idx+'" style="border-top:1px solid var(--border)">' +
    '<td style="padding:6px 8px" id="trow-dist-cell-'+idx+'"></td>' +
    '<td style="padding:6px 8px" id="trow-tal-cell-'+idx+'"></td>' +
    '<td style="padding:6px 8px"><input id="trow-from-'+idx+'" type="number" step="0.001" value="'+(row.chainage_from||'')+'" style="width:100%;background:#0f172a;border:1px solid #475569;border-radius:5px;padding:5px 8px;color:#f1f5f9;font-size:12px" placeholder="0.000"></td>' +
    '<td style="padding:6px 8px"><input id="trow-to-'+idx+'" type="number" step="0.001" value="'+(row.chainage_to||'')+'" style="width:100%;background:#0f172a;border:1px solid #475569;border-radius:5px;padding:5px 8px;color:#f1f5f9;font-size:12px" placeholder="0.000"></td>' +
    '<td style="padding:6px 8px;text-align:center;font-family:monospace;font-size:12px;color:#4ade80;font-weight:700" id="trow-len-'+idx+'">'+(row.length ? row.length+' km' : '—')+'</td>' +
    '<td style="padding:6px 8px;text-align:center"><button type="button" onclick="removeTalukaRow('+idx+')" style="background:rgba(248,113,113,0.15);border:1px solid rgba(248,113,113,0.4);border-radius:4px;color:#f87171;cursor:pointer;padding:2px 8px;font-size:13px">✕</button></td>' +
  '</tr>';
}

function attachTalukaRowEvents(idx) {
  var row = _stretchTalukaRows[idx];
  if (!row) return;
  var distCell = document.getElementById('trow-dist-cell-'+idx);
  var talCell  = document.getElementById('trow-tal-cell-'+idx);
  var fromEl   = document.getElementById('trow-from-'+idx);
  var toEl     = document.getElementById('trow-to-'+idx);
  if (!distCell) return;

  // District select
  var distSel = makeTalukaSelect('trow-dist-'+idx, '— District —', MH_DISTRICT_NAMES, row.district||'');
  distCell.appendChild(distSel);

  // Taluka select
  var talSel = makeTalukaSelect('trow-tal-'+idx, '— Taluka —', row.district ? (MH_DISTRICTS[row.district]||[]) : [], row.taluka||'');
  talCell.appendChild(talSel);

  distSel.addEventListener('change', function() {
    var d = this.value;
    _stretchTalukaRows[idx].district = d;
    _stretchTalukaRows[idx].taluka = '';
    // Rebuild taluka select
    talCell.innerHTML = '';
    var newTal = makeTalukaSelect('trow-tal-'+idx, '— Taluka —', MH_DISTRICTS[d]||[], '');
    newTal.addEventListener('change', function(){ _stretchTalukaRows[idx].taluka = this.value; });
    talCell.appendChild(newTal);
    updateTalukaBalance();
  });
  talSel.addEventListener('change', function() { _stretchTalukaRows[idx].taluka = this.value; });

  function recalcLen() {
    var f = parseFloat(fromEl.value);
    var t = parseFloat(toEl.value);
    var lenEl = document.getElementById('trow-len-'+idx);
    if (!isNaN(f) && !isNaN(t) && t > f) {
      var l = (t-f).toFixed(3);
      _stretchTalukaRows[idx].chainage_from = f;
      _stretchTalukaRows[idx].chainage_to = t;
      _stretchTalukaRows[idx].length = l;
      lenEl.textContent = l+' km';
    } else {
      _stretchTalukaRows[idx].chainage_from = null;
      _stretchTalukaRows[idx].chainage_to = null;
      _stretchTalukaRows[idx].length = null;
      lenEl.textContent = '—';
    }
    updateTalukaBalance();
  }
  fromEl.addEventListener('input', recalcLen);
  toEl.addEventListener('input', recalcLen);
}

function addTalukaRow() {
  // Suggest next from = last row's to
  var lastRow = _stretchTalukaRows[_stretchTalukaRows.length-1];
  var newFrom = lastRow && lastRow.chainage_to ? parseFloat(lastRow.chainage_to) : null;
  var newRow = { district:'', taluka:'', chainage_from: newFrom, chainage_to: null, length: null };
  _stretchTalukaRows.push(newRow);
  var idx = _stretchTalukaRows.length - 1;
  var tbody = document.getElementById('taluka-rows-tbody');
  var tr = document.createElement('tr');
  tr.outerHTML; // dummy
  tbody.insertAdjacentHTML('beforeend', buildTalukaRowHtml(idx, newRow));
  attachTalukaRowEvents(idx);
  updateTalukaBalance();
}

function removeTalukaRow(idx) {
  _stretchTalukaRows[idx] = null;
  var tr = document.getElementById('trow-'+idx);
  if (tr) tr.remove();
  updateTalukaBalance();
}

function updateTalukaBalance() {
  var stretchFrom = parseFloat(document.getElementById('sf-from')?.value)||0;
  var stretchTo   = parseFloat(document.getElementById('sf-to')?.value)||0;
  var stretchLen  = stretchTo > stretchFrom ? stretchTo - stretchFrom : 0;
  var rows = _stretchTalukaRows.filter(Boolean);
  var totalTalukaLen = rows.reduce(function(s,r){ return s+(parseFloat(r.length)||0); },0);
  var diff = Math.abs(stretchLen - totalTalukaLen);
  var balEl = document.getElementById('taluka-balance');
  if (!balEl) return;
  if (stretchLen === 0) { balEl.innerHTML=''; return; }
  if (diff < 0.001) {
    balEl.innerHTML = '<span style="color:#4ade80;font-weight:700">✅ Total matches stretch length ('+stretchLen.toFixed(3)+' km)</span>';
  } else {
    var rem = stretchLen - totalTalukaLen;
    var color = rem > 0 ? '#fbbf24' : '#f87171';
    balEl.innerHTML = '<span style="color:'+color+';font-weight:700">'+(rem>0?'⚠ Remaining: '+rem.toFixed(3)+' km to assign':'⚠ Over by '+Math.abs(rem).toFixed(3)+' km — exceeds stretch length')+'</span>';
  }
}

function openStretchModal(nhId, id) {
  const nh = nhState.nhList.find(x=>x.id===nhId);
  const s = id ? (nhState.stretches[nhId]||[]).find(x=>x.id===id) : null;
  const stretches = nhState.stretches[nhId] || [];
  const nhFrom = (nh.chainage_from !== null && nh.chainage_from !== '') ? parseFloat(nh.chainage_from) : 0;
  const nhTo   = (nh.chainage_to !== null && nh.chainage_to !== '') ? parseFloat(nh.chainage_to) : 0;
  const otherStretches = stretches.filter(x => x.id !== id);
  const nextFrom = s ? ((s.chainage_from !== null && s.chainage_from !== '') ? parseFloat(s.chainage_from) : 0) : getNextChainageFrom(nhFrom, otherStretches);
  const gaps = getChainageGaps(nhFrom, nhTo, otherStretches);
  // Build divisions from NH Division users
  const divisionUsers = (DB.users||[]).filter(u => u.role === 'nh_division');
  const isDivisionUser = currentUser.role === 'nh_division';
  const curDiv = s?.division || (isDivisionUser ? currentUser.name : '');

  // Load existing taluka rows
  const existingTalukas = id ? (DB.stretchTalukas||[]).filter(t=>t.stretch_id===id) : [];
  _stretchTalukaRows = existingTalukas.length > 0
    ? existingTalukas.map(t=>({ district:t.district||'', taluka:t.taluka||'', chainage_from:t.chainage_from, chainage_to:t.chainage_to, length:t.length }))
    : [];

  const gapHint = gaps.length > 0
    ? '<div style="margin-bottom:12px;padding:9px 14px;background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:8px;font-size:12px;color:#fbbf24">'+
      '<strong>Available gaps:</strong> ' + gaps.map(g=>'Ch. '+g.from.toFixed(3)+' → '+g.to.toFixed(3)+' ('+((g.to-g.from).toFixed(3))+' km)').join(' &nbsp;|&nbsp; ')+'</div>'
    : '';

  const talukaRowsHtml = _stretchTalukaRows.map((r,i) => buildTalukaRowHtml(i, r)).join('');

  openModal((s?'Edit':'Add')+' Stretch — '+nh.nh_number, `
    ${gapHint}
    <div class="form-grid cols-2" style="margin-bottom:16px">
      <div class="form-grid cols-2" style="grid-column:1/-1;margin-bottom:0">
        <div class="field"><label class="required">Place Name From</label>
          <input id="sf-place-from" value="${s?.place_from||''}" placeholder="e.g. Pune, Nashik"></div>
        <div class="field"><label class="required">Place Name To</label>
          <input id="sf-place-to" value="${s?.place_to||''}" placeholder="e.g. Mumbai, Aurangabad"></div>
      </div>
      <div class="field">
        <label class="required">Chainage From (km)</label>
        <input id="sf-from" type="number" step="0.001" value="${nextFrom}" placeholder="${nhFrom}">
        <div id="sf-from-err" style="font-size:11px;color:#f87171;margin-top:3px;display:none"></div>
      </div>
      <div class="field">
        <label class="required">Chainage To (km)</label>
        <input id="sf-to" type="number" step="0.001" value="${s ? ((s.chainage_to !== null && s.chainage_to !== '') ? s.chainage_to : '') : ''}" placeholder="${nhTo}">
        <div id="sf-to-err" style="font-size:11px;color:#f87171;margin-top:3px;display:none"></div>
      </div>
      <div class="field"><label>Length (km) <span style="font-size:10px;color:#4ade80">(auto)</span></label>
        <input id="sf-len" readonly placeholder="Auto" style="background:rgba(74,222,128,0.08);border-color:rgba(74,222,128,0.4)"></div>
      <div class="field"><label>Division</label>
        ${isDivisionUser
          ? '<input id="sf-division" value="'+curDiv+'" readonly style="background:rgba(74,222,128,0.08);border-color:rgba(74,222,128,0.4)">'
          : '<select id="sf-division"><option value="">— Select Division —</option>' +
            divisionUsers.map(d=>'<option value="'+d.name+'"'+(curDiv===d.name?' selected':'')+'>'+d.name+'</option>').join('') +
            '</select>'
        }
      </div>
      <div class="field"><label>Assign Project</label>
        <select id="sf-project">
          <option value="">— Not Assigned —</option>
          ${DB.projects.map(p=>'<option value="'+p.id+'"'+(s?.project_id===p.id?' selected':'')+'>'+p.name+'</option>').join('')}
        </select>
      </div>
      <div class="field" style="grid-column:1/-1"><label>Description</label>
        <input id="sf-desc" value="${s?.description||''}" placeholder="Optional notes about this stretch"></div>
    </div>

    <!-- District / Taluka Breakup -->
    <div style="border-top:1px solid var(--border);padding-top:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div>
          <span style="font-size:13px;font-weight:700;color:var(--accent)">District / Taluka Chainage Breakup</span>
          <span style="font-size:11px;color:var(--text-dim);margin-left:8px">Total must equal stretch length</span>
        </div>
        <button type="button" id="add-taluka-row-btn" class="btn btn-secondary btn-sm">+ Add Row</button>
      </div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;min-width:560px">
          <thead><tr style="background:var(--surface)">
            <th style="padding:8px 8px;text-align:left;font-size:11px;color:var(--text-dim);text-transform:uppercase;width:28%">District</th>
            <th style="padding:8px 8px;text-align:left;font-size:11px;color:var(--text-dim);text-transform:uppercase;width:24%">Taluka</th>
            <th style="padding:8px 8px;text-align:left;font-size:11px;color:var(--text-dim);text-transform:uppercase;width:16%">Ch. From</th>
            <th style="padding:8px 8px;text-align:left;font-size:11px;color:var(--text-dim);text-transform:uppercase;width:16%">Ch. To</th>
            <th style="padding:8px 8px;text-align:center;font-size:11px;color:var(--text-dim);text-transform:uppercase;width:12%">Length</th>
            <th style="width:4%"></th>
          </tr></thead>
          <tbody id="taluka-rows-tbody">${talukaRowsHtml}</tbody>
        </table>
      </div>
      <div id="taluka-balance" style="margin-top:10px;font-size:12px;min-height:20px"></div>
    </div>
  `, [
    { label:'Cancel', cls:'btn-secondary', action:closeModal },
    { label: s ? 'Update Stretch' : 'Add Stretch', cls:'btn-primary', action: async () => {
      const placeFrom = document.getElementById('sf-place-from').value.trim();
      const placeTo = document.getElementById('sf-place-to').value.trim();
      const name = (placeFrom && placeTo) ? placeFrom + ' to ' + placeTo : (placeFrom || placeTo || 'Ch.'+from+' to Ch.'+to);
      const from = parseFloat(document.getElementById('sf-from').value);
      const to   = parseFloat(document.getElementById('sf-to').value);

      document.getElementById('sf-from-err').style.display = 'none';
      document.getElementById('sf-to-err').style.display   = 'none';

      if (!placeFrom && !placeTo) { showToast('Place Name From or To is required','error'); return; }
      if (isNaN(from)||isNaN(to)) { showToast('Chainage From and To are required','error'); return; }
      if (to <= from) {
        document.getElementById('sf-to-err').textContent = 'Chainage To must be greater than Chainage From.';
        document.getElementById('sf-to-err').style.display = 'block'; return;
      }
      if (from < nhFrom - 0.001 || to > nhTo + 0.001) {
        showToast('Chainage must be within NH range ('+nhFrom+' – '+nhTo+' km)','error'); return;
      }
      for (const os of otherStretches) {
        const osf = parseFloat(os.chainage_from), ost = parseFloat(os.chainage_to);
        if (from < ost - 0.001 && to > osf + 0.001) {
          document.getElementById('sf-from-err').textContent = 'Overlaps with "'+os.name+'" (Ch. '+osf+' – '+ost+').';
          document.getElementById('sf-from-err').style.display = 'block'; return;
        }
      }

      // Taluka balance check
      const talukaRows = _stretchTalukaRows.filter(Boolean).filter(r=>r.district||r.taluka);
      if (talukaRows.length > 0) {
        const stretchLen = to - from;
        const totalTal = talukaRows.reduce((s,r)=>s+(parseFloat(r.length)||0),0);
        if (Math.abs(stretchLen - totalTal) > 0.01) {
          showToast('Taluka chainage total ('+totalTal.toFixed(3)+' km) must equal stretch length ('+stretchLen.toFixed(3)+' km)','error'); return;
        }
        // Check all taluka rows have district and valid chainages
        for (var tr of talukaRows) {
          if (!tr.district) { showToast('All taluka rows must have a district selected','error'); return; }
          if (!tr.chainage_from && tr.chainage_from !== 0) { showToast('All taluka rows must have chainage from/to','error'); return; }
        }
      }

      const len = (to-from).toFixed(3);
      const body = { name, place_from:placeFrom, place_to:placeTo, chainage_from:from, chainage_to:to, length:len,
        description:document.getElementById('sf-desc').value,
        district: talukaRows.length>0 ? [...new Set(talukaRows.map(r=>r.district))].join(', ') : '',
        taluka:   talukaRows.length>0 ? [...new Set(talukaRows.map(r=>r.taluka).filter(Boolean))].join(', ') : '',
        division: document.getElementById('sf-division').value,
        project_id: document.getElementById('sf-project').value||null };
      try {
        let stretchId;
        if (s) {
          const r = await api('PUT','/api/nh/stretches/'+id, body);
          const arr = nhState.stretches[nhId];
          arr[arr.findIndex(x=>x.id===id)] = r;
          stretchId = id;
        } else {
          const r = await api('POST','/api/nh/'+nhId+'/stretches', body);
          if (!nhState.stretches[nhId]) nhState.stretches[nhId] = [];
          nhState.stretches[nhId].push(r);
          stretchId = r.id;
        }
        // Save taluka rows
        if (talukaRows.length > 0) {
          const saved = await api('POST','/api/nh/stretches/'+stretchId+'/talukas', { rows: talukaRows });
          // Update local DB
          DB.stretchTalukas = (DB.stretchTalukas||[]).filter(t=>t.stretch_id!==stretchId);
          saved.forEach(t => DB.stretchTalukas.push(t));
        }
        closeModal();
        renderStretchPanel(nhState.nhList.find(x=>x.id===nhId));
        showToast('Stretch saved!','success');
      } catch(e) { showToast('Error: '+e.message,'error'); }
    }}
  ]);
  document.querySelector('.modal').classList.add('wide');

  // Attach events to existing taluka rows
  _stretchTalukaRows.forEach((_,i) => attachTalukaRowEvents(i));

  // Stretch chainage events
  ['sf-from','sf-to'].forEach(fid => {
    document.getElementById(fid)?.addEventListener('input', () => {
      const f = parseFloat(document.getElementById('sf-from').value);
      const t = parseFloat(document.getElementById('sf-to').value);
      if (!isNaN(f) && !isNaN(t) && t > f) {
        document.getElementById('sf-len').value = (t-f).toFixed(3);
      } else {
        document.getElementById('sf-len').value = '';
      }
      updateTalukaBalance();
    });
  });

  // Init length display if editing
  if (s && s.chainage_from !== null && s.chainage_from !== '' && s.chainage_to !== null && s.chainage_to !== '') {
    document.getElementById('sf-len').value = (parseFloat(s.chainage_to)-parseFloat(s.chainage_from)).toFixed(3);
  }

  document.getElementById('add-taluka-row-btn')?.addEventListener('click', addTalukaRow);
  updateTalukaBalance();
}

async function deleteStretch(nhId, id) {
  confirmModal('Delete this stretch?', async () => {
    await api('DELETE','/api/nh/stretches/'+id);
    nhState.stretches[nhId] = nhState.stretches[nhId].filter(x=>x.id!==id);
    renderStretchRows(nhState.nhList.find(x=>x.id===nhId));
    showToast('Deleted','info');
  });
}

  ).join('');

    <div class="form-grid cols-2">
      <div class="field"><label class="required">Project</label>
        <select id="ctf-proj"><option value="">— Select Project —</option>${DB.projects.map(p=>`<option value="${p.id}" ${ct?.project_id===p.id?'selected':''}>${p.name}</option>`).join('')}</select>
      </div>
      <div class="field"><label>Project Type</label><select id="ctf-ptype"><option value="">— Select Type —</option>${nhState.projectTypes.map(pt=>`<option value="${pt.id}" ${ct?.project_type_id===pt.id?'selected':''}>${pt.name}</option>`).join('')}</select></div>
      <div class="field" style="grid-column:1/-1"><label>Stretch</label><select id="ctf-stretch"><option value="">— Select Stretch —</option>${allStretches.map(s=>`<option value="${s.id}" ${ct?.stretch_id===s.id?'selected':''}>${nhState.nhList.find(n=>n.id===s.nh_id)?.nh_number||''} | ${s.name||('Ch.'+s.chainage_from+'-'+s.chainage_to)}</option>`).join('')}</select></div>
      <div class="field" style="grid-column:1/-1;border-top:1px solid var(--border);padding-top:14px;margin-top:4px"><label style="font-size:13px;font-weight:700;color:var(--accent)">Contractor Details</label></div>
      <div class="field"><label class="required">Contractor Name</label><input id="ctf-name" value="${ct?.contractor_name||''}" placeholder="Firm / Contractor name"></div>
      <div class="field"><label>Contact Number</label><input id="ctf-contact" value="${ct?.contractor_contact||''}" placeholder="Mobile / Phone"></div>
      <div class="field" style="grid-column:1/-1"><label>Address</label><textarea id="ctf-addr" rows="2" style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);resize:vertical">${ct?.contractor_address||''}</textarea></div>
      <div class="field" style="grid-column:1/-1;border-top:1px solid var(--border);padding-top:14px;margin-top:4px"><label style="font-size:13px;font-weight:700;color:var(--accent)">Bidding / Contract Details</label></div>
      <div class="field"><label>Cost Put to Tender (₹)</label><input id="ctf-tender" type="number" value="${ct?.cost_put_to_tender||''}" placeholder="0.00" oninput="calcPct()"></div>
      <div class="field"><label>Contract Price (₹)</label><input id="ctf-price" type="number" value="${ct?.contract_price||''}" placeholder="0.00" oninput="calcPct()"></div>
      <div class="field"><label>% Above / Below <span style="font-size:10px;color:#4ade80">(auto)</span></label>
        <input id="ctf-pct" readonly value="${ct?.pct_above_below!==null&&ct?.pct_above_below!==undefined?(parseFloat(ct.pct_above_below)*100).toFixed(4)+'%':''}" style="background:rgba(74,222,128,0.08);border-color:rgba(74,222,128,0.4)">
      </div>
      <div class="field"><label>Agreement Date</label><input id="ctf-agr" type="date" value="${ct?.agreement_date||''}"></div>
      <div class="field"><label>Appointed Date</label><input id="ctf-appt" type="date" value="${ct?.appointed_date||''}"></div>
      <div class="field"><label>Schedule Completion Date</label><input id="ctf-comp" type="date" value="${ct?.schedule_completion||''}"></div>
      <div class="field"><label>EOT Date (if any)</label><input id="ctf-eot" type="date" value="${ct?.eot_date||''}"></div>
      <div class="field"><label>DLP Date</label><input id="ctf-dlp" type="date" value="${ct?.dlp_date||''}"></div>
      <div class="field" style="grid-column:1/-1"><label>Remarks</label><textarea id="ctf-remarks" rows="2" style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);resize:vertical">${ct?.remarks||''}</textarea></div>
    </div>
  `, [
    { label:'Cancel', cls:'btn-secondary', action:closeModal },
    { label: ct ? 'Update Contract' : 'Save Contract', cls:'btn-primary', action: async () => {
      const projId = document.getElementById('ctf-proj').value;
      const name   = document.getElementById('ctf-name').value.trim();
      if (!projId || !name) { showToast('Project and Contractor Name are required','error'); return; }
      const body = {
        project_id: projId, stretch_id: document.getElementById('ctf-stretch').value||null,
        project_type_id: document.getElementById('ctf-ptype').value||null,
        contractor_name: name, contractor_address: document.getElementById('ctf-addr').value,
        contractor_contact: document.getElementById('ctf-contact').value,
        cost_put_to_tender: document.getElementById('ctf-tender').value||null,
        contract_price: document.getElementById('ctf-price').value||null,
        agreement_date: document.getElementById('ctf-agr').value,
        appointed_date: document.getElementById('ctf-appt').value,
        schedule_completion: document.getElementById('ctf-comp').value,
        eot_date: document.getElementById('ctf-eot').value,
        dlp_date: document.getElementById('ctf-dlp').value,
        remarks: document.getElementById('ctf-remarks').value,
      };
      try {
        if (ct) {
          const r = await api('PUT','/api/nh/contracts/'+id, body);
          const idx = nhState.contracts.findIndex(x=>x.id===id);
          nhState.contracts[idx] = r;
        } else {
          const r = await api('POST','/api/nh/contracts', body);
          nhState.contracts.push(r);
        }
        closeModal(); renderContractRows(); showToast('Contract saved!','success');
      } catch(e) { showToast('Error: '+e.message,'error'); }
    }}
  ]);
  document.querySelector('.modal').classList.add('wide');
}

function calcPct() {
  const tender = parseFloat(document.getElementById('ctf-tender')?.value)||0;
  const price  = parseFloat(document.getElementById('ctf-price')?.value)||0;
  const pctEl  = document.getElementById('ctf-pct');
  if (!pctEl) return;
  if (tender > 0 && price > 0) {
    const pct = (1 - price/tender)*100;
    pctEl.value = (pct >= 0 ? '+' : '') + pct.toFixed(4) + '%';
    pctEl.style.color = pct < 0 ? '#f87171' : '#4ade80';
  } else {
    pctEl.value = '';
  }
}

async function deleteContract(id) {
  confirmModal('Delete this contract?', async () => {
    await api('DELETE','/api/nh/contracts/'+id);
    nhState.contracts = nhState.contracts.filter(x=>x.id!==id);
    renderContractRows(); showToast('Deleted','info');
  });
}

</script>
</body>
</html>
