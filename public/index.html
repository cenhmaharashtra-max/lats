<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Land Acquisition Tracking System</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0a1628;
  --navy-mid: #112240;
  --navy-light: #1a3a5c;
  --accent: #e8a020;
  --accent-light: #f5c842;
  --green: #22c55e;
  --red: #ef4444;
  --blue: #3b82f6;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --border: rgba(255,255,255,0.08);
  --card: rgba(255,255,255,0.04);
  --card-hover: rgba(255,255,255,0.07);
  --input-bg: rgba(255,255,255,0.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--navy);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
}

/* LOGIN */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #0a1628 0%, #0d2144 50%, #0a1628 100%);
  position: relative;
  overflow: hidden;
}
#login-screen::before {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(232,160,32,0.08) 0%, transparent 70%);
  top: -100px; right: -100px;
}
.login-card {
  background: var(--navy-mid);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 48px;
  width: 400px;
  box-shadow: 0 25px 80px rgba(0,0,0,0.5);
  position: relative;
  z-index: 1;
}
.login-logo {
  text-align: center;
  margin-bottom: 32px;
}
.login-logo .emblem {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  border-radius: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 16px;
  box-shadow: 0 8px 24px rgba(232,160,32,0.3);
}
.login-logo h1 { font-size: 22px; font-weight: 700; color: var(--text); }
.login-logo p { color: var(--text-dim); font-size: 12px; margin-top: 4px; letter-spacing: 2px; text-transform: uppercase; }
.login-card .field { margin-bottom: 20px; }
.login-card label { display: block; font-size: 12px; font-weight: 500; color: var(--text-dim); margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
.login-card input {
  width: 100%;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.login-card input:focus { border-color: var(--accent); }
.btn-login {
  width: 100%;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  color: var(--navy);
  border: none;
  border-radius: 8px;
  padding: 14px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: opacity 0.2s, transform 0.1s;
}
.btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
.login-error { color: var(--red); font-size: 13px; margin-top: 12px; text-align: center; }

/* APP SHELL */
#app { display: none; min-height: 100vh; }
.sidebar {
  width: 240px;
  background: var(--navy-mid);
  border-right: 1px solid var(--border);
  position: fixed;
  top: 0; left: 0; bottom: 0;
  overflow-y: auto;
  z-index: 100;
}
.sidebar-header {
  padding: 20px;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 12px;
}
.sidebar-logo .icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.sidebar-logo .text h2 { font-size: 13px; font-weight: 700; line-height: 1.2; }
.sidebar-logo .text p { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
.sidebar-user {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.user-avatar {
  width: 32px; height: 32px;
  background: var(--navy-light);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  font-weight: 600;
  color: var(--accent);
  flex-shrink: 0;
}
.user-info .name { font-size: 13px; font-weight: 600; }
.user-info .role { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
.sidebar-nav { padding: 12px 0; }
.nav-section-label {
  padding: 8px 20px 4px;
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-weight: 600;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  cursor: pointer;
  color: var(--text-dim);
  transition: all 0.15s;
  font-size: 13.5px;
  font-weight: 500;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: var(--card); color: var(--text); }
.nav-item.active { background: rgba(232,160,32,0.1); color: var(--accent); border-left-color: var(--accent); }
.nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
.nav-logout {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  margin-top: auto;
}
.btn-logout {
  width: 100%;
  background: rgba(239,68,68,0.1);
  border: 1px solid var(--red);
  border-radius: 8px;
  padding: 10px;
  color: var(--red);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-logout:hover { background: var(--red); color: #fff; }

.main-content {
  margin-left: 240px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.topbar {
  background: var(--navy-mid);
  border-bottom: 1px solid var(--border);
  padding: 16px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar h1 { font-size: 18px; font-weight: 600; }
.topbar .breadcrumb { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.page-content { padding: 28px; flex: 1; }

/* CARDS & PANELS */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  transition: background 0.15s;
}
.stat-card:hover { background: var(--card-hover); }
.stat-card .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.stat-card .value { font-size: 28px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
.stat-card .sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
.stat-card.accent .value { color: var(--accent); }
.stat-card.green .value { color: var(--green); }
.stat-card.blue .value { color: var(--blue); }
.stat-card.purple .value { color: #a78bfa; }
.stat-card.orange .value { color: #fb923c; }
.stat-card.teal .value { color: #2dd4bf; }

.panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 24px;
  overflow: hidden;
}
.panel-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.panel-header h3 { font-size: 15px; font-weight: 600; }
.panel-body { padding: 20px; }

/* TABLES */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left;
  padding: 10px 14px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.02);
}
td {
  padding: 12px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 13.5px;
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--card-hover); }
.mono { font-family: 'IBM Plex Mono', monospace; font-size: 13px; }

/* BADGES */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
}
.badge-pending { background: rgba(148,163,184,0.15); color: var(--text-dim); }
.badge-3a { background: rgba(59,130,246,0.15); color: #60a5fa; }
.badge-jm { background: rgba(168,85,247,0.15); color: #c084fc; }
.badge-3d { background: rgba(34,197,94,0.15); color: #4ade80; }
.badge-3g { background: rgba(232,160,32,0.15); color: var(--accent-light); }
.badge-complete { background: rgba(34,197,94,0.2); color: var(--green); }
.badge-admin { background: rgba(232,160,32,0.2); color: var(--accent); }
.badge-user { background: rgba(59,130,246,0.15); color: #60a5fa; }

/* BUTTONS */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 7px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
}
.btn-primary { background: var(--accent); color: var(--navy); }
.btn-primary:hover { background: var(--accent-light); }
.btn-secondary { background: var(--input-bg); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--card-hover); border-color: rgba(255,255,255,0.15); }
.btn-danger { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
.btn-danger:hover { background: rgba(239,68,68,0.25); }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-icon { padding: 6px; border-radius: 6px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text-dim); cursor: pointer; transition: all 0.15s; }
.btn-icon:hover { color: var(--text); background: var(--card-hover); }

/* FORMS */
.form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
.form-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-dim); margin-bottom: 6px; letter-spacing: 0.5px; }
.field input, .field select, .field textarea {
  width: 100%;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 10px 14px;
  color: var(--text);
  font-family: inherit;
  font-size: 13.5px;
  outline: none;
  transition: border-color 0.2s;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field select option { background: var(--navy-mid); }
.field .hint { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
.required::after { content: ' *'; color: var(--accent); }

/* MODALS */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--navy-mid);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  width: 90%;
  max-width: 600px;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 25px 80px rgba(0,0,0,0.5);
  animation: slideUp 0.2s ease;
}
.modal.wide { max-width: 800px; }
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.modal-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-header h3 { font-size: 16px; font-weight: 600; }
.modal-body { padding: 24px; }
.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 10px;
}

/* PROCESS STEPPER */
.process-steps {
  display: flex;
  align-items: center;
  gap: 0;
  margin-bottom: 24px;
  overflow-x: auto;
}
.process-step {
  display: flex;
  align-items: center;
  flex-shrink: 0;
}
.step-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 0 12px;
}
.step-circle {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  font-weight: 700;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--text-dim);
  transition: all 0.2s;
}
.step-circle.done { background: var(--green); border-color: var(--green); color: #fff; }
.step-circle.active { background: var(--accent); border-color: var(--accent); color: var(--navy); }
.step-label { font-size: 11px; color: var(--text-dim); font-weight: 500; white-space: nowrap; }
.step-label.active { color: var(--accent); }
.step-connector { width: 40px; height: 2px; background: var(--border); flex-shrink: 0; }
.step-connector.done { background: var(--green); }

/* TABS */
.tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.tab {
  padding: 10px 18px;
  font-size: 13.5px;
  font-weight: 500;
  color: var(--text-dim);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ALERTS */
.alert {
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.alert-info { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2); color: #93c5fd; }
.alert-warning { background: rgba(232,160,32,0.1); border: 1px solid rgba(232,160,32,0.2); color: var(--accent-light); }
.alert-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: #86efac; }

/* SEARCH */
.search-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
  min-width: 220px;
}
.search-bar input {
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  flex: 1;
}
.search-bar span { color: var(--text-dim); font-size: 14px; }

/* PROGRESS BAR */
.progress-bar {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
  transition: width 0.3s;
}

/* SECTION VIEWS */
.section-view { display: none; }
.section-view.active { display: block; }

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-dim);
}
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state h3 { font-size: 16px; color: var(--text); margin-bottom: 8px; }
.empty-state p { font-size: 13px; }

/* RESPONSIVE */
@media (max-width: 768px) {
  .sidebar {
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    position: fixed;
    z-index: 1000;
    height: 100%;
  }
  .sidebar.open { transform: translateX(0); }
  .main-content { margin-left: 0; }
  .form-grid.cols-2, .form-grid.cols-3 { grid-template-columns: 1fr; }
  .hamburger { display: flex !important; }
  /* sidebar-overlay controlled by JS only */
}
.hamburger {
  display: none;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  background: var(--accent);
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
  color: white;
  margin-right: 10px;
}
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 999;
  pointer-events: none;
}
.sidebar-overlay.visible {
  display: block;
  pointer-events: auto;
}
.chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  background: var(--input-bg);
  color: var(--text-dim);
  margin: 2px;
}
.divider { height: 1px; background: var(--border); margin: 20px 0; }
.text-muted { color: var(--text-dim); }
.text-accent { color: var(--accent); }
.text-green { color: var(--green); }
.text-red { color: var(--red); }
.flex { display: flex; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.flex-wrap { flex-wrap: wrap; }
.mt-2 { margin-top: 8px; }
.mt-4 { margin-top: 16px; }
.mb-4 { margin-bottom: 16px; }
.w-full { width: 100%; }
.toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: var(--navy-mid);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 20px;
  font-size: 13.5px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  z-index: 999;
  display: flex;
  align-items: center;
  gap: 10px;
  transform: translateY(80px);
  opacity: 0;
  transition: all 0.3s;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-left: 4px solid var(--green); }
.toast.error { border-left: 4px solid var(--red); }
.toast.info { border-left: 4px solid var(--blue); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="emblem">🏛</div>
      <h1>Land Acquisition Tracking System</h1>
      <p>CHIEF ENGINEER, NATIONAL HIGHWAY (PWD)</p>
    </div>
    <div class="field">
      <label>Username</label>
      <select id="login-user" style="width:100%">
        <option value="">— Select Username —</option>
      </select>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="Enter password">
    </div>
    <button class="btn-login" id="loginBtn">Sign In</button>
    <div class="login-error" id="login-error"></div>

  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="icon">🏛</div>
        <div class="text">
          <h2 style="font-size:11px;line-height:1.3;letter-spacing:0.5px">LAND ACQUISITION<br>TRACKING SYSTEM</h2>
        </div>
      </div>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="sb-avatar">A</div>
      <div class="user-info">
        <div class="name" id="sb-name">Admin</div>
        <div class="role" id="sb-role">Admin</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="nav-logout">
      <button class="btn-logout" onclick="doLogout()">⬅ Sign Out</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <div class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <div>
          <h1 id="page-title">Dashboard</h1>
          <div class="breadcrumb" id="page-breadcrumb">Home</div>
        </div>
      </div>
      <div class="flex gap-2 items-center">
        <span class="text-muted" style="font-size:12px;" id="current-date"></span>
      </div>
    </div>
    <div class="page-content" id="page-content"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <h3 id="modal-title">Modal</h3>
      <button class="btn-icon" onclick="closeModal()">✕</button>
    </div>

<script>
// ═══════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════
// DATA STORE  (in-memory cache — synced from backend)
// ═══════════════════════════════════════════════════════
const DB = {
  projects:[], villages:[],
  process3a:[], process3aGuts:[],
  processJM:[], processJMGuts:[],
  process3D:[], process3DGuts:[],
  process3G:[], process3GGuts:[],
  assignments:[], users:[]
};

// ── API helper ──
async function api(method, url, body) {
  const opts = { method, credentials:'include', headers:{'Content-Type':'application/json'} };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error||res.statusText); }
  return res.json();
}

// ── Map server rows → app camelCase ──
function mapSync(d) {
  DB.projects = (d.projects||[]).map(p=>({
    id:p.id, name:p.name, tafsNo:p.tafs_no, length:p.length, tpc:p.tpc,
    civilCost:p.civil_cost, laCost:p.la_cost, totalLand:p.total_land,
    availLand:p.avail_land, laRequired:p.la_required, laLength:p.la_length,
    approvalDate:p.approval_date, assignedUsers:p.assigned_users||[]
  }));
  DB.villages = (d.villages||[]).map(v=>({
    id:v.id, projectId:v.project_id, name:v.name, taluka:v.taluka, isAddl:v.is_addl
  }));
  DB.process3a = (d.p3a||[]).map(x=>({
    id:x.id, projectId:x.project_id, villageId:x.village_id, type:x.ptype,
    notifDate:x.notif_date||'', calaPost:x.cala_post, calaName:x.cala_name,
    calaMobile:x.cala_mobile, isAdditional:x.is_addl
  }));
  DB.process3aGuts = (d.p3aGuts||[]).map(g=>({
    id:g.id, process3aId:g.p3a_id, gutNumber:g.gut_number, area:g.area, landType:g.land_type
  }));
  DB.processJM = (d.pjm||[]).map(x=>({
    id:x.id, projectId:x.project_id, villageId:x.village_id,
    jmDate:x.jm_date||'', sheetDate:x.sheet_date||''
  }));
  DB.processJMGuts = (d.pjmGuts||[]).map(g=>({
    id:g.id, processJMId:g.pjm_id, gutNumber:g.gut_number, modArea:g.mod_area
  }));
  DB.process3D = (d.p3d||[]).map(x=>({
    id:x.id, projectId:x.project_id, villageId:x.village_id, notifDate:x.notif_date||''
  }));
  DB.process3DGuts = (d.p3dGuts||[]).map(g=>({
    id:g.id, process3DId:g.p3d_id, gutNumber:g.gut_number, area:g.area,
    beneficiary:g.beneficiary, landType:g.land_type
  }));
  DB.process3G = (d.p3g||[]).map(x=>({
    id:x.id, projectId:x.project_id, villageId:x.village_id, notifDate:x.notif_date||''
  }));
  DB.process3GGuts = (d.p3gGuts||[]).map(g=>({
    id:g.id, process3GId:g.p3g_id, gutNumber:g.gut_number,
    compensation:g.compensation, landType:g.land_type
  }));
  DB.assignments = [];
  DB.projects.forEach(p=>(p.assignedUsers||[]).forEach(uid=>DB.assignments.push({uid,pid:p.id})));
}

async function loadDB() {
  const data = await api('GET','/api/sync');
  mapSync(data);
}

async function saveDB() {
  await api('POST','/api/save', DB);
  await loadDB();
}

function newId() { return Math.floor(Math.random() * 900000000) + 100000000; }

function fmtDate(d) {
  if (!d) return '—';
  const p = String(d).split('-');
  return p.length===3 ? p[2]+'/'+p[1]+'/'+p[0] : d;
}

function isProjectAssigned(projectId, userId) {
  return DB.assignments.some(a=>a.pid===projectId && a.uid===userId);
}
function getMyProjects() {
  if (currentUser.role==='admin') return DB.projects;
  return DB.projects.filter(p=>isProjectAssigned(p.id, currentUser.id));
}

// ═══════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════
let currentUser = null;

async function populateLoginDropdown() {
  const sel = document.getElementById('login-user');
  if (!sel) return;
  try {
    const users = await api('GET','/api/auth/users');
    DB.users = users;
    sel.innerHTML = '<option value="">— Select Username —</option>';
    // Admin first
    const admin = users.find(u => u.username === 'CENH');
    if (admin) {
      const o = document.createElement('option');
      o.value = admin.username;
      o.textContent = admin.username + ' (Admin)';
      sel.appendChild(o);
    }
    // Then other users
    users.filter(u => u.username !== 'CENH')
      .sort((a,b) => a.username.localeCompare(b.username))
      .forEach(u => {
        const o = document.createElement('option');
        o.value = u.username;
        o.textContent = u.username;
        sel.appendChild(o);
      });
  } catch(e) {
    // If can't fetch users, keep as-is
  }
}

async function doLogin() {
  const username = (document.getElementById('login-user')?.value||'').trim();
  const password = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  if (!username) { errEl.textContent='Please enter your username.'; return; }
  if (!password) { errEl.textContent='Please enter your password.'; return; }
  errEl.textContent='Signing in…';
  try {
    currentUser = await api('POST','/api/auth/login',{username,password});
    errEl.textContent='';
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    await loadDB();
    initApp();
  } catch(e) {
    errEl.textContent='Invalid credentials. Please try again.';
    document.getElementById('login-pass').value='';
  }
}

async function doLogout() {
  await api('POST','/api/auth/logout').catch(()=>{});
  currentUser=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('login-pass').value='';
  document.getElementById('login-error').textContent='';
  populateLoginDropdown();
}

document.addEventListener('DOMContentLoaded', async function() {
  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('login-user').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
  document.getElementById('login-pass').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
  document.getElementById('resetStorageLink').addEventListener('click', function(){
    confirmModal('This will <strong>sign you out</strong> and reload the page.', ()=>doLogout());
  });
  // Always show login screen — no auto-login
  populateLoginDropdown();
});

function toggleSidebar() {

}

}

function initApp() {
  const displayName = currentUser.role === 'admin' ? currentUser.username : currentUser.name;
  document.getElementById('sb-avatar').textContent = displayName[0].toUpperCase();
  document.getElementById('sb-name').textContent = displayName;

  renderSidebar();
  navigate('dashboard');
  startAutoRefresh();
}

// Auto-refresh: re-fetch data from server every 30 seconds and re-render current page
let _autoRefreshTimer = null;
function startAutoRefresh() {
  if (_autoRefreshTimer) clearInterval(_autoRefreshTimer);
  _autoRefreshTimer = setInterval(async function() {
    // Only refresh if app is visible and user is logged in
    if (document.hidden || !currentUser) return;
    try {
      await loadDB();
      // Re-render current page silently (no toast)
      const page = currentPage;
      if (page === 'dashboard') renderDashboard();
      else if (page === 'projects') renderProjects();
      else if (page === 'villages') renderVillages();
      else if (page === 'users') renderUsers();
      else if (page === 'reports') renderReportContent();
      // la-process not auto-refreshed to avoid disrupting active data entry
    } catch(e) { /* silent fail */ }
  }, 30000); // every 30 seconds
}

function renderSidebar() {
  const nav = currentUser.role === 'admin' ? adminNav : userNav;

    <div class="nav-section-label">${section.section}</div>

      <div class="nav-item" data-page="${item.id}" id="nav-${item.id.replace('-','_')}">

function setActiveNav(page) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.querySelector(`.nav-item[data-page="${page}"]`);
  if (navEl) navEl.classList.add('active');
}

let currentPage = '';
function navigate(page, params) {
  closeSidebar();
  currentPage = page;
  setActiveNav(page);
  
  const titles = {
    dashboard: 'Dashboard', projects: 'Projects', users: 'User Management',
    villages: 'Village Master', 'la-process': 'LA Process Entry', reports: 'Reports'
  };
  document.getElementById('page-title').textContent = titles[page] || page;
  document.getElementById('page-breadcrumb').textContent = 'Home / ' + (titles[page] || page);
  
  const content = document.getElementById('page-content');
  content.innerHTML = '';
  
  if (page === 'dashboard') renderDashboard();
  else if (page === 'projects') renderProjects();
  else if (page === 'users') renderUsers();
  else if (page === 'villages') renderVillages();
  else if (page === 'la-process') renderLAProcess(params);
  else if (page === 'reports') renderReports();
}

  });

  document.querySelectorAll('.proj-assign-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { showAssignModal(parseInt(btn.getAttribute('data-pid'))); });
  });

  document.querySelectorAll('.proj-del-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      const pid = parseInt(btn.getAttribute('data-pid'));
      const proj = DB.projects.find(function(x) { return x.id === pid; });
      confirmModal('Delete project <strong>"' + (proj ? proj.name : pid) + '"</strong> and all its data?<br>This cannot be undone.', function() {
        try {
          DB.projects = DB.projects.filter(function(x) { return x.id !== pid; });
          if (DB.assignments) DB.assignments = DB.assignments.filter(function(x) { return x.pid !== pid; });
          if (DB.projectAssignments) DB.projectAssignments = DB.projectAssignments.filter(function(x) { return x.projectId !== pid; });
          var vids = DB.villages.filter(function(v) { return v.projectId === pid; }).map(function(v) { return v.id; });
          DB.villages = DB.villages.filter(function(v) { return v.projectId !== pid; });
          vids.forEach(function(vid) { deleteFromStage(1, vid, pid); });
          saveDB();
          showToast('Project deleted successfully.', 'info');
          renderProjects();
        } catch(err) {
          showToast('Error: ' + err.message, 'error');
        }
      });
    });
  });
}

  ]);

}

function saveProject(id) {
  const name = document.getElementById('pf-name').value.trim();
  const tafsNo = document.getElementById('pf-tafs').value.trim();
  if (!name || !tafsNo) { showToast('Project name and TAFS number are required.', 'error'); return; }
  const data = {
    name, tafsNo,
    length: document.getElementById('pf-len').value,
    tpc: document.getElementById('pf-tpc').value,
    civilCost: document.getElementById('pf-civil').value,
    laCost: document.getElementById('pf-lacost').value,
    totalLand: document.getElementById('pf-total').value,
    availLand: document.getElementById('pf-avail').value,
    laRequired: document.getElementById('pf-la').value,
    laLength: document.getElementById('pf-laLen').value,
  };
  if (id) {
    const p = DB.projects.find(x => x.id === id);
    Object.assign(p, data);
    showToast('Project updated successfully.', 'success');
  } else {
    DB.projects.push({ id: newId(), ...data });
    showToast('Project created successfully.', 'success');
  }
  saveDB(); closeModal(); renderProjects();
}

async function showAssignModal(projectId) {
  try { DB.users = await api('GET', '/api/auth/users'); } catch(e) {}
  const p = DB.projects.find(x => x.id === projectId);
  const assigned = (p.assignedUsers || []);
  const users = DB.users.filter(u => u.role !== 'admin');
  openModal(`Assign Users — ${p.name}`, `
    <p class="text-muted mb-4">Select users to assign to this project:</p>
    ${users.length === 0 ? '<div class="alert alert-info">No users created yet. Go to User Management to create users.</div>' :
    users.map(u => `
      <label style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;cursor:pointer;border:1px solid var(--border);margin-bottom:8px;background:var(--card)">
        <input type="checkbox" id="assign-${u.id}" ${assigned.includes(u.id)?'checked':''} style="width:16px;height:16px;accent-color:var(--accent)">
        <span><strong>${u.username}</strong></span>
      </label>
    `).join('')}
  `, [
    { label: 'Cancel', cls: 'btn-secondary', action: closeModal },
    { label: 'Save Assignments', cls: 'btn-primary', action: () => saveAssignments(projectId, users) }
  ]);
}

function saveAssignments(projectId, users) {
  if (!DB.assignments) DB.assignments = [];
  // Update assignments array
  DB.assignments = DB.assignments.filter(a => a.pid !== projectId);
  const assignedUids = [];
  users.forEach(u => {
    if (document.getElementById('assign-' + u.id)?.checked) {
      DB.assignments.push({ uid: u.id, pid: projectId });
      assignedUids.push(u.id);
    }
  });
  // Also update assignedUsers on the project (this is what gets saved to DB)
  const p = DB.projects.find(x => x.id === projectId);
  if (p) p.assignedUsers = assignedUids;
  saveDB(); closeModal(); showToast('Assignments saved.', 'success');
}

function showUserModal(id) {

  openModal(u ? 'Edit User' : 'Create New User', `
    <div class="field"><label class="required">Username</label><input id="uf-user" value="${u?.username||''}" placeholder="Enter username"></div>
    <div class="field"><label class="${u?'':'required'}">Password ${u?'(leave blank to keep current)':''}</label><input type="password" id="uf-pass" placeholder="Enter password"></div>
  `, [

    { label: u ? 'Update User' : 'Create User', cls: 'btn-primary', action: () => saveUser(id) }
  ]);
}

async function saveUser(id) {
  const username = document.getElementById('uf-user').value.trim();
  const password = document.getElementById('uf-pass').value;
  if (!username) { showToast('Username is required.', 'error'); return; }
  if (!id && !password) { showToast('Password is required.', 'error'); return; }
  try {
    if (id) {
      await api('PUT', `/api/auth/users/${id}`, { name: username, password: password||undefined });
      showToast('User updated.', 'success');
    } else {
      await api('POST', '/api/auth/users', { username, password, name: username });
      showToast('User created.', 'success');
    }
    DB.users = await api('GET', '/api/auth/users');
    closeModal(); renderUsers(); populateLoginDropdown();
  } catch(e) { showToast(e.message, 'error'); }
}

async function deleteUser(id) {
  const u = DB.users.find(x => x.id === id);
  confirmModal('Delete user <strong>"' + (u ? u.username : id) + '"</strong>?', async function() {
    try {
      await api('DELETE', `/api/auth/users/${id}`);
      DB.projects.forEach(p => { if (p.assignedUsers) p.assignedUsers = p.assignedUsers.filter(uid => uid !== id); });
      await saveDB();
      DB.users = await api('GET', '/api/auth/users');
      showToast('User deleted.', 'info'); renderUsers(); populateLoginDropdown();
    } catch(e) { showToast(e.message, 'error'); }
  });
}

// ═══════════════════════════════════════════════════════
// LA PROCESS  —  5 STAGES: 3a → 3A → JM → 3D → 3G
//
//  3a (lowercase) = CALA appointment notification for the village
//  3A (UPPERCASE) = Gut-number wise area notification (Section 3A)
//  JM             = Joint Measurement of guts
//  3D             = Declaration / Award with beneficiary names
//  3G             = Compensation payment per beneficiary
// ═══════════════════════════════════════════════════════
let laState = { projectId: null, villageId: null, tab: 'lower3a' };

function renderLAProcess(params) {
  const myProjects = currentUser.role === 'admin'
    ? DB.projects
    : getMyProjects();

  if (params?.projectId) laState.projectId = params.projectId;

  const projVillages = laState.projectId
    ? DB.villages.filter(v => v.projectId === laState.projectId)
    : [];

  document.getElementById('page-content').innerHTML = `
    <div class="panel mb-4">
      <div class="panel-body">
        <div class="flex gap-3 items-center flex-wrap">
          <div class="field" style="margin:0;min-width:260px">
            <label style="display:block;margin-bottom:6px;font-size:12px;color:var(--text-dim);font-weight:500;">SELECT PROJECT</label>
            <select id="la-project-sel">
              <option value="">— Select Project —</option>
              ${myProjects.map(p => `<option value="${p.id}" ${laState.projectId==p.id?'selected':''}>${p.name}</option>`).join('')}
            </select>
          </div>
          ${laState.projectId ? `
          <div class="field" style="margin:0;min-width:260px">
            <label style="display:block;margin-bottom:6px;font-size:12px;color:var(--text-dim);font-weight:500;">SELECT VILLAGE</label>
            <select id="la-village-sel">
              <option value="">— Select Village —</option>
              ${projVillages.map(v => `<option value="${v.id}" ${laState.villageId==v.id?'selected':''}>${v.name} (${v.taluka})</option>`).join('')}
            </select>
          </div>
          ${projVillages.length === 0 ? `
            <div style="margin-top:20px">
              <div class="alert alert-warning" style="margin:0">⚠ No villages for this project. Add villages via <strong>Village Master</strong>.</div>
            </div>` : ''}
          ${laState.villageId && currentUser.role === 'admin' ? `
            <div style="margin-top:20px">
              <button class="btn btn-danger btn-sm" id="delAllVilBtn">🗑 Delete All LA Data for This Village</button>
            </div>` : ''}
          ` : ''}
        </div>
      </div>
    </div>
    <div id="la-content"></div>
  `;

  document.getElementById('la-project-sel').addEventListener('change', function() {
    laState.projectId = this.value ? parseInt(this.value) : null;
    laState.villageId = null;
    laState.tab = 'lower3a';
    renderLAProcess();
  });

  if (document.getElementById('la-village-sel')) {
    document.getElementById('la-village-sel').addEventListener('change', function() {
      laState.villageId = this.value ? parseInt(this.value) : null;
      laState.tab = 'lower3a';
      renderLATabs();
    });
  }

  if (document.getElementById('delAllVilBtn')) {
    document.getElementById('delAllVilBtn').addEventListener('click', function() {
      const vName = DB.villages.find(v => v.id === laState.villageId)?.name || 'this village';
      confirmModal('Delete <strong>ALL</strong> LA process data (3a, 3A, JM, 3D, 3G) for <strong>"' + vName + '"</strong>?<br>This cannot be undone.', function() {
        deleteVillageProcess(laState.villageId, laState.projectId);
        laState.tab = 'lower3a';
        showToast('All LA data for ' + vName + ' deleted.', 'info');
        renderLATabs();
      });
    });
  }

  if (laState.projectId && laState.villageId) renderLATabs();
}

function laTabClick(tabKey, prereqDone, prereqLabel) {
  if (!prereqDone) {
    showToast('⚠ Complete ' + prereqLabel + ' First', 'error');
    return;
  }
  laState.tab = tabKey;
  renderLATabs();
}

function renderLATabs() {
  const v = DB.villages.find(x => x.id === laState.villageId);
  if (!v) return;

  // Stage completion flags
  const hasLower3a = DB.process3a.some(x => x.villageId === laState.villageId && x.projectId === laState.projectId && x.type === 'lower3a');
  const _rec3A     = DB.process3a.find(x => x.villageId === laState.villageId && x.projectId === laState.projectId && x.type === 'upper3A');
  const hasUpper3A = _rec3A && DB.process3aGuts.some(g => g.process3aId === _rec3A.id);
  const hasJM      = DB.processJM.some(x => x.villageId === laState.villageId && x.projectId === laState.projectId);
  const has3D      = DB.process3D.some(x => x.villageId === laState.villageId && x.projectId === laState.projectId);
  const has3G      = DB.process3G.some(x => x.villageId === laState.villageId && x.projectId === laState.projectId);

  // Step definitions
  const steps = [
    { key: 'lower3a', label: '3a Notification',  done: hasLower3a, num: 1 },
    { key: 'upper3A', label: '3A Details',        done: hasUpper3A, num: 2 },
    { key: 'jm',      label: 'JM Process',        done: hasJM,      num: 3 },
    { key: '3d',      label: '3D Declaration',    done: has3D,      num: 4 },
    { key: '3g',      label: '3G Compensation',   done: has3G,      num: 5 },
  ];

  // Tab lock logic
  const locks = {
    lower3a: { allowed: true,         prereq: '' },
    upper3A: { allowed: hasLower3a,   prereq: '3a Notification' },
    jm:      { allowed: hasUpper3A,   prereq: '3A Details' },
    '3d':    { allowed: hasJM,        prereq: 'JM Process' },
    '3g':    { allowed: has3D,        prereq: '3D Declaration' },
    addl:    { allowed: true,         prereq: '' },
  };

  document.getElementById('la-content').innerHTML = `
    <div class="process-steps">
      ${steps.map((s, i) => `
        <div class="process-step">
          <div class="step-item">
            <div class="step-circle ${s.done ? 'done' : laState.tab === s.key ? 'active' : ''}">${s.done ? '✓' : s.num}</div>
            <div class="step-label ${laState.tab === s.key ? 'active' : ''}">${s.label}</div>
          </div>
          ${i < steps.length - 1 ? `<div class="step-connector ${s.done ? 'done' : ''}"></div>` : ''}
        </div>
      `).join('')}
    </div>

    <div class="tabs" id="la-tabs">
      ${steps.map(s => {
        const lock = locks[s.key];
        const isActive = laState.tab === s.key;
        const locked = !lock.allowed;
        return `<div class="tab ${isActive ? 'active' : ''} ${locked ? 'tab-locked' : ''}"
          style="${locked ? 'opacity:0.45;cursor:not-allowed;position:relative;' : 'cursor:pointer;'}"
          data-tab="${s.key}" data-allowed="${lock.allowed}" data-prereq="${lock.prereq}"
          title="${locked ? '⚠ Complete ' + lock.prereq + ' First' : ''}">
          ${locked ? '🔒 ' : ''}${s.label}
        </div>`;
      }).join('')}
      <div class="tab ${laState.tab === 'addl' ? 'active' : ''}" data-tab="addl" data-allowed="true" data-prereq="" style="cursor:pointer;">
        Additional Area
      </div>
    </div>

    <div id="la-tab-content"></div>
  `;

  // Attach tab click events using event listeners (no inline onclick)
  document.querySelectorAll('#la-tabs .tab').forEach(function(tabEl) {
    tabEl.addEventListener('click', function() {
      const allowed = this.getAttribute('data-allowed') === 'true';
      const prereq  = this.getAttribute('data-prereq');
      const tabKey  = this.getAttribute('data-tab');
      if (!allowed) {
        showToast('⚠ Complete ' + prereq + ' First', 'error');
        return;
      }
      laState.tab = tabKey;
      renderLATabs();
    });
  });

  // Render active tab content
  if      (laState.tab === 'lower3a') renderTab_lower3a();
  else if (laState.tab === 'upper3A') renderTab_upper3A(hasLower3a);
  else if (laState.tab === 'jm')      renderTab_JM(hasUpper3A);
  else if (laState.tab === '3d')      renderTab_3D(hasJM);
  else if (laState.tab === '3g')      renderTab_3G(has3D);
  else if (laState.tab === 'addl')    renderTab_Addl();
}

        showToast('3a entry and all downstream data deleted.', 'info'); renderLATabs();

// Helper: delete all LA process data for a village+project from a given stage onwards
function deleteFromStage(stage, vid, pid) {
  if (stage <= 1) { // delete 3a lower
    DB.process3a = DB.process3a.filter(x => !(x.villageId===vid && x.projectId===pid && x.type==='lower3a'));
  }
  if (stage <= 2) { // delete 3A upper + guts
    const recs = DB.process3a.filter(x => x.villageId===vid && x.projectId===pid && x.type==='upper3A');
    recs.forEach(r => { DB.process3aGuts = DB.process3aGuts.filter(g => g.process3aId !== r.id); });
    DB.process3a = DB.process3a.filter(x => !(x.villageId===vid && x.projectId===pid && x.type==='upper3A'));
  }
  if (stage <= 3) { // delete JM + guts
    const recs = DB.processJM.filter(x => x.villageId===vid && x.projectId===pid);
    recs.forEach(r => { DB.processJMGuts = DB.processJMGuts.filter(g => g.processJMId !== r.id); });
    DB.processJM = DB.processJM.filter(x => !(x.villageId===vid && x.projectId===pid));
  }
  if (stage <= 4) { // delete 3D + guts
    const recs = DB.process3D.filter(x => x.villageId===vid && x.projectId===pid);
    recs.forEach(r => { DB.process3DGuts = DB.process3DGuts.filter(g => g.process3DId !== r.id); });
    DB.process3D = DB.process3D.filter(x => !(x.villageId===vid && x.projectId===pid));
  }
  if (stage <= 5) { // delete 3G + guts
    const recs = DB.process3G.filter(x => x.villageId===vid && x.projectId===pid);
    recs.forEach(r => { DB.process3GGuts = DB.process3GGuts.filter(g => g.process3GId !== r.id); });
    DB.process3G = DB.process3G.filter(x => !(x.villageId===vid && x.projectId===pid));
  }
  saveDB();
}

function deleteVillageProcess(vid, pid) { deleteFromStage(1, vid, pid); }

function gutRow3A(i, g) {
  const isGovt = g.landType === 'Government Land';
  return `<tr id="row_g3A_${i}">
    <td class="mono">${i+1}</td>
    <td><input class="inlineInput" id="g3A_num_${i}" value="${g.gutNumber||''}" placeholder="Gut No." style="width:110px"></td>
    <td><input type="number" class="inlineInput" id="g3A_area_${i}" value="${g.area||''}" placeholder="0.00" style="width:90px"></td>
    <td>
      <select class="inlineInput" id="g3A_type_${i}" style="min-width:160px;padding:6px 10px">
        <option value="Private Land" ${!isGovt ? 'selected' : ''}>🏠 Private Land</option>
        <option value="Government Land" ${isGovt ? 'selected' : ''}>🏛 Government Land</option>
      </select>
    </td>
    <td><button class="btn btn-danger btn-sm" onclick="document.getElementById('row_g3A_${i}').remove()">✕</button></td>
  </tr>`;
}

function collectGutRows(prefix) {
  const results = [];
  let i = 0;
  while (true) {
    const numEl  = document.getElementById(prefix + '_num_' + i);
    const areaEl = document.getElementById(prefix + '_area_' + i);
    const typeEl = document.getElementById(prefix + '_type_' + i);
    if (!numEl && i > 50) break;
    if (numEl && numEl.value.trim()) {
      results.push({
        num: numEl.value.trim(),
        area: areaEl ? areaEl.value : '',
        landType: typeEl ? typeEl.value : 'Private Land'
      });
    }
    i++;
  }
  return results;
}

        <div class="flex gap-2 items-center">
          <span class="badge ${existing ? 'badge-complete' : 'badge-pending'}">${existing ? '✓ Saved' : 'Pending'}</span>

        </div>
        <div class="divider"></div>
        <h4 class="mb-4">Modified Area After JM (per Gut)</h4>
        <div class="alert alert-info" style="margin-bottom:12px;font-size:12px">
          ℹ If JM area is <strong>greater than 3A area</strong> for a gut, it will be flagged as <strong style="color:#f59e0b">Additional Area</strong> and auto-created as a separate <em>Village (Add)</em> process after saving.

        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Gut Number</th>
              <th>3A Area (Ha)</th>
              <th>Land Type</th>
              <th>Modified Area after JM (Ha)</th>
              <th>Status</th>
            </tr></thead>
            <tbody id="jm-gut-tbody">
              ${guts3A.map((g, i) => {
                const jg = jmGuts.find(j => j.gutNumber === g.gutNumber);
                const isGovt = g.landType === 'Government Land';
                const modVal = jg?.modArea || '';
                const isAddl = modVal && parseFloat(modVal) > parseFloat(g.area);
                return `<tr id="jmrow_${i}" data-gut="${g.gutNumber}" data-area3a="${g.area}" data-isnew="0">
                  <td class="mono">${g.gutNumber}</td>
                  <td class="mono">${g.area}</td>
                  <td><span class="badge" style="${isGovt ? 'background:rgba(148,163,184,0.15);color:#94a3b8' : 'background:rgba(34,197,94,0.15);color:#4ade80'}">${isGovt ? '🏛 Govt' : '🏠 Private'}</span></td>
                  <td><input type="number" class="inlineInput jm-mod-input" id="jm_mod_${i}"
                    value="${modVal}" placeholder="0.00" style="width:130px"
                    oninput="highlightJMRow(this, ${parseFloat(g.area)||0})"></td>
                  <td id="jmstatus_${i}">${isAddl ? '<span style="color:#f59e0b;font-weight:600;font-size:11px">⚠ Additional Area</span>' : '<span style="color:#888;font-size:11px">Normal</span>'}</td>
                </tr>`;
              }).join('')}
              ${extraJmGuts.map((jg, ei) => {
                const idx = 'e' + ei;
                return `<tr id="jmrow_${idx}" data-gut="${jg.gutNumber}" data-area3a="0" data-isnew="1" style="background:rgba(245,158,11,0.08)">
                  <td><input class="inlineInput" id="jm_newgut_${idx}" value="${jg.gutNumber}" placeholder="Gut No." style="width:90px"></td>
                  <td class="mono" style="color:#888">—</td>
                  <td><span class="badge" style="background:rgba(245,158,11,0.15);color:#f59e0b">➕ New</span></td>
                  <td><input type="number" class="inlineInput jm-mod-input" id="jm_mod_${idx}"
                    value="${jg.modArea||''}" placeholder="0.00" style="width:130px"></td>
                  <td><span style="color:#f59e0b;font-weight:600;font-size:11px">⚠ Additional Area</span></td>
                  <td><button class="btn btn-danger btn-sm" onclick="this.closest('tr').remove()">✕</button></td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
        <div class="mt-4 flex gap-2">
          <button class="btn btn-secondary btn-sm" id="jm-add-gut-btn">➕ Add New Gut Number</button>
        </div>
        <div class="mt-4">
          <button class="btn btn-primary" id="saveJM_btn">💾 Save JM Details</button>
        </div>
      </div>
    </div>
  `;

  // Highlight existing rows that already have additional area
  guts3A.forEach((g, i) => {
    const inp = document.getElementById('jm_mod_' + i);
    if (inp && inp.value) highlightJMRow(inp, parseFloat(g.area)||0);
  });

  // Add new gut row button
  let newGutCount = 0;
  document.getElementById('jm-add-gut-btn').addEventListener('click', function() {
    const idx = 'n' + (newGutCount++);
    const tbody = document.getElementById('jm-gut-tbody');
    const tr = document.createElement('tr');
    tr.id = 'jmrow_' + idx;
    tr.setAttribute('data-gut', '');
    tr.setAttribute('data-area3a', '0');
    tr.setAttribute('data-isnew', '1');
    tr.style.background = 'rgba(245,158,11,0.08)';
    tr.innerHTML =
      '<td><input class="inlineInput" id="jm_newgut_' + idx + '" placeholder="Gut No." style="width:90px"></td>'
      + '<td class="mono" style="color:#888">—</td>'
      + '<td><span class="badge" style="background:rgba(245,158,11,0.15);color:#f59e0b">➕ New</span></td>'
      + '<td><input type="number" class="inlineInput" id="jm_mod_' + idx + '" placeholder="0.00" style="width:130px"></td>'
      + '<td><span style="color:#f59e0b;font-weight:600;font-size:11px">⚠ Additional Area</span></td>'
      + '<td><button class="btn btn-danger btn-sm" onclick="this.closest(\'tr\').remove()">✕</button></td>';
    tbody.appendChild(tr);
  });

  document.getElementById('saveJM_btn').addEventListener('click', function() {
    const jmDate = document.getElementById('fjm_date').value;
    if (!jmDate) { showToast('JM Date is required.', 'error'); return; }
    const sheetDate = document.getElementById('fjm_sheet').value;

    // Collect all gut rows
    const allRows = document.querySelectorAll('#jm-gut-tbody tr');
    const normalGuts = [];   // guts from 3A (modArea <= 3A area)
    const addlGuts   = [];   // guts with modArea > 3A area OR new guts

    allRows.forEach(function(row) {
      const isNew = row.getAttribute('data-isnew') === '1';
      const area3a = parseFloat(row.getAttribute('data-area3a')) || 0;
      let gutNum, modArea;

      if (isNew) {
        const gutEl = row.querySelector('input[id^="jm_newgut_"]');
        const areaEl = row.querySelector('input[type="number"]');
        gutNum  = gutEl ? gutEl.value.trim() : '';
        modArea = areaEl ? areaEl.value : '';
        if (!gutNum) return; // skip empty rows
        addlGuts.push({ gutNumber: gutNum, modArea: modArea, isNew: true });
      } else {
        gutNum  = row.getAttribute('data-gut');
        const areaEl = row.querySelector('input[type="number"]');
        modArea = areaEl ? areaEl.value : '';
        const modVal = parseFloat(modArea) || 0;

        if (modVal > area3a && area3a > 0) {
          // Split: normal part goes to regular JM, extra goes to Additional Area
          normalGuts.push({ gutNumber: gutNum, modArea: String(area3a) });
          addlGuts.push({ gutNumber: gutNum, modArea: String((modVal - area3a).toFixed(4)), isNew: false, extraOnly: true });
        } else {
          normalGuts.push({ gutNumber: gutNum, modArea: modArea });
        }
      }
    });

    // Save normal JM record
    if (existing) {
      existing.jmDate = jmDate; existing.sheetDate = sheetDate;
      DB.processJMGuts = DB.processJMGuts.filter(g => g.processJMId !== existing.id);
      normalGuts.forEach(g => DB.processJMGuts.push({ id: newId(), processJMId: existing.id, gutNumber: g.gutNumber, modArea: g.modArea }));
    } else {
      const id = newId();
      DB.processJM.push({ id, projectId: laState.projectId, villageId: laState.villageId, jmDate, sheetDate });
      normalGuts.forEach(g => DB.processJMGuts.push({ id: newId(), processJMId: id, gutNumber: g.gutNumber, modArea: g.modArea }));
    }

    // Handle Additional Area — create/update "Village (Add)" village and its 3a, 3A, JM records
    if (addlGuts.length > 0) {
      const baseVillage = DB.villages.find(v => v.id === laState.villageId);
      const addlVilName = baseVillage.name + ' (Add)';

      // Find or create Add village
      let addlVil = DB.villages.find(v => v.projectId === laState.projectId && v.name === addlVilName);
      if (!addlVil) {
        const addlVilId = newId();
        DB.villages.push({ id: addlVilId, projectId: laState.projectId, name: addlVilName, taluka: baseVillage.taluka + ' (Add)', isAddl: true });
        addlVil = DB.villages.find(v => v.id === addlVilId);
      }

      // Copy 3a record to Add village if not exists
      const base3a = DB.process3a.find(x => x.villageId === laState.villageId && x.projectId === laState.projectId && x.type === 'lower3a');
      if (base3a && !DB.process3a.find(x => x.villageId === addlVil.id && x.projectId === laState.projectId && x.type === 'lower3a')) {
        DB.process3a.push({ id: newId(), projectId: laState.projectId, villageId: addlVil.id,
          type: 'lower3a', notifDate: base3a.notifDate, calaPost: base3a.calaPost, calaName: base3a.calaName, calaMobile: base3a.calaMobile });
      }

      // Create/update 3A record for Add village with addl guts
      let addl3A = DB.process3a.find(x => x.villageId === addlVil.id && x.projectId === laState.projectId && x.type === 'upper3A');
      if (!addl3A) {
        const addl3AId = newId();
        DB.process3a.push({ id: addl3AId, projectId: laState.projectId, villageId: addlVil.id, type: 'upper3A', notifDate: rec3A?.notifDate || jmDate });
        addl3A = DB.process3a.find(x => x.id === addl3AId);
      }
      // Replace guts
      DB.process3aGuts = DB.process3aGuts.filter(g => g.process3aId !== addl3A.id);
      addlGuts.forEach(function(g) {
        // Get land type from original 3A guts
        const orig3Agut = guts3A.find(x => x.gutNumber === g.gutNumber);
        const landType = orig3Agut ? orig3Agut.landType : 'Private Land';
        DB.process3aGuts.push({ id: newId(), process3aId: addl3A.id, gutNumber: g.gutNumber, area: g.modArea, landType: landType });
      });

      // Create/update JM record for Add village
      let addlJM = DB.processJM.find(x => x.villageId === addlVil.id && x.projectId === laState.projectId);
      if (!addlJM) {
        const addlJMId = newId();
        DB.processJM.push({ id: addlJMId, projectId: laState.projectId, villageId: addlVil.id, jmDate, sheetDate });
        addlJM = DB.processJM.find(x => x.id === addlJMId);
      } else {
        addlJM.jmDate = jmDate; addlJM.sheetDate = sheetDate;
      }
      DB.processJMGuts = DB.processJMGuts.filter(g => g.processJMId !== addlJM.id);
      addlGuts.forEach(function(g) {
        DB.processJMGuts.push({ id: newId(), processJMId: addlJM.id, gutNumber: g.gutNumber, modArea: g.modArea });
      });

      saveDB();
      showToast('✅ JM saved! Additional Area auto-created for ' + addlVilName + '.', 'success');
    } else {
      // Clean up any existing Add village for this village if no more addl guts
      const baseVillage = DB.villages.find(v => v.id === laState.villageId);
      const addlVilName = baseVillage.name + ' (Add)';
      const addlVil = DB.villages.find(v => v.projectId === laState.projectId && v.name === addlVilName);
      if (addlVil) {
        DB.processJM = DB.processJM.filter(x => x.villageId !== addlVil.id);
        DB.process3a = DB.process3a.filter(x => x.villageId !== addlVil.id);
        DB.villages  = DB.villages.filter(v => v.id !== addlVil.id);
      }
      saveDB();
      showToast('JM Details saved! Now proceed to 3D.', 'success');
    }
    renderLATabs();
  });

  if (isAdmin && existing && document.getElementById('del_jm_btn')) {
    document.getElementById('del_jm_btn').addEventListener('click', function() {
      confirmModal('Delete <strong>JM entry</strong>? This will also delete 3D and 3G data for this village.', function() {
        // Also remove Add village
        const baseVillage = DB.villages.find(v => v.id === laState.villageId);
        if (baseVillage) {
          const addlVil = DB.villages.find(v => v.projectId === laState.projectId && v.name === baseVillage.name + ' (Add)');
          if (addlVil) {
            DB.processJM = DB.processJM.filter(x => x.villageId !== addlVil.id);
            DB.process3a = DB.process3a.filter(x => x.villageId !== addlVil.id);
            DB.villages  = DB.villages.filter(v => v.id !== addlVil.id);
          }
        }
        deleteFromStage(3, laState.villageId, laState.projectId);
        showToast('JM and downstream data deleted.', 'info'); renderLATabs();
      });
    });
  }
}

// Highlight JM row if modArea > 3A area
function highlightJMRow(input, area3a) {
  const row = input.closest('tr');
  if (!row) return;
  const statusCell = row.querySelector('td:last-child') || row.cells[row.cells.length-1];
  const modVal = parseFloat(input.value) || 0;
  const isAddl = area3a > 0 && modVal > area3a;
  input.style.borderColor = isAddl ? '#f59e0b' : '';
  input.style.background   = isAddl ? 'rgba(245,158,11,0.08)' : '';
  // Update status cell (5th td, index 4)
  const cells = row.querySelectorAll('td');
  if (cells[4]) {
    cells[4].innerHTML = isAddl
      ? '<span style="color:#f59e0b;font-weight:600;font-size:11px">⚠ Additional Area</span>'
      : '<span style="color:#888;font-size:11px">Normal</span>';
  }
}

          <div style="font-size:40px;margin-bottom:12px">🏛</div>
          <h3 style="color:var(--text);margin-bottom:8px">3G Not Applicable</h3>
          <p style="color:var(--text-dim)">All guts in this village are <strong>Government Land</strong>.<br>
          No compensation is required as this is a Government to Government transfer.<br>
          The LA process for this village is complete at <strong>Stage 4 (3D)</strong>.</p>
        </div>
        ` : `
        <div class="field" style="max-width:300px">
          <label class="required">3G Notification Date</label>
          <input type="date" id="f3g_date" value="${existing?.notifDate||''}">

// ── Additional Area ──
function renderTab_Addl() {
  document.getElementById('la-tab-content').innerHTML = `
    <div class="alert alert-info">ℹ <strong>Additional Area Process:</strong> For land discovered during JM that had no prior 3a notification. Workflow: 3a → 3A → 3D (JM skipped) → 3G.</div>
    <div class="panel">
      <div class="panel-header"><h3>Additional Area — Entry</h3></div>
      <div class="panel-body">
        <div class="field" style="max-width:300px"><label class="required">3a/3A Notification Date</label><input type="date" id="addl-date"></div>
        <div class="divider"></div>
        <div class="flex justify-between items-center mb-4">
          <h4>Additional Gut Numbers</h4>
          <button class="btn btn-secondary btn-sm" id="addlAddBtn">+ Add Gut</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>#</th><th>Gut Number</th><th>Area (Ha)</th><th>Beneficiary Name</th><th>Compensation (₹)</th><th></th></tr></thead>
            <tbody id="addl-guts-body">
              <tr id="no-addl-guts"><td colspan="6" style="text-align:center;color:var(--text-dim);padding:20px">Click "+ Add Gut" to add additional area records.</td></tr>
            </tbody>
          </table>
        </div>
        <div class="mt-4">
          <button class="btn btn-primary" id="saveAddlBtn">💾 Save Additional Area</button>
        </div>
      </div>
    </div>
  `;
  window._addlGutCount = 0;

  document.getElementById('addlAddBtn').addEventListener('click', function() {
    document.getElementById('no-addl-guts')?.remove();
    const i = window._addlGutCount++;
    document.getElementById('addl-guts-body').insertAdjacentHTML('beforeend',
      `<tr id="addl-gut-${i}">
        <td class="mono">${i+1}</td>
        <td><input class="inlineInput" id="addl-num-${i}" placeholder="Gut No." style="width:100px"></td>
        <td><input type="number" class="inlineInput" id="addl-area-${i}" placeholder="0.00" style="width:90px"></td>
        <td><input class="inlineInput" id="addl-ben-${i}" placeholder="Beneficiary" style="min-width:180px"></td>
        <td><input type="number" class="inlineInput" id="addl-comp-${i}" placeholder="0.00" style="width:120px"></td>
        <td><button class="btn btn-danger btn-sm" onclick="document.getElementById('addl-gut-${i}').remove()">✕</button></td>
      </tr>`);
  });

  document.getElementById('saveAddlBtn').addEventListener('click', function() {
    const date = document.getElementById('addl-date').value;
    if (!date) { showToast('Notification date required.', 'error'); return; }
    const guts = [];
    for (let i = 0; i < window._addlGutCount; i++) {
      const num = document.getElementById('addl-num-' + i)?.value;
      if (num) guts.push({
        gutNumber: num,
        area: document.getElementById('addl-area-' + i)?.value || '',
        beneficiary: document.getElementById('addl-ben-' + i)?.value || '',
        compensation: document.getElementById('addl-comp-' + i)?.value || ''
      });
    }
    if (!guts.length) { showToast('Add at least one gut number.', 'error'); return; }

    // 3a (lower) record
    const a3id = newId();
    DB.process3a.push({ id: a3id, projectId: laState.projectId, villageId: laState.villageId,
      type: 'lower3a', notifDate: date, calaPost: 'Additional Area', calaName: '', calaMobile: '', isAdditional: true });

    // 3A (upper) record — skip JM
    const A3id = newId();
    DB.process3a.push({ id: A3id, projectId: laState.projectId, villageId: laState.villageId,
      type: 'upper3A', notifDate: date, isAdditional: true });
    guts.forEach(g => DB.process3aGuts.push({ id: newId(), process3aId: A3id, gutNumber: g.gutNumber, area: g.area }));

    // 3D
    const d3id = newId();
    DB.process3D.push({ id: d3id, projectId: laState.projectId, villageId: laState.villageId,
      notifDate: date, isAdditional: true });
    guts.forEach(g => DB.process3DGuts.push({ id: newId(), process3DId: d3id,
      gutNumber: g.gutNumber, area: g.area, beneficiary: g.beneficiary }));

    // 3G
    const g3id = newId();
    DB.process3G.push({ id: g3id, projectId: laState.projectId, villageId: laState.villageId,
      notifDate: date, isAdditional: true });
    guts.forEach(g => DB.process3GGuts.push({ id: newId(), process3GId: g3id,
      gutNumber: g.gutNumber, beneficiary: g.beneficiary, compensation: g.compensation }));

    saveDB(); showToast('Additional Area saved! (3a → 3A → 3D → 3G completed)', 'success'); renderLATabs();
  });
}
